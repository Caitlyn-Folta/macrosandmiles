    if (!labelForm.logToday && !labelForm.saveDb) { setLabelNote("Pick at least one: log it today, save it to the database, or both."); return; }
    const c = Math.max(0, Math.round(cal));
    const p = Math.max(0, Math.round(parseFloat(labelForm.p) || 0));
    const f = Math.max(0, Math.round(parseFloat(labelForm.f) || 0));
    const ft = labelForm.ft ? parseInt(labelForm.ft, 10) : null;
    if (labelForm.saveDb) {
      const key = name.toLowerCase();
      const entry = { k: [key], c, p, f };
      const g = parseFloat(labelForm.g);
      if (!isNaN(g) && g > 0) {
        if (labelForm.liquid) { entry.ml = g; entry.liquid = true; } else entry.g = g;
      }
      if (ft) entry.ft = ft;
      const next = [...customFoods.filter((x) => x.k[0] !== key), entry];
      setCustomFoods(next); customStore(next);
    }
    if (labelForm.logToday) await addEntries([freebify({ name, cal: c, p, f }, ft, name)]);
    flash(labelForm.logToday && labelForm.saveDb ? `"${name}" logged and saved to your database`
      : labelForm.saveDb ? `"${name}" added to your food database` : `"${name}" logged`);
    setLabelForm(null); setLabelNote("");
  };

  /* ---------- grocery receipt scan: OCR -> Worker -> checklist -> custom foods ---------- */
  const scanReceipt = async (file) => {
    if (!file) return;
    if (!settings.aiUrl) { setReceiptNote("Receipt scanning needs the AI Worker — set it up in the plan tab (\u2728 AI lookup)."); return; }
    setReceiptBusy(true); setReceiptNote(""); setReceiptItems(null);
    try {
      const dataUrl = await compressImage(file, 1600, 0.92);
      const text = await ocrImage(dataUrl);
      if (!text.trim()) throw new Error("couldn't read any text off that photo");
      const res = await fetch(settings.aiUrl + "/receipt", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: text.slice(0, 5000) }),
      });
      if (!res.ok) throw new Error(`receipt HTTP ${res.status}`);
      const data = await res.json();
      const items = (data.items || []).filter((it) => it && it.name && typeof it.cal === "number");
      if (!items.length) setReceiptNote("No food items found on that receipt — try a straighter, closer shot.");
      else {
        setReceiptItems(items.map((it, i) => ({
          id: i, sel: true, shelf: "",
          name: String(it.name).toLowerCase().slice(0, 50),
          cal: String(Math.round(it.cal)),
          p: String(Math.round(it.protein || 0)),
          f: String(Math.round(it.fiber || 0)),
          g: it.grams > 0 ? String(Math.round(it.grams)) : "",
        })));
        setReceiptNote(`Found ${items.length} food item${items.length === 1 ? "" : "s"} — uncheck any you don't want, tweak the numbers, then add.`);
      }
    } catch (e) { setReceiptNote(`Receipt scan failed (${e.message}).`); }
    setReceiptBusy(false);
  };
  /* fridge / pantry contents photo -> same checklist, via the vision endpoint */
  const scanFridge = async (file) => {
    if (!file) return;
    if (!settings.aiUrl) { setReceiptNote("Fridge scanning needs the AI Worker — set it up above (AI lookup)."); return; }
    setReceiptBusy(true); setReceiptNote(""); setReceiptItems(null);
    try {
      const dataUrl = await compressImage(file, 1200, 0.85);
      const res = await fetch(settings.aiUrl + "/meal", {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ image: dataUrl }),
      });
      if (res.status === 404 || res.status === 405) throw new Error("your Worker doesn't have /meal yet — redeploy cloudflare-worker.js");
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `fridge HTTP ${res.status}`);
      const items = (data.items || []).filter((it) => it && it.name && typeof it.cal === "number");
      if (!items.length) throw new Error("couldn't pick out any foods — try a brighter, closer shot");
      setReceiptItems(items.map((it, i) => ({
        id: i, sel: true, shelf: "",
        name: String(it.name).toLowerCase().slice(0, 50),
        cal: String(Math.round(it.cal)),
        p: String(Math.round(it.protein || 0)),
        f: String(Math.round(it.fiber || 0)),
        g: "",
      })));
      setReceiptNote(`Spotted ${items.length} food${items.length === 1 ? "" : "s"} in there — per-serving estimates, so tweak anything, pick shelves, then add.`);
    } catch (e) { setReceiptNote(`Fridge scan failed (${e.message}).`); }
    setReceiptBusy(false);
  };
  const setReceiptItem = (id, field, value) =>
    setReceiptItems((prev) => prev.map((it) => (it.id === id ? Object.assign({}, it, { [field]: value }) : it)));
  const addReceiptFoods = () => {
    const sel = (receiptItems || []).filter((it) => it.sel && it.name.trim() && !isNaN(parseInt(it.cal, 10)));
    if (!sel.length) return;
    const existing = new Set(customFoods.map((x) => x.k[0]));
    const next = [...customFoods];
    for (const it of sel) {
      if (existing.has(it.name.trim())) continue;
      const entry = { k: [it.name.trim()], c: parseInt(it.cal, 10), p: parseFloat(it.p) || 0, f: parseFloat(it.f) || 0 };
      const g = parseFloat(it.g);
      if (g > 0) entry.g = g;
      next.push(entry);
    }
    setCustomFoods(next); customStore(next);
    /* rows with a shelf picked also land in the pantry, one settings write */
    const pins = sel.filter((it) => it.shelf);
    if (pins.length) {
      const m = curPantryMods();
      pins.forEach((it, i) => m.custom.push({
        id: "c" + (Date.now() + i), cat: it.shelf,
        name: it.name.trim().toLowerCase(), label: it.name.trim().slice(0, 16),
        cal: parseInt(it.cal, 10), p: Math.max(0, Math.round(parseFloat(it.p) || 0)), f: Math.max(0, Math.round(parseFloat(it.f) || 0)),
        sv: parseFloat(it.g) > 0 ? `${Math.round(parseFloat(it.g))}g · 1 serving` : "",
      }));
      setPantryMods(m);
    }
    flash(`${sel.length} food${sel.length === 1 ? "" : "s"} in your database${pins.length ? ` · ${pins.length} pinned to the pantry` : ""} — type them any time`);
    setReceiptItems(null); setReceiptNote("");
  };

  const deleteCustomFood = (name) => {
    const next = customFoods.filter((x) => x.k[0] !== name);
    setCustomFoods(next); customStore(next);
  };
  /* one place to remember a food so future lookups/typing resolve it. Upserts
     by name; ml vs g decided by the liquid flag. Returns the saved key. */
  const saveCustomFood = ({ name, cal, p = 0, f = 0, g, liquid, ft }) => {
    const key = String(name || "").trim().toLowerCase().slice(0, 50);
    if (!key || isNaN(parseInt(cal, 10))) return null;
    const entry = { k: [key], c: Math.max(0, Math.round(cal)), p: Math.max(0, Math.round(p || 0)), f: Math.max(0, Math.round(f || 0)) };
    const gv = parseFloat(g);
    if (!isNaN(gv) && gv > 0) { if (liquid) { entry.ml = gv; entry.liquid = true; } else entry.g = gv; }
    if (ft) entry.ft = ft;
    const next = [...customFoods.filter((x) => x.k[0] !== key), entry];
    setCustomFoods(next); customStore(next);
    return key;
  };

  /* ---------- recipe intake: a blog/cookbook recipe URL or photo -> per-serving
     macros, dropped into the editable estimate rows (portion box = # servings). ---------- */
  const URL_RE = /^https?:\/\/\S+$/i;
  const workerMissingNote = "That needs the AI Worker — set it up in the plan tab (AI lookup).";
  const scanRecipe = async (payload) => {
    if (!settings.aiUrl) { setEstimateNote(workerMissingNote); return; }
    setEstimating(true); setEstimateNote("Reading the recipe…"); setEstimateItems(null);
    try {
      const res = await fetch(settings.aiUrl + "/recipe", {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload),
      });
      if (res.status === 404 || res.status === 405) throw new Error("your Worker doesn't have /recipe yet — redeploy cloudflare-worker.js");
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `recipe HTTP ${res.status}`);
      if (typeof data.cal !== "number") throw new Error("couldn't find nutrition in that recipe");
      const srv = data.servings > 0 ? data.servings : 1;
      setEstimateItems([{
        id: 0, raw: data.name || "recipe", name: String(data.name || "recipe").toLowerCase().slice(0, 50),
        cal: String(Math.round(data.cal)), p: String(Math.round(data.protein || 0)), f: String(Math.round(data.fiber || 0)),
        ft: null, portion: "", save: true, /* a recipe is worth remembering — saved by default, opt out below */
        note: `per serving${srv ? ` · recipe makes ${srv}` : ""}${data.estimated ? " · macros estimated" : " · from the recipe's label"}`,
      }]);
      setEstimateNote(`Per-serving macros ready. Had more than one serving? Put the number in the portion box, then add.`);
    } catch (e) {
      setEstimateNote(`Recipe read failed (${e.message}).`);
    }
    setEstimating(false);
  };

  /* ---------- meal photo -> a draft ingredient list you can edit before logging ---------- */
  const scanMeal = async (file) => {
    if (!file) return;
    if (!settings.aiUrl) { setEstimateNote(workerMissingNote); return; }
    setEstimating(true); setEstimateNote("Looking at your plate…"); setEstimateItems(null);
    try {
      const dataUrl = await compressImage(file, 1200, 0.85);
      const res = await fetch(settings.aiUrl + "/meal", {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ image: dataUrl }),
      });
      if (res.status === 404 || res.status === 405) throw new Error("your Worker doesn't have /meal yet — redeploy cloudflare-worker.js");
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `meal HTTP ${res.status}`);
      const items = (data.items || []).filter((it) => it && it.name && typeof it.cal === "number");
      if (!items.length) throw new Error("couldn't break that meal into ingredients — try a clearer photo");
      setEstimateItems(items.map((it, i) => ({
        id: i, raw: `${it.name}${it.amount ? ` (${it.amount})` : ""}`,
        name: String(it.name).toLowerCase().slice(0, 50),
        cal: String(Math.round(it.cal)), p: String(Math.round(it.protein || 0)), f: String(Math.round(it.fiber || 0)),
        ft: null, portion: "",
        note: `${data.dish ? data.dish + " · " : ""}${it.amount || "photo estimate"} · edit anything`,
      })));
      setEstimateNote(`Drafted ${items.length} ingredient${items.length === 1 ? "" : "s"} from your ${data.dish || "meal"} — remove any, fix portions, then add.`);
    } catch (e) {
      setEstimateNote(`Meal read failed (${e.message}).`);
    }
    setEstimating(false);
  };

  const saveSettings = async () => {
    const ct = parseInt(calDraft, 10), sg = parseInt(stepDraft, 10), pg = parseInt(protDraft, 10), fg = parseInt(fibDraft, 10), bs = parseInt(boostDraft, 10);
    const next = Object.assign({}, settings, {
      calTarget: !isNaN(ct) && ct > 0 ? ct : settings.calTarget,
      stepGoal: !isNaN(sg) && sg > 0 ? sg : settings.stepGoal,
      proteinGoal: !isNaN(pg) && pg > 0 ? pg : settings.proteinGoal,
      fiberGoal: !isNaN(fg) && fg > 0 ? fg : settings.fiberGoal,
      weekendShift: !isNaN(bs) ? Math.max(0, Math.min(400, bs)) : (settings.weekendShift || 0),
    });
    setSettings(next); await sset(K.settings, next);
    return next;
  };

  const prefillGoalDrafts = () => {
    setCalDraft(String(settings.calTarget)); setStepDraft(String(settings.stepGoal));
    setProtDraft(String(settings.proteinGoal)); setFibDraft(String(settings.fiberGoal));
    setBoostDraft(String(settings.weekendShift || 0));
    setPartialDraft(String(settings.partialThreshold || 1000));
    setAiDraft(settings.aiUrl || "");
  };

  /* ---------- AI lookup settings ---------- */
  const saveAiUrl = async () => {
    const url = aiDraft.trim().replace(/\/+$/, "");
    if (!url) {
      const next = Object.assign({}, settings);
      delete next.aiUrl;
      setSettings(next); await sset(K.settings, next);
      setAiNote("AI lookup off — back to USDA + Open Food Facts.");
      return;
    }
    if (!/^https:\/\/.+/.test(url)) { setAiNote("That doesn't look right — the Worker URL starts with https://"); return; }
    const next = Object.assign({}, settings, { aiUrl: url });
    setSettings(next); await sset(K.settings, next);
    setAiNote("Saved. Testing with '1 banana'…");
    try {
      const items = await aiLookup(url, "1 banana");
      setAiNote(items.length
        ? `Working — Claude says a banana runs about ${items[0].cal} cal. New foods now go through it.`
        : "Saved, but the test came back empty — check the Worker code and its ANTHROPIC_API_KEY secret.");
    } catch (e) {
      setAiNote(`Saved, but the test failed (${e.message}). Check the Worker URL and that it's deployed.`);
    }
  };

  /* ---------- device sync handlers ---------- */
  const syncWorkerUrl = () => (syncUrlDraft.trim() || settings.aiUrl || "").replace(/\/+$/, "");
  const startSync = async () => {
    const url = syncWorkerUrl();
    if (!/^https:\/\/.+/.test(url)) { setSyncNote("Needs your Worker URL (https://…workers.dev) — same one as the AI lookup."); return; }
    const code = genSyncCode();
    const kts = {};
    const now = Date.now();
    const { keys } = await window.storage.list("sh:");
    for (const k of keys) if (!String(k).startsWith("sh:photo")) kts[k] = now;
    kts["mm:customfoods"] = now;
    syncCfgSet({ url, code, rev: 0, kts, dirty: true });
    setSyncNote("Setting up…");
    const r = await syncNow("start");
    if (r.ok) {
      setSyncInfo(syncCfg()); setSyncNote(""); setSyncShowCode(true);
      flash("Sync is on — enter the code on your other device");
    } else {
      syncCfgSet(null); setSyncInfo(null);
      setSyncNote(`Couldn't reach the Worker (${r.err}). Is the MM_SYNC KV binding set up? Steps 5–6 in cloudflare-worker.js.`);
    }
  };
  const joinSync = async () => {
    const url = syncWorkerUrl();
    const code = syncCodeDraft.trim().toUpperCase();
    if (!/^https:\/\/.+/.test(url)) { setSyncNote("Needs the Worker URL from your first device."); return; }
    if (code.replace(/-/g, "").length < 12) { setSyncNote("That code looks too short — copy it exactly from the other device."); return; }
    syncCfgSet({ url, code, rev: 0, kts: {}, dirty: true });
    setSyncNote("Connecting…");
    const r = await syncNow("join");
    if (r.ok) {
      setSyncInfo(syncCfg()); setSyncNote(""); setSyncCodeDraft("");
      if (!r.changedLocal) flash("Connected — this device is up to date");
    } else {
      syncCfgSet(null); setSyncInfo(null);
      setSyncNote(`Couldn't connect (${r.err}). Check the URL and code.`);
    }
  };
  const syncNowClick = async () => {
    setSyncNote("Syncing…");
    const r = await syncNow("manual");
    setSyncInfo(syncCfg());
    setSyncNote(r.ok ? "" : `Sync failed (${r.err}).`);
  };
  const stopSync = () => {
    syncCfgSet(null); setSyncInfo(null); setSyncShowCode(false);
    flash("Sync is off on this device. Local data stays put.");
  };

  /* ---------- chat mode: talk to the tracker ----------
     The Worker's /chat endpoint runs one model turn; tools execute HERE,
     against the same on-device day/weight data as the rest of the app. */
  useEffect(() => {
    if (!loaded) return;
    (async () => { const c = await sget(K.chat); if (Array.isArray(c)) setChatMsgs(c); })();
  }, [loaded]);
  useEffect(() => {
    if (chatEndRef.current) chatEndRef.current.scrollIntoView({ block: "nearest" });
  }, [chatMsgs, chatBusy]);
  const persistChat = (msgs) => sset(K.chat, msgs.slice(-60));

  /* trim for the model: walk back to a plain user-text message so
     tool_use/tool_result pairs are never orphaned (the first message
     of a transcript is always plain user text) */
  const trimChat = (msgs) => {
    let start = Math.max(0, msgs.length - 16);
    while (start > 0 && !(msgs[start].role === "user" && typeof msgs[start].content === "string")) start--;
    return msgs.slice(start);
  };

  const execChatTools = (toolUses, baseTotal) => {
    const results = [];
    const result = (t, obj, isError) => results.push({ type: "tool_result", tool_use_id: t.id, content: typeof obj === "string" ? obj : JSON.stringify(obj), is_error: !!isError });
    if (day.closed) { toolUses.forEach((t) => result(t, "Today is already closed — reopen it from the day-close card first.", true)); return Promise.resolve(results); }
    const logs = toolUses.filter((t) => t.name === "log_food");
    const others = toolUses.filter((t) => t.name !== "log_food");
    const work = async () => {
      if (logs.length) {
        await addEntries(logs.map((t) => ({
          name: String(t.input.name || "item").slice(0, 50),
          cal: Math.round(t.input.cal) || 0,
          p: Math.round(t.input.protein || 0),
          f: Math.round(t.input.fiber || 0),
        })));
        let run = baseTotal;
        for (const t of logs) {
          run += Math.round(t.input.cal) || 0;
          result(t, { ok: true, logged: t.input.name, cal: Math.round(t.input.cal) || 0, today_total: run, remaining: budgetShown - run });
        }
      }
      let mutated = logs.length > 0; /* day state is stale after a write — one change per message */
      for (const t of others) {
        /* log_weight and save_food don't touch the day, so they're never gated */
        if (mutated && t.name !== "log_weight" && t.name !== "save_food") { result(t, "Only one edit or delete per message — ask again for the next change.", true); continue; }
        if (t.name === "edit_food_entry" || t.name === "delete_food_entry") {
          const q = normalizeFood(String(t.input.match || ""));
          const hit = day.entries.find((e) => normalizeFood(e.name).includes(q) || (q && q.includes(normalizeFood(e.name))));
          if (!hit) { result(t, `No entry today matching "${t.input.match}". Today's log: ${day.entries.map((e) => e.name).join(", ") || "empty"}.`, true); continue; }
          mutated = true;
          if (t.name === "delete_food_entry") {
            await commitDay(Object.assign({}, day, { entries: day.entries.filter((e) => e.id !== hit.id), del: [...(day.del || []), hit.id] }));
            result(t, { ok: true, deleted: hit.name, cal: hit.cal, today_total: baseTotal - hit.cal });
          } else {
            const entries = day.entries.map((e) => e.id === hit.id ? Object.assign({}, e, {
              name: t.input.name != null ? String(t.input.name).slice(0, 50) : e.name,
              cal: t.input.cal != null ? Math.round(t.input.cal) : e.cal,
              p: t.input.protein != null ? Math.round(t.input.protein) : e.p,
              f: t.input.fiber != null ? Math.round(t.input.fiber) : e.f,
              m: Date.now(),
            }) : e);
            await commitDay(Object.assign({}, day, { entries }));
            result(t, { ok: true, edited: hit.name });
          }
        } else if (t.name === "log_weight") {
          const ok = await saveWeight(String(t.input.weight));
          result(t, ok ? { ok: true, weight: t.input.weight } : "that doesn't look like a valid weight", !ok);
        } else if (t.name === "save_food") {
          /* remembering a food never counts as the day's one mutation */
          const key = saveCustomFood({ name: t.input.name, cal: t.input.cal, p: t.input.protein, f: t.input.fiber, g: t.input.grams });
          result(t, key ? { ok: true, saved: key, cal: Math.round(t.input.cal) || 0 } : "needs at least a name and calories", !key);
        } else {
          result(t, `unknown tool ${t.name}`, true);
        }
      }
      return results;
    };
    return work();
  };

  const sendChat = async (textArg) => {
    const text = (typeof textArg === "string" ? textArg : chatInput).trim();
    if (!text || chatBusy || !settings.aiUrl) return;
    setChatBusy(true); setChatInput("");
    let msgs = [...chatMsgs, { role: "user", content: text }];
    setChatMsgs(msgs); persistChat(msgs);
    try {
      const ydoc = await sget(K.day(shiftDate(today, -1)));
      const context = {
        date: today,
        pool_day: poolDay,
        budget_today: budgetShown,
        today_total: total,
        remaining,
        weekend_pool: poolDay ? pool : undefined,
        pool_spent: poolDay ? poolSpent : undefined,
        protein_today: totP, protein_goal: settings.proteinGoal,
        fiber_today: totF, fiber_goal: settings.fiberGoal,
        entries_today: day.entries.map((e) => ({ name: e.name, cal: e.cal })),
        entries_yesterday: ((ydoc && ydoc.entries) || []).map((e) => ({ name: e.name, cal: e.cal })),
        day_closed: !!day.closed,
        weight_unit: "lb",
      };
      let baseTotal = total;
      let loggedFood = false;
      for (let round = 0; round < 5; round++) {
        const res = await fetch(settings.aiUrl + "/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: trimChat(msgs), context }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!Array.isArray(data.content)) throw new Error("unexpected reply shape");
        msgs = [...msgs, { role: "assistant", content: data.content }];
        setChatMsgs(msgs); persistChat(msgs);
        if (data.stop_reason !== "tool_use") break;
        const toolUses = data.content.filter((b) => b.type === "tool_use");
        const results = await execChatTools(toolUses, baseTotal);
        if (!day.closed && toolUses.some((t) => t.name === "log_food")) loggedFood = true;
        baseTotal += toolUses.filter((t) => t.name === "log_food").reduce((a, t) => a + (Math.round(t.input.cal) || 0), 0);
        msgs = [...msgs, { role: "user", content: results }];
        setChatMsgs(msgs); persistChat(msgs);
      }
      /* food made it into the log -> sweep the thread so the next question
         starts fresh; keep only the Coworker's final word as the receipt */
      if (loggedFood) {
        const lastA = [...msgs].reverse().find((m) => m.role === "assistant" && Array.isArray(m.content) && m.content.some((b) => b.type === "text" && b.text.trim()));
        const lastText = lastA ? lastA.content.filter((b) => b.type === "text").map((b) => b.text).join(" ").trim() : "";
        msgs = lastText ? [{ role: "assistant", content: [{ type: "text", text: lastText }] }] : [];
        setChatMsgs(msgs); persistChat(msgs);
        flash("Logged — chat swept for the next one.");
      }
    } catch (e) {
      msgs = [...msgs, { role: "assistant", content: [{ type: "text", text: `(connection hiccup — ${e.message}. Nothing was lost; try that again.)` }] }];
      setChatMsgs(msgs); persistChat(msgs);
    }
    setChatBusy(false);
  };

  const clearChat = async () => {
    setChatMsgs([]); await sset(K.chat, []);
    flash("Chat cleared. The log itself is untouched.");
  };

  /* lookup came up empty -> hand the original text to the chat below */
  const chatHandoff = (text) => {
    setEstimateItems(null); setEstimateNote(""); setDesc("");
    flash("Couldn't match that — asking the chat ↓");
    if (chatCardRef.current) chatCardRef.current.scrollIntoView({ behavior: "smooth", block: "start" });
    sendChat(text);
  };

  /* ---------- week-in-review handlers ---------- */
  const openSundayReview = () => {
    const mon = weekMonday(today);
    if ((profile.lastWeekReview || "") === mon) return;
    prefillGoalDrafts();
    setWeeklyReview(buildWeekReview(mon, history, weights, settings));
  };
  const closeWeekReview = async (confirm) => {
    if (confirm) { await saveSettings(); flash("Goals locked in. New week, clean docket."); }
    await commitProfile(Object.assign({}, profile, { lastWeekReview: weeklyReview.mon }));
    setWeeklyReview(null);
  };

  /* iOS PWAs can sit on a stale cached version for days — the footer version
     line makes "which build is this device on?" answerable, and tapping it
     asks the service worker to check right now */
  const checkForUpdate = async () => {
    try {
      const reg = "serviceWorker" in navigator ? await navigator.serviceWorker.getRegistration() : null;
      if (reg) { await reg.update(); flash("Checked. A newer version installs and reloads on its own."); }
      else flash("No service worker registered — nothing to update.");
    } catch (e) { flash(`Update check failed: ${e.message}`); }
  };

  /* ---------- period tracker ---------- */
  const togglePeriodToday = async () => {
    const next = periodSet.has(today) ? periods.filter((d) => d !== today) : [...periods, today].sort();
    setPeriods(next); await sset(K.cycle, next);
    flash(periodSet.has(today) ? "Unmarked today" : "The audacity. Marked — the weight trend will account for it.");
  };

  /* ---------- voice dictation for the food field ---------- */
  const toggleDictation = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { flash("No dictation in this browser — the keyboard mic works too"); return; }
    if (listening) { try { recRef.current && recRef.current.stop(); } catch {} return; }
    const rec = new SR();
    recRef.current = rec;
    rec.lang = navigator.language || "en-US";
    rec.interimResults = true;
    const base = desc.trim() ? desc.trim() + " " : "";
    rec.onresult = (e) => {
      let text = "";
      for (const res of e.results) text += res[0].transcript;
      setDesc((base + text).trimStart());
    };
    rec.onend = () => setListening(false);
    rec.onerror = (e) => { setListening(false); if (e.error !== "aborted" && e.error !== "no-speech") flash(`Dictation hiccup (${e.error}) — try again or type it`); };
    try { rec.start(); setListening(true); } catch { flash("Couldn't start the microphone"); }
  };

  /* ---------- Close the Day ritual ---------- */
  const startClose = () => setCloseFlow({ step: 1, steps: day.steps ? String(day.steps) : "", weight: "" });

  const finishClose = async () => {
    let d = day;
    const n = parseInt(closeFlow.steps, 10);
    if (!isNaN(n) && n >= 0 && n !== day.steps) { d = Object.assign({}, d, { steps: n, sm: Date.now(), so: "close" }); }
    let wLogged = weights.some((w) => w.d === today);
    if (closeFlow.weight) { const ok = await saveWeight(closeFlow.weight); if (ok) wLogged = true; }

    const liveOnPlan = onPlanCal(today, history, settings, today, totalCal(d));
    const stepsHit = d.steps >= settings.stepGoal;
    const w = windowsFilled(d);
    const windowCount = [w.morning, w.midday, w.evening].filter(Boolean).length;
    const qDone = quests.map((q) => (q.manual ? !!d.mq[q.id] : q.test({ day: d, settings, weights, onPlanNow: liveOnPlan }))).filter(Boolean).length;

    const yesterday = shiftDate(today, -1);
    const yRec = history[yesterday];
    const yQualified = (yRec && yRec.shield) || (yRec && yRec.c > 0 && yRec.s >= settings.stepGoal && onPlanCal(yesterday, history, settings, null, null));
    const comeback = !yQualified && d.entries.length > 0;

    let xp = 20;
    const lines = [{ t: "Closed the day", v: 20 }];
    if (liveOnPlan) { xp += 30; lines.push({ t: "On plan", v: 30 }); }
    if (stepsHit) { xp += 25; lines.push({ t: "Step goal", v: 25 }); }
    if (qDone > 0) { xp += qDone * 15; lines.push({ t: `Quests ×${qDone}`, v: qDone * 15 }); }
    if (qDone === 3) { xp += 25; lines.push({ t: "Full quest board", v: 25 }); }
    if (wLogged) { xp += 10; lines.push({ t: "Weigh-in", v: 10 }); }
    const pHit = totalProt(d) >= settings.proteinGoal;
    const fHit = totalFib(d) >= settings.fiberGoal;
    if (pHit) { xp += 15; lines.push({ t: "Protein goal", v: 15 }); }
    if (fHit) { xp += 15; lines.push({ t: "Fiber goal", v: 15 }); }
    if (pHit && fHit) { xp += 10; lines.push({ t: "Macro Sweep", v: 10 }); }
    if (comeback) { xp += 40; lines.push({ t: "COMEBACK", v: 40 }); }

    const score = (liveOnPlan ? 40 : 0) + Math.min(30, Math.round((d.steps / settings.stepGoal) * 30)) + Math.round((windowCount / 3) * 20) + Math.round((qDone / 3) * 10);

    let prof = Object.assign({}, profile, { xp: profile.xp + xp });
    let tokenEarned = false;
    if (liveOnPlan && stepsHit) {
      prof.perfect = (prof.perfect || 0) + 1;
      if (prof.perfect % 7 === 0 && (prof.tokens || 0) < 3) { prof.tokens = (prof.tokens || 0) + 1; tokenEarned = true; }
    }
    const newStreak = (liveOnPlan && stepsHit && d.entries.length > 0 ? 1 : 0) + (() => { let c = 0, cur = yesterday; while (streakSafe(cur)) { c++; cur = shiftDate(cur, -1); } return c; })();
    if (newStreak > (prof.bestStreak || 0)) prof.bestStreak = newStreak;

    const beforeLevel = levelFromXp(profile.xp);
    const afterLevel = levelFromXp(prof.xp);

    d = Object.assign({}, d, { closed: true, xp: d.xp + xp });
    await commitDay(d);
    await commitProfile(prof);

    let onPlan14 = 0;
    for (let i = 1; i <= 13; i++) if (dayQual(shiftDate(today, -i))) onPlan14++;
    if (liveOnPlan && stepsHit) onPlan14++;
    let weekSteps = 0;
    const mon = weekMonday(today);
    for (let i = 0; i < 7; i++) { const ds = shiftDate(mon, i); if (ds > today) break; weekSteps += ds === today ? d.steps : (history[ds] && history[ds].s) || 0; }
    const wd = weightSorted.length >= 2 ? weightSorted[weightSorted.length - 1].w - weightSorted[0].w : null;
    let protein7 = pHit ? 1 : 0;
    for (let i = 1; i < 7; i++) { const ds = shiftDate(today, -i); if (((history[ds] && history[ds].p) || 0) >= settings.proteinGoal) protein7++; }

    setCloseFlow({
      step: 4,
      reveal: {
        score, xp, lines, tokenEarned,
        levelUp: afterLevel > beforeLevel ? afterLevel : null,
        evidence: evidenceLine({ date: today, comeback, onPlan14, streak: newStreak, bestStreak: prof.bestStreak, weekSteps, stepGoal: settings.stepGoal, weightDelta: wd, protein7 }),
        closer: (() => {
          const l = pickLine(tokenEarned || afterLevel > beforeLevel ? "official" : "confession");
          return l ? l.text.split("{level}").join(afterLevel) : "";
        })(),
      },
    });
  };

  /* ---------- photos ---------- */
  const addPhoto = async (file) => {
    if (!file) return;
    setPhotoBusy(true); setPhotoNote("");
    try {
      const dataUrl = await compressImage(file);
      const ok = await sset(K.photo(today), dataUrl);
      if (!ok) { setPhotoNote("Couldn't save. Storage may be full."); setPhotoBusy(false); return; }
      setPhotos((prev) => Object.assign({}, prev, { [today]: dataUrl }));
      if (!photoIndex.includes(today)) {
        const next = [...photoIndex, today].sort();
        setPhotoIndex(next); await sset(K.photoIndex, next);
      }
      setPhotoNote("Saved. One photo per day; a new upload replaces it.");
    } catch { setPhotoNote("Couldn't process that image."); }
    setPhotoBusy(false);
  };
  const deletePhoto = async (ds) => {
    try { await window.storage.delete(K.photo(ds)); } catch {}
    const next = photoIndex.filter((x) => x !== ds);
    setPhotoIndex(next); await sset(K.photoIndex, next);
    setPhotos((prev) => { const n = Object.assign({}, prev); delete n[ds]; return n; });

  };

  const exportData = async () => {

      for (const ds of Object.keys(history)) { const d = await sget(K.day(ds)); if (d) bundle.days[ds] = d; }
      const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `macros-and-miles-backup-${todayStr()}.json`; a.click();
      URL.revokeObjectURL(url);

  if (!loaded) return <div style={{ fontFamily: "system-ui", padding: 40, color: "#1E1A1C" }}>Loading…</div>;


  /* Tab contents as reusable fragments: phones show one at a time behind

  const chatContent = (

            {listening && <div className="note">Listening… speak the meal, tap ◼ when done.</div>}
            <div className="row">

              <input inputMode="numeric" value={fibInput} onChange={(e) => setFibInput(e.target.value)} placeholder="fiber g" aria-label="Fiber grams" />
            </div>

                        onClick={() => { const k = saveCustomFood({ name: it.name, cal: parseInt(it.cal, 10), p: parseInt(it.p, 10) || 0, f: parseInt(it.f, 10) || 0, ft: it.ft }); if (k) flash(`Saved "${k}" — future lookups and typing will find it`); }}>☆</button>
                      <button className="tinybtn" title="Remove item" aria-label={`Remove ${it.raw}`} onClick={() => removeEstimateItem(it.id)}>✕</button>

                    <div className="row" style={{ marginTop: 6 }}>

                    {it.portion.trim() !== "" && (parsePortion(it.portion) == null

                  <input inputMode="decimal" value={labelForm.g} onChange={(e) => setLabelForm(Object.assign({}, labelForm, { g: e.target.value }))} placeholder="serving size (g or ml, optional)" aria-label="Serving size in grams or milliliters" />
                  <select value={labelForm.ft || ""} onChange={(e) => setLabelForm(Object.assign({}, labelForm, { ft: e.target.value }))} aria-label="Fiber freebie tier">

                    <input type="checkbox" style={{ width: "auto" }} checked={labelForm.liquid} onChange={(e) => setLabelForm(Object.assign({}, labelForm, { liquid: e.target.checked }))} /> it's a drink

          <div className="card">

          </div>

          <div className="card">

          <div className="card">

            <div className="row" style={{ marginTop: 6 }}>

              <button style={{ width: "100%" }} onClick={() => (restoreArm ? restorePantry() : setRestoreArm(true))} onBlur={() => setRestoreArm(false)}>
                {restoreArm ? "Really restore the factory pantry? Tap again" : "Restore default pantry"}

          </div>

          <div className="card">

              <React.Fragment>

                  <div className="row" style={{ marginTop: 4 }}><button style={{ width: "100%" }} onClick={() => setSyncShowCode(true)}>Show code</button></div>

                <div className="row" style={{ marginTop: 10 }}>
                  <button className="pri" style={{ flex: 1 }} onClick={syncNowClick}>Sync now</button>
                  <button onClick={stopSync}>Turn off</button>
                </div>
              </React.Fragment>
            )}
            {syncNote && <div className="note">{syncNote}</div>}

          <div className="card">

          <div className="sub num" style={{ textAlign: "center", marginTop: 4, cursor: "pointer" }} role="button" tabIndex={0}
            aria-label="App version — tap to check for updates" onClick={checkForUpdate}>
            Macros &amp; Miles · {APP_VERSION} · tap to check for updates
          </div>
        </React.Fragment>
  );

                </div>
                <div className="row">
                  <button onClick={() => { const c = parseInt(calInput, 10); if (desc.trim() && !isNaN(c)) addEntry(desc, c); }} disabled={!desc.trim() || !calInput}>Add item</button>
                  <button className="pri" style={{ flex: 1 }} disabled={day.entries.length === 0} onClick={() => setCloseFlow(Object.assign({}, closeFlow, { step: 2 }))}>Food's complete →</button>
                </div>
              </React.Fragment>
            )}
            {closeFlow.step === 2 && (
              <React.Fragment>
                <div className="stepno">Close the day · 2 of {askWeightAtClose ? 3 : 2}</div>
                <h3>Final step count</h3>
                <div className="sub">Glance at the watch. What's the number?{!askWeightAtClose && weightLoggedToday ? " Weigh-in's already in from this morning." : !askWeightAtClose && weighMode !== "close" ? " (Weigh-ins are set to the morning — no weight step here.)" : ""}</div>
                <div className="row">
                  <input inputMode="numeric" value={closeFlow.steps} onChange={(e) => setCloseFlow(Object.assign({}, closeFlow, { steps: e.target.value }))} placeholder="Steps" />
                </div>
                <div className="row">
                  <button onClick={() => setCloseFlow(Object.assign({}, closeFlow, { step: 1 }))}>← Back</button>
                  {askWeightAtClose
                    ? <button className="pri" style={{ flex: 1 }} onClick={() => setCloseFlow(Object.assign({}, closeFlow, { step: 3 }))}>Next →</button>
                    : <button className="ink" style={{ flex: 1 }} onClick={finishClose}>Reveal my numbers</button>}
                </div>
              </React.Fragment>
            )}
            {closeFlow.step === 3 && askWeightAtClose && (
              <React.Fragment>
                <div className="stepno">Close the day · 3 of 3</div>
                <h3>Weigh-in? (optional, +10 XP)</h3>
                <div className="row">
                  <input inputMode="decimal" value={closeFlow.weight} onChange={(e) => setCloseFlow(Object.assign({}, closeFlow, { weight: e.target.value }))} placeholder="Skip or enter weight" />
                </div>
                <div className="row">
                  <button onClick={() => setCloseFlow(Object.assign({}, closeFlow, { step: 2 }))}>← Back</button>
                  <button className="ink" style={{ flex: 1 }} onClick={finishClose}>Reveal my numbers</button>
                </div>
              </React.Fragment>
            )}
            {closeFlow.step === 4 && closeFlow.reveal && (
              <React.Fragment>
                <div className="stepno">Day closed</div>
                <div className="reveal-score num" style={{ color: closeFlow.reveal.score >= 70 ? "#52B52E" : closeFlow.reveal.score >= 40 ? "#F0A800" : "#FF5FA2" }}>{closeFlow.reveal.score}</div>
                <div className="reveal-label">Day score</div>
                <div className="reveal-quip">{scoreQuip(closeFlow.reveal.score)}</div>
                <div style={{ marginTop: 14 }}>
                  {closeFlow.reveal.lines.map((l, i) => (
                    <div className="xpline" key={i}><span>{l.t}</span><span className="v num">+{l.v} XP</span></div>
                  ))}
                  <div className="xpline" style={{ borderBottom: "none" }}><span style={{ fontWeight: 800 }}>Total</span><span className="v num" style={{ fontWeight: 800 }}>+{closeFlow.reveal.xp} XP</span></div>
                </div>
                {closeFlow.reveal.tokenEarned && <div className="note" style={{ color: "#52B52E" }}><MIcon k="shield" size={12} /> Rest Day token earned — 7 perfect days banked one automatic shield.</div>}
                {closeFlow.reveal.levelUp && <div className="note" style={{ color: "#7C48D8" }}>LEVEL {closeFlow.reveal.levelUp} — new analytics unlocked in Trends.</div>}
                <div className="evidence">{closeFlow.reveal.evidence}</div>
                {closeFlow.reveal.closer && <div className="sub" style={{ textAlign: "center", marginTop: 10 }}>{closeFlow.reveal.closer}</div>}
                <div className="row"><button className="pri" style={{ width: "100%" }} onClick={() => { setCloseFlow(null); if (dow(today) === 0) openSundayReview(); }}>Done</button></div>
              </React.Fragment>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Streakhouse />);
</script>
</body>
</html>
