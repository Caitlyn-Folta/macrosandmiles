/* ============ IndexedDB storage shim ============
   Same API shape as the Claude artifact's window.storage,
   so the component code below is unchanged where it calls it.
   IndexedDB has no meaningful size cap, which matters for photos. */
(function () {
  let dbp = null;
  function open() {
    if (dbp) return dbp;
    dbp = new Promise((res, rej) => {
      const r = indexedDB.open("macros-miles", 1);
      r.onupgradeneeded = () => r.result.createObjectStore("kv");
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
    return dbp;
  }
  async function tx(mode, fn) {
    const db = await open();
    return new Promise((res, rej) => {
      const t = db.transaction("kv", mode);
      const req = fn(t.objectStore("kv"));
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  }
  window.storage = {
    async get(key) {
      const v = await tx("readonly", (s) => s.get(key));
      return v === undefined ? null : { key, value: v };
    },
    async set(key, value) {
      await tx("readwrite", (s) => s.put(value, key));
      return { key, value };
    },
    async delete(key) {
      await tx("readwrite", (s) => s.delete(key));
      return { key, deleted: true };
    },
    async list(prefix) {
      const keys = await tx("readonly", (s) => s.getAllKeys());
      return { keys: prefix ? keys.filter((k) => String(k).startsWith(prefix)) : keys };
    },
  };
})();

/* Ask the browser to protect IndexedDB from eviction (best effort) */
if (navigator.storage && navigator.storage.persist) navigator.storage.persist();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js", { updateViaCache: "none" }));
  /* when an updated service worker takes over, reload once so the new
     version appears on THIS open instead of after two open/close cycles */
  let swRefreshed = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (swRefreshed || !navigator.serviceWorker.controller) return;
    swRefreshed = true;
    window.location.reload();
  });
}
</script>

/* portion text -> fraction of a serving: "0.4", "40%", "2/3". null when unparseable. */
function parsePortion(str) {
  const t = String(str || "").trim();
  let f = null, m;
  if ((m = t.match(/^(\d+(?:\.\d+)?)\s*%$/))) f = parseFloat(m[1]) / 100;
  else if ((m = t.match(/^(\d+(?:\.\d+)?)\s*\/\s*(\d+(?:\.\d+)?)$/))) f = parseFloat(m[1]) / parseFloat(m[2]);
  else if ((m = t.match(/^(\d*\.\d+|\d+(?:\.\d+)?)$/))) f = parseFloat(m[1]);
  return f != null && isFinite(f) && f >= 0.05 && f <= 10 ? f : null;
}
const PRETTY_FRAC = { "1/4": "¼", "1/3": "⅓", "1/2": "½", "2/3": "⅔", "3/4": "¾", "0.25": "¼", "0.5": "½", "0.75": "¾" };

/* Health Shortcut clipboards arrive as "7,542", "7542.0", or a whole list of
   per-source samples on separate lines. Parse each number properly (commas are
   thousands separators, a trailing .0 is a decimal — never digits to keep) and
   take the LARGEST: today's count is cumulative, so the biggest reading is the
   current total. Naive digit-stripping used to concatenate these into a
   monster number that looked like steps stacking on top of each other. */
function parseStepsText(txt) {
  const nums = (String(txt || "").match(/\d[\d,]*(?:\.\d+)?/g) || [])
    .map((s) => Math.round(parseFloat(s.replace(/,/g, ""))))
    .filter((n) => isFinite(n) && n > 0 && n < 200000);
  return nums.length ? Math.max(...nums) : null;
}

};

const shortDate = (ds) => { const [, m, d] = ds.split("-"); return `${Number(m)}/${Number(d)}`; };
const dow = (ds) => { const [y, m, d] = ds.split("-").map(Number); return new Date(y, m - 1, d).getDay(); };
const isPoolDay = (ds) => { const w = dow(ds); return w === 5 || w === 6 || w === 0; };
const weekMonday = (ds) => { const w = dow(ds); return shiftDate(ds, w === 0 ? -6 : 1 - w); };

const hashStr = (s) => { let h = 2166136261; for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); } return Math.abs(h); };
const totalCal = (day) => day.entries.reduce((a, e) => a + e.cal, 0);

/* ---------- weekly banking math ----------
   weekendShift moves calories from each Mon-Thu day into the Fri-Sun pool:
   weekday budget = calTarget - shift, base pool = 3*calTarget + 4*shift.
   The weekly total stays 7 * calTarget either way. */
const weekendShiftOf = (settings) => Math.max(0, settings.weekendShift || 0);
const weekdayTarget = (settings) => settings.calTarget - weekendShiftOf(settings);
const poolBase = (settings) => 3 * settings.calTarget + 4 * weekendShiftOf(settings);
const dayBudget = (ds, settings) => (isPoolDay(ds) ? Math.round(poolBase(settings) / 3) : weekdayTarget(settings));

const calFor = (ds, history, liveDate, liveCal) => (ds === liveDate ? liveCal : history[ds]?.c ?? null);

const bankEarned = (anyDateInWeek, history, settings, liveDate, liveCal) => {
  const mon = weekMonday(anyDateInWeek);
  let bank = 0;
  for (let i = 0; i < 4; i++) {
    const ds = shiftDate(mon, i);
    const c = calFor(ds, history, liveDate, liveCal);
    if (c !== null && c > 0) bank += Math.max(0, weekdayTarget(settings) - c);
  }
  return bank;
};

const poolSpentThrough = (ds, history, liveDate, liveCal) => {
  const mon = weekMonday(ds);
  let spent = 0;
  for (let i = 4; i < 7; i++) {
    const d2 = shiftDate(mon, i);
    if (d2 > ds) break;
    const c = calFor(d2, history, liveDate, liveCal);
    if (c) spent += c;
  }
  return spent;
};

const onPlanCal = (ds, history, settings, liveDate, liveCal) => {
  const c = calFor(ds, history, liveDate, liveCal);
  if (c === null || c === 0) return false;
  if (!isPoolDay(ds)) return c <= weekdayTarget(settings);
  const pool = poolBase(settings) + bankEarned(ds, history, settings, liveDate, liveCal);
  return poolSpentThrough(ds, history, liveDate, liveCal) <= pool;
};

const dayScore = (ds, history, settings, liveDate, live) => {
  const rec = ds === liveDate ? { c: totalCal(live), s: live.steps, e: live.entries.length } : history[ds];
  if (!rec) return history[ds]?.shield ? 100 : 0;
  if (rec.shield) return 100;
  let score = 0;
  if (rec.e > 0) score += 30;
  if (onPlanCal(ds, history, settings, liveDate, ds === liveDate ? totalCal(live) : rec.c)) score += 40;
  score += Math.min(30, Math.round((rec.s / settings.stepGoal) * 30));
  return score;
};

/* Which meal window an entry belongs to. An explicit slot (chosen at log

const questsForDate = (dateStr) => {
  const pool = (isPoolDay(dateStr) ? [...WEEKEND_QUESTS, ...SHARED_QUESTS] : [...WEEKDAY_QUESTS, ...SHARED_QUESTS]);
  const idx = [...pool.keys()];
  let seed = hashStr(dateStr);
  for (let i = idx.length - 1; i > 0; i--) {
    seed = (seed * 9301 + 49297) % 233280;
    const j = seed % (i + 1);
    [idx[i], idx[j]] = [idx[j], idx[i]];
  }
  return idx.slice(0, 3).map((i) => pool[i]);
};

  return lines[hashStr(ctx.date) % lines.length];
};

/* ================================================================
   FOOD LOOKUP — Tier 1 local table, Tier 2 cache, Tier 3 USDA
   ================================================================ */

/* FOOD_DB lives in food-db.js */


const WORD_NUM = {
  a: 1, an: 1, one: 1, two: 2, three: 3, four: 4, five: 5, six: 6,
  seven: 7, eight: 8, nine: 9, ten: 10, dozen: 12,
  half: 0.5, quarter: 0.25, couple: 2, few: 3, several: 3,
  double: 2, triple: 3, single: 1,
};
const WEIGHT_UNITS = {
  g: 1, gram: 1, grams: 1, gr: 1,
  oz: 28.35, ounce: 28.35, ounces: 28.35,
  lb: 453.6, lbs: 453.6, pound: 453.6, pounds: 453.6,
  kg: 1000, kilo: 1000, kilos: 1000,
};
const VOLUME_UNITS = {
  ml: 1, milliliter: 1, milliliters: 1,
  l: 1000, liter: 1000, liters: 1000, litre: 1000,
  cup: 240, cups: 240,
  tbsp: 15, tablespoon: 15, tablespoons: 15,
  tsp: 5, teaspoon: 5, teaspoons: 5,
  "fl oz": 29.57, floz: 29.57, "fluid ounce": 29.57, "fluid ounces": 29.57,
  pint: 473, pints: 473, quart: 946,
  shot: 44, shots: 44,
  can: 355, cans: 355, bottle: 355, bottles: 355,
  glass: 200, glasses: 200,
  splash: 15, drizzle: 5, swig: 30, sip: 15,
};
const COLLOQUIAL_UNITS = {
  handful: 30, handfuls: 30,
  bite: 15, bites: 15, nibble: 10,
  forkful: 20, forkfuls: 20,
  spoonful: 15, spoonfuls: 15,
  scoop: 60, scoops: 60,
  pat: 5, dollop: 30, chunk: 40, sliver: 15,
};
const COUNT_UNITS = new Set([
  "slice", "slices", "piece", "pieces", "strip", "strips",
  "patty", "patties", "wing", "wings", "link", "links",
  "stick", "sticks", "square", "squares", "serving", "servings", "order",
]);

const normalizeFood = (s) =>
  s.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "") /* jalapeño -> jalapeno, rosé -> rose */
    .replace(/½/g, "1/2").replace(/¼/g, "1/4").replace(/¾/g, "3/4").replace(/⅓/g, "1/3")
    .replace(/\s+/g, " ").trim();

function takeNumber(s) {
  let m = s.match(/^(\d+)\s+(\d+)\s*\/\s*(\d+)\b\s*(.*)$/);
  if (m) return { qty: Number(m[1]) + Number(m[2]) / Number(m[3]), rest: m[4] };
  m = s.match(/^(\d+)\s*\/\s*(\d+)\b\s*(.*)$/);
  if (m) return { qty: Number(m[1]) / Number(m[2]), rest: m[3] };
  m = s.match(/^(\d*\.\d+|\d+(?:\.\d+)?)\s*[-–]\s*(\d*\.\d+|\d+(?:\.\d+)?)\b\s*(.*)$/);
  if (m) return { qty: (Number(m[1]) + Number(m[2])) / 2, rest: m[3] };
  m = s.match(/^(\d*\.\d+|\d+(?:\.\d+)?)\s*(.*)$/); /* \d*\.\d+ admits ".25" */
  if (m) return { qty: Number(m[1]), rest: m[2] };
  m = s.match(/^([a-z]+)\s+(.*)$/);
  if (m && WORD_NUM[m[1]] != null) {
    let rest = m[2];
    const and = rest.match(/^and\s+(?:a\s+)?half\s+(.*)$/);
    if (and) return { qty: WORD_NUM[m[1]] + 0.5, rest: and[1] };
    return { qty: WORD_NUM[m[1]], rest };
  }
  return null;
}

function takeUnit(s) {
  const two = s.match(/^([a-z]+\s[a-z]+)\.?\b\s*(.*)$/);
  if (two && VOLUME_UNITS[two[1]] != null)
    return { type: "volume", ml: VOLUME_UNITS[two[1]], rest: two[2] };
  const one = s.match(/^([a-z]+)\.?\b\s*(.*)$/);
  if (!one) return null;
  const u = one[1], rest = one[2];
  if (WEIGHT_UNITS[u] != null) return { type: "weight", grams: WEIGHT_UNITS[u], rest };
  if (VOLUME_UNITS[u] != null) return { type: "volume", ml: VOLUME_UNITS[u], rest };
  if (COLLOQUIAL_UNITS[u] != null) return { type: "weight", grams: COLLOQUIAL_UNITS[u], rough: true, rest };
  if (COUNT_UNITS.has(u)) return { type: "count", countNoun: u, rest };
  return null;
}

function parseSegment(raw) {
  let s = normalizeFood(raw);
  if (!s) return null;
  let qty = null, unit = null;

  const num = takeNumber(s);
  if (num) { qty = num.qty; s = num.rest; }

  const u = takeUnit(s);
  if (u) { unit = u; s = u.rest; }
  s = s.replace(/^of\s+/, "");

  /* filler words in front of the food name hurt every lookup tier */
  let prev;
  do { prev = s; s = s.replace(/^(?:some|my|our|his|her|the|this|that|just|leftover|leftovers)\s+/, ""); } while (s !== prev);

  if (qty === null) {
    const trail = s.match(/^(.*?)[\s,]+(\d+(?:\.\d+)?)\s*([a-z]+)\.?\s*$/);
    if (trail) {
      const tu = takeUnit(trail[3] + " ");
      if (tu) { qty = Number(trail[2]); unit = tu; s = trail[1]; }
    }
  }

  const name = s.trim();
  if (!name && !unit) return null;
  return {
    qty: qty !== null ? qty : 1,
    unit: unit ? { type: unit.type, grams: unit.grams, ml: unit.ml, rough: !!unit.rough, countNoun: unit.countNoun } : { type: "count" },
    name: name || raw.trim(),
    raw: raw.trim(),
  };
}

/* Dish names that contain "and"/"&" must survive the segment splitter —
   each has a matching FOOD_DB key so it resolves as ONE dish. */
const COMPOUND_DISHES = [
  "mac and cheese", "mac & cheese", "macaroni and cheese",
  "chips and salsa", "chips and queso",
  "fish and chips", "rice and beans", "beans and rice",
  "peanut butter and jelly", "pb & j", "pb&j",
  "biscuits and gravy", "chicken and waffles", "ham and cheese",
  "half and half", "sweet and sour",
];
const splitSegments = (desc) => {
  let s = desc;
  const stash = [];
  for (const dish of COMPOUND_DISHES) {
    const re = new RegExp(dish.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi");
    s = s.replace(re, (m) => { stash.push(m); return "\u0001" + (stash.length - 1) + "\u0001"; });
  }
  return s.split(/\+|,|&|\band\b|\bwith\b|\bw\/\b|\bplus\b/i)
    .map((x) => x.replace(/\u0001(\d+)\u0001/g, (_, i) => stash[Number(i)]).trim())
    .filter(Boolean);
};

function scaleFactor(parsed, entry) {
  const { qty, unit } = parsed;
  if (unit.type === "count") return { factor: qty, rough: false };
  if (unit.type === "weight" && entry.liquid && entry.ml)
    return { factor: (qty * unit.grams) / entry.ml, rough: unit.rough }; /* grams ≈ ml for drinks */
  if (unit.type === "weight") {
    if (entry.g) return { factor: (qty * unit.grams) / entry.g, rough: unit.rough };
    return { factor: (qty * unit.grams) / 150, rough: true };
  }
  if (entry.ml) return { factor: (qty * unit.ml) / entry.ml, rough: false };
  if (entry.g) return { factor: (qty * unit.ml * 0.85) / entry.g, rough: true };
  return { factor: qty, rough: true };
}

const applyFactor = (entry, name, factor, rough) => ({
  name,
  cal: Math.round(entry.c * factor),
  p: Math.round((entry.p || 0) * factor),
  f: Math.round((entry.f || 0) * factor),
  rough,
  ft: entry.ft || null, /* fiber-freebie tier rides along; applied only at log time */
});

/* Fiber Freebies: the typed text saying a vegetable is cooked disqualifies the
   tag even when the words fuzzy-matched a raw entry — cooked greens concentrate
   calories and are never freebies. */
const COOKED_RE = /\b(cooked|saut[eé]ed|roasted|steamed|grilled|fried|baked|creamed|stir[- ]?fried)\b/i;

/* ---------- custom foods (user-created via nutrition label scan or manual entry) ----------
   Same shape as FOOD_DB entries: { k: [name], c, p, f, g?, ml?, liquid? }. */
const CUSTOM_KEY = "mm:customfoods:v1";
function customLoad() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_KEY) || "[]"); } catch { return []; }
}
function customStore(list) {
  try { localStorage.setItem(CUSTOM_KEY, JSON.stringify(list)); syncTouch("mm:customfoods"); } catch {}
}

function localMatch(name) {
  const scan = (list) => {
    let best = null;
    for (const item of list)
      for (const kk of item.k)
        if (name.includes(kk) && (!best || kk.length > best.kl)) best = { entry: item, kl: kk.length, key: kk };
    return best;
  };
  /* user-created foods win over the built-in table */
  const custom = scan(customLoad());
  if (custom) return Object.assign(custom, { custom: true });
  return scan(FOOD_DB);
}

function cacheGet(name) {
  try {
    const c = JSON.parse(localStorage.getItem(CACHE_KEY) || "{}");
    return c[name] || null;
  } catch { return null; }
}
function cachePut(name, entry) {
  try {
    const c = JSON.parse(localStorage.getItem(CACHE_KEY) || "{}");
    c[name] = entry;
    localStorage.setItem(CACHE_KEY, JSON.stringify(c));
  } catch {}
}

/* ---------- AI lookup (optional) ----------
   A personal Cloudflare Worker (see cloudflare-worker.js in the repo) that
   asks Claude to split a whole food description and estimate each item.
   Results cache by the full normalized text, so a repeated phrase never
   costs a second call. The Worker URL lives in settings, not in this file. */
const AI_CACHE_KEY = "mm:aicache:v1";
function aiCacheGet(text) {
  try {
    const c = JSON.parse(localStorage.getItem(AI_CACHE_KEY) || "{}");
    return c[text] ? c[text].items : null;
  } catch { return null; }
}
function aiCachePut(text, items) {
  try {
    const c = JSON.parse(localStorage.getItem(AI_CACHE_KEY) || "{}");
    c[text] = { items, t: Date.now() };
    const keys = Object.keys(c);
    if (keys.length > 150)
      keys.sort((a, b) => (c[a].t || 0) - (c[b].t || 0)).slice(0, keys.length - 150).forEach((k) => delete c[k]);
    localStorage.setItem(AI_CACHE_KEY, JSON.stringify(c));
  } catch {}
}

async function aiLookup(aiUrl, text) {
  const res = await fetch(aiUrl, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text: text.slice(0, 600) }),
  });
  if (!res.ok) throw new Error(`AI lookup HTTP ${res.status}`);
  const data = await res.json();
  if (!data || !Array.isArray(data.items)) throw new Error("AI lookup returned an unexpected shape");
  return data.items.filter((it) => it && it.name && typeof it.cal === "number");
}

/* cache-aware wrapper; returns null on any failure so callers can fall back */
async function aiEstimate(aiUrl, desc) {
  const key = normalizeFood(desc).slice(0, 300);
  const cached = aiCacheGet(key);
  if (cached) return cached;
  try {
    const items = await aiLookup(aiUrl, desc);
    if (items.length) aiCachePut(key, items);
    return items;
  } catch { return null; }
}

/* ---------- device sync (optional) ----------
   Backed by the same Cloudflare Worker (its /sync endpoint + a KV store).
   The whole dataset — except photos, which are too big — travels as one
   document of { key: { v: json-string, t: last-touched-ms } }. Each device
   keeps its own touch times (mm:sync:v1 in localStorage, never synced) and
   on every sync pulls, merges, and pushes: newest edit wins per key, but
   day logs union their entries, and period days / custom foods / history
   union too, so two devices logging the same day both keep their food.
   Auth is the sync code alone — treat it like a password. */
const SYNC_CFG_KEY = "mm:sync:v1";
const syncCfg = () => { try { return JSON.parse(localStorage.getItem(SYNC_CFG_KEY) || "null"); } catch { return null; } };
const syncCfgSet = (c) => { try { c ? localStorage.setItem(SYNC_CFG_KEY, JSON.stringify(c)) : localStorage.removeItem(SYNC_CFG_KEY); } catch {} };

const genSyncCode = () => {
  const alpha = "ABCDEFGHJKMNPQRSTVWXYZ23456789"; /* no 0/O/1/I/L/U */
  const a = new Uint8Array(20);
  crypto.getRandomValues(a);
  return [...a].map((b) => alpha[b % alpha.length]).join("").replace(/(.{5})(?!$)/g, "$1-");
};

let syncTimer = null;
let syncBusy = false;
let syncApplying = false; /* true while adopting remote values, so those writes don't re-touch */
let syncOnChange = null;  /* app hook: remote changes were applied locally */
let syncOnStatus = null;  /* app hook: { ok, at?, err? } after each attempt */

function syncTouch(key) {
  if (syncApplying) return;
  const cfg = syncCfg();
  if (!cfg) return;
  cfg.kts = cfg.kts || {};
  cfg.kts[key] = Date.now();
  cfg.dirty = true;
  syncCfgSet(cfg);
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => { syncNow("change"); }, 4000);
}

/* Push NOW instead of waiting out the 4s debounce. iOS freezes the page the
   moment the PWA is backgrounded, so a pending debounce timer silently dies —
   which is exactly what happens after paste-and-close actions like a steps
   import. keepalive lets the browser finish the request after suspension. */
let syncUrgent = false;
function syncFlush(reason) {
  const cfg = syncCfg();
  if (!cfg || !cfg.dirty || syncBusy) return;
  clearTimeout(syncTimer);
  syncUrgent = true;
  Promise.resolve(syncNow(reason || "flush")).finally(() => { syncUrgent = false; });
}

const syncReadRaw = async (k) =>
  k === "mm:customfoods" ? (localStorage.getItem(CUSTOM_KEY) || "[]") : ((await window.storage.get(k)) || {}).value;
const syncWriteRaw = async (k, raw) => {
  if (k === "mm:customfoods") localStorage.setItem(CUSTOM_KEY, raw);
  else await window.storage.set(k, raw);
};

async function syncBuildDoc(kts) {
  const { keys } = await window.storage.list("sh:");
  const doc = { v: 1, keys: {} };
  for (const k of keys) {
    if (String(k).startsWith("sh:photo")) continue; /* photos + their index stay per-device */
    const r = await window.storage.get(k);
    if (r && r.value != null) doc.keys[k] = { v: r.value, t: (kts && kts[k]) || 0 };
  }
  doc.keys["mm:customfoods"] = { v: localStorage.getItem(CUSTOM_KEY) || "[]", t: (kts && kts["mm:customfoods"]) || 0 };
  return doc;
}

/* union-merge helpers — all take/return JSON strings */
const parseOr = (raw, fb) => { try { const v = JSON.parse(raw); return v == null ? fb : v; } catch { return fb; } };
function deepEq(x, y) {
  if (x === y) return true;
  if (typeof x !== typeof y || x == null || y == null || typeof x !== "object") return false;
  if (Array.isArray(x) !== Array.isArray(y)) return false;
  const kx = Object.keys(x), ky = Object.keys(y);
  return kx.length === ky.length && kx.every((k) => deepEq(x[k], y[k]));
}
/* semantic equality, so key/sort order never reads as a data change */
const deepEqRaw = (aRaw, bRaw) => aRaw === bRaw || deepEq(parseOr(aRaw, "__a"), parseOr(bRaw, "__b"));
function mergeDayRaw(aRaw, bRaw) {
  const a = parseOr(aRaw, null), b = parseOr(bRaw, null);
  if (!a) return bRaw; if (!b) return aRaw;
  /* keep local entry order and append what only the remote has — a merge
     where the remote is a subset must equal the local doc exactly, or every
     sync would read as a change and trigger a refresh. Per entry, the side
     with the newer modified-at (m) wins, so edits propagate; tombstones
     (del) union so deletions don't resurrect. */
  const del = [...new Set([...(a.del || []), ...(b.del || [])])];
  const delSet = new Set(del);
  const remoteById = {};
  for (const e of (b.entries || [])) remoteById[e.id] = e;
  const seen = new Set((a.entries || []).map((e) => e.id));
  const entries = [
    ...(a.entries || []).map((e) => {
      const r = remoteById[e.id];
      return r && (r.m || 0) > (e.m || 0) ? r : e;
    }),
    ...(b.entries || []).filter((e) => !seen.has(e.id)).sort((x, y) => (x.id > y.id ? 1 : -1)),
  ].filter((e) => !delSet.has(e.id));
  const mq = {};
  for (const q of new Set([...Object.keys(a.mq || {}), ...Object.keys(b.mq || {})])) mq[q] = !!((a.mq || {})[q] || (b.mq || {})[q]);
  /* supplements check-offs OR together like quests: a check on either device sticks */
  const supp = {};
  for (const q of new Set([...Object.keys(a.supp || {}), ...Object.keys(b.supp || {})])) supp[q] = !!((a.supp || {})[q] || (b.supp || {})[q]);
  const out = Object.assign({}, b, a, { /* local scalars win; unions below */
    entries,
    del,
    /* steps: the newest paste replaces (sm = steps-modified stamp). A bad or
       stale count must be correctable, so max() only breaks legacy ties.
       so (origin: paste/url/manual/close) travels with the winning count. */
    steps: (a.sm || 0) === (b.sm || 0)
      ? Math.max(a.steps || 0, b.steps || 0)
      : ((a.sm || 0) > (b.sm || 0) ? a.steps || 0 : b.steps || 0),
    sm: Math.max(a.sm || 0, b.sm || 0),
    so: ((a.sm || 0) === (b.sm || 0)
      ? ((a.steps || 0) >= (b.steps || 0) ? a.so : b.so)
      : ((a.sm || 0) > (b.sm || 0) ? a.so : b.so)) || a.so || b.so || null,
    xp: Math.max(a.xp || 0, b.xp || 0),
    closed: !!(a.closed || b.closed),
    mq,
  });
  if (a.supp || b.supp) out.supp = supp;
  return JSON.stringify(out);
}
function mergeArrayUnion(aRaw, bRaw) {
  const a = parseOr(aRaw, []), b = parseOr(bRaw, []);
  return JSON.stringify([...new Set([...a, ...b])].sort());
}
function mergeWeights(aRaw, bRaw, preferA) {
  const byDate = {};
  for (const w of preferA ? [...parseOr(bRaw, []), ...parseOr(aRaw, [])] : [...parseOr(aRaw, []), ...parseOr(bRaw, [])]) byDate[w.d] = w;
  return JSON.stringify(Object.values(byDate).sort((x, y) => (x.d > y.d ? 1 : -1)));
}
function mergeCustomFoods(aRaw, bRaw, preferA) {
  const byName = {};
  for (const f of preferA ? [...parseOr(bRaw, []), ...parseOr(aRaw, [])] : [...parseOr(aRaw, []), ...parseOr(bRaw, [])])
    if (f && f.k && f.k[0]) byName[f.k[0]] = f;
  return JSON.stringify(Object.values(byName));
}
function mergeSettingsRaw(aRaw, bRaw, preferA) {
  const a = parseOr(aRaw, {}), b = parseOr(bRaw, {});
  /* newer side's fields win, but fields only the older side has survive —
     a fresh device saving its Worker URL must not erase the weekend boost */
  return JSON.stringify(preferA ? Object.assign({}, b, a) : Object.assign({}, a, b));
}
function mergeHistory(aRaw, bRaw, preferA) {
  const a = parseOr(aRaw, {}), b = parseOr(bRaw, {});
  return JSON.stringify(preferA ? Object.assign({}, b, a) : Object.assign({}, a, b));
}

/* pull remote values into local storage; returns what happened */
async function syncMerge(remoteDoc, cfg) {
  const kts = cfg.kts || {};
  let changedLocal = false;
  let pushNeeded = false;
  if (remoteDoc && remoteDoc.keys) {
    syncApplying = true;
    try {
      for (const [k, rec] of Object.entries(remoteDoc.keys)) {
        const rt = rec.t || 0;
        const lt = kts[k] || 0;
        const localRaw = await syncReadRaw(k);
        if (localRaw === rec.v) { if (rt > lt) kts[k] = rt; continue; }
        if (localRaw == null) { await syncWriteRaw(k, rec.v); kts[k] = rt; changedLocal = true; continue; }
        const preferLocal = lt >= rt;
        let merged = null;
        if (k.startsWith("sh:day:")) merged = mergeDayRaw(localRaw, rec.v);
        else if (k === "sh:cycle") merged = mergeArrayUnion(localRaw, rec.v);
        else if (k === "sh:weight") merged = mergeWeights(localRaw, rec.v, preferLocal);
        else if (k === "mm:customfoods") merged = mergeCustomFoods(localRaw, rec.v, preferLocal);
        else if (k === "sh:history") merged = mergeHistory(localRaw, rec.v, preferLocal);
        else if (k === "sh:settings") merged = mergeSettingsRaw(localRaw, rec.v, preferLocal);
        if (merged != null) {
          if (!deepEqRaw(merged, localRaw)) { await syncWriteRaw(k, merged); changedLocal = true; }
          /* merged result differs from remote -> it must be uploaded and win the next LWW */
          if (!deepEqRaw(merged, rec.v)) { kts[k] = Date.now(); pushNeeded = true; } else kts[k] = Math.max(lt, rt);
        } else if (rt > lt) {
          await syncWriteRaw(k, rec.v); kts[k] = rt; changedLocal = true;
        } else {
          pushNeeded = true; /* local is newer; carry it up */
        }
      }
    } finally { syncApplying = false; }
  }
  /* anything local the remote has never seen also needs uploading */
  const { keys } = await window.storage.list("sh:");
  const remoteKeys = (remoteDoc && remoteDoc.keys) || {};
  for (const k of [...keys.filter((k) => !String(k).startsWith("sh:photo")), "mm:customfoods"])
    if (!remoteKeys[k]) { pushNeeded = true; break; }
  cfg.kts = kts;
  syncCfgSet(cfg);
  return { changedLocal, pushNeeded };
}

/* read-modify-write on the sync config so concurrent syncTouch stamps survive */
const syncCfgMerge = (patch) => { const c = syncCfg(); if (!c) return null; Object.assign(c, patch); syncCfgSet(c); return c; };

async function syncNow(reason) {
  const cfg = syncCfg();
  if (!cfg || !cfg.url || !cfg.code || syncBusy) return { ok: false, skipped: true };
  syncBusy = true;
  try {
    let result = null;
    /* Workers KV reads are eventually consistent: after another device
       pushes, a GET can return stale data for up to a minute. A rejected
       PUT (409) carries the CURRENT stored doc in its body, so on conflict
       we merge against that directly instead of re-reading stale cache. */
    let authoritative = null;
    for (let attempt = 0; attempt < 4; attempt++) {
      let remote;
      if (authoritative) { remote = authoritative; authoritative = null; }
      else {
        const res = await fetch(cfg.url + "/sync", { headers: { "x-sync-code": cfg.code }, keepalive: syncUrgent });
        if (!res.ok) throw new Error(`sync HTTP ${res.status}`);
        remote = await res.json();
      }
      const { changedLocal, pushNeeded } = await syncMerge(remote.data, syncCfg() || cfg);
      const fresh = syncCfg() || cfg;
      if (!pushNeeded && !fresh.dirty && remote.rev > 0) {
        syncCfgMerge({ rev: remote.rev, last: Date.now() });
        result = { ok: true, changedLocal };
        break;
      }
      /* clear dirty BEFORE building the doc: anything touched after this
         point re-sets it and gets picked up by the follow-up push below */
      syncCfgMerge({ dirty: false });
      const doc = await syncBuildDoc((syncCfg() || fresh).kts);
      const putBody = JSON.stringify({ baseRev: remote.rev, data: doc });
      const put = await fetch(cfg.url + "/sync", {
        method: "PUT",
        headers: { "Content-Type": "application/json", "x-sync-code": cfg.code },
        body: putBody,
        /* keepalive caps bodies at ~64KB — send it plain when the doc is bigger */
        keepalive: syncUrgent && putBody.length < 60000,
      });
      if (put.status === 409) {
        syncCfgMerge({ dirty: true });
        try { authoritative = await put.json(); } catch { authoritative = null; } /* merge against what the server actually holds */
        continue;
      }
      if (!put.ok) { syncCfgMerge({ dirty: true }); throw new Error(`sync HTTP ${put.status}`); }
      const fin = await put.json();
      syncCfgMerge({ rev: fin.rev, last: Date.now() });
      result = { ok: true, changedLocal };
      break;
    }
    if (!result) throw new Error("sync is catching up — it retries by itself, give it a minute");
    if (syncOnStatus) syncOnStatus({ ok: true, at: Date.now() });
    if (result.changedLocal && syncOnChange) syncOnChange();
    return result;
  } catch (e) {
    if (syncOnStatus) syncOnStatus({ ok: false, err: e.message });
    return { ok: false, err: e.message };
  } finally {
    syncBusy = false;
    const after = syncCfg();
    if (after && after.dirty) { clearTimeout(syncTimer); syncTimer = setTimeout(() => syncNow("followup"), 1500); }
  }
}

const NUTRIENT_IDS = { cal: [1008, 2047, 2048], p: [1003], f: [1079] };

function extractNutrients(foodNutrients) {
  const grab = (ids) => {
    for (const id of ids) {
      const n = foodNutrients.find((x) => (x.nutrientId != null ? x.nutrientId : x.nutrient && x.nutrient.id) === id);
      if (n) {
        const v = n.value != null ? n.value : n.amount;
        if (typeof v === "number") return v;
      }
    }
    return 0;
  };
  return { cal: grab(NUTRIENT_IDS.cal), p: grab(NUTRIENT_IDS.p), f: grab(NUTRIENT_IDS.f) };
}

async function usdaSearch(name) {
  const url = `${USDA_SEARCH}?api_key=${USDA_KEY}&query=${encodeURIComponent(name)}` +
    `&dataType=${encodeURIComponent("Survey (FNDDS)")},${encodeURIComponent("SR Legacy")},Branded&pageSize=5`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`USDA HTTP ${res.status}`);
  const data = await res.json();
  return data.foods || [];
}

async function usdaPortions(fdcId) {
  try {
    const res = await fetch(`${USDA_DETAIL}${fdcId}?api_key=${USDA_KEY}`);
    if (!res.ok) return [];
    const data = await res.json();
    return data.foodPortions || [];
  } catch { return []; }
}

function portionGrams(portions, parsed) {
  if (!portions.length) return null;
  const want = parsed.unit.countNoun || parsed.name.split(/\s+/).pop();
  const text = (p) => `${p.portionDescription || ""} ${p.modifier || ""} ${(p.measureUnit && p.measureUnit.name) || ""}`.toLowerCase();
  if (parsed.unit.type === "volume") {
    const volName = parsed.unit.ml >= 240 ? "cup" : parsed.unit.ml >= 15 ? "tablespoon" : "teaspoon";
    const hit = portions.find((p) => text(p).includes(volName));
    if (hit && hit.gramWeight) return hit.gramWeight * (parsed.unit.ml / (volName === "cup" ? 240 : volName === "tablespoon" ? 15 : 5));
  }
  const hit =
    portions.find((p) => want && text(p).includes(want.replace(/s$/, ""))) ||
    portions.find((p) => /each|1 (item|unit|piece)|small|medium/.test(text(p)));
  if (hit && hit.gramWeight) return hit.gramWeight;
  const sorted = portions.filter((p) => p.gramWeight).sort((a, b) => a.gramWeight - b.gramWeight);
  return sorted.length ? sorted[Math.floor(sorted.length / 2)].gramWeight : null;
}

async function usdaResolve(parsed) {
  let foods = await usdaSearch(parsed.name);
  if (!foods.length) {
    /* long descriptions rarely match — retry on the last two substantial
       words ("jalapeno popper mac n cheese" -> "mac cheese", not "n cheese") */
    const words = parsed.name.split(/\s+/).filter((w) => w.length > 2);
    if (words.length > 2) foods = await usdaSearch(words.slice(-2).join(" "));
  }
  if (!foods.length) return { status: "none" };

  const build = async (food, needPortion) => {
    const per100 = extractNutrients(food.foodNutrients || []);
    let grams;
    let rough = false;

    if (parsed.unit.type === "weight") {
      grams = parsed.qty * parsed.unit.grams;
      rough = parsed.unit.rough;
    } else {
      let pg = null;
      if (parsed.unit.type === "volume") {
        /* a stated volume must drive the math — the product's own serving
           size (often a tiny packet) is irrelevant to "1 tablespoon of" */
        if (needPortion) pg = portionGrams(await usdaPortions(food.fdcId), parsed);
        if (!pg) { pg = parsed.unit.ml * 0.95; rough = true; }
      } else {
        if (food.servingSize && /g/i.test(food.servingSizeUnit || "")) pg = food.servingSize;
        if (!pg && needPortion) pg = portionGrams(await usdaPortions(food.fdcId), parsed);
        if (!pg) { pg = 100; rough = true; }
      }
      grams = pg * parsed.qty;
    }

    const factor = grams / 100;
    const perServing = grams / Math.max(parsed.qty, 0.001);
    cachePut(parsed.name, {
      c: Math.round(per100.cal * (perServing / 100)),
      p: Math.round(per100.p * (perServing / 100)),
      f: Math.round(per100.f * (perServing / 100)),
      g: Math.round(perServing),
    });
    return {
      name: `${parsed.qty !== 1 ? parsed.qty + "× " : ""}${(food.description || parsed.name).toLowerCase().slice(0, 50)}`,
      cal: Math.round(per100.cal * factor),
      p: Math.round(per100.p * factor),
      f: Math.round(per100.f * factor),
      rough,
    };
  };

  const top = foods[0];
  const second = foods[1];
  const dominant = !second || (top.score && second.score && top.score > second.score * 1.6);

  if (dominant) return { status: "resolved", entry: await build(top, true) };
  const candidates = [];
  for (const fd of foods.slice(0, 3)) candidates.push(await build(fd, fd === top));
  return { status: "candidates", candidates };
}

/* ---------- Open Food Facts: free, keyless, community-maintained ----------
   Values come per 100 g; kcal preferred, kJ converted when that's all there is. */
async function offResolve(parsed) {
  const url = `${OFF_SEARCH}?search_terms=${encodeURIComponent(parsed.name)}` +
    `&search_simple=1&action=process&json=1&page_size=8&sort_by=unique_scans_n` +
    `&fields=product_name,nutriments,serving_quantity,serving_size`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`OFF HTTP ${res.status}`);
  const data = await res.json();
  const prod = (data.products || []).find((pr) => {
    const n = pr.nutriments || {};
    return n["energy-kcal_100g"] != null || n["energy_100g"] != null;
  });
  if (!prod) return { status: "none" };

  const n = prod.nutriments;
  const per100 = {
    cal: n["energy-kcal_100g"] != null ? n["energy-kcal_100g"] : n["energy_100g"] / 4.184,
    p: n["proteins_100g"] || 0,
    f: n["fiber_100g"] || 0,
  };

  let grams;
  let rough = false;
  if (parsed.unit.type === "weight") {
    grams = parsed.qty * parsed.unit.grams;
    rough = parsed.unit.rough;
  } else {
    let pg = parseFloat(prod.serving_quantity);
    if ((!pg || isNaN(pg)) && prod.serving_size) {
      const m = String(prod.serving_size).match(/(\d+(?:\.\d+)?)\s*(?:g|ml)/i);
      if (m) pg = parseFloat(m[1]);
    }
    if (!pg || isNaN(pg)) { pg = parsed.unit.type === "volume" ? parsed.unit.ml * 0.85 : 100; rough = true; }
    grams = pg * parsed.qty;
  }

  const factor = grams / 100;
  const perServing = grams / Math.max(parsed.qty, 0.001);
  cachePut(parsed.name, {
    c: Math.round(per100.cal * (perServing / 100)),
    p: Math.round(per100.p * (perServing / 100)),
    f: Math.round(per100.f * (perServing / 100)),
    g: Math.round(perServing),
  });
  return {
    status: "resolved",
    entry: {
      name: `${parsed.qty !== 1 ? parsed.qty + "× " : ""}${(prod.product_name || parsed.name).toLowerCase().slice(0, 50)}`,
      cal: Math.round(per100.cal * factor),
      p: Math.round(per100.p * factor),
      f: Math.round(per100.f * factor),
      rough,
    },
  };
}

async function lookupFood(desc, aiUrl) {
  const results = [];
  const pending = [];
  const wordsIn = (s) => s.trim().split(/\s+/).length;
  const localResolved = (parsed, local) => {
    const sf = scaleFactor(parsed, local.entry);
    return { status: "resolved", source: local.custom ? "custom" : "local", parsed, entry: applyFactor(local.entry, parsed.raw.slice(0, 50), sf.factor, sf.rough) };
  };
  for (const seg of splitSegments(desc)) {
    const parsed = parseSegment(seg);
    if (!parsed) continue;

    /* A local match is only trusted outright when the keyword covers most
       of the typed name. "jalapeno popper mac n cheese" matching the plain
       "mac n cheese" key is a WEAK match: a composite dish deserves an AI
       or API lookup first, with the local match kept as the offline fallback.
       Custom foods are always trusted — the user named them. */
    const local = localMatch(parsed.name);
    const strongLocal = local && (local.custom ||
      (wordsIn(parsed.name) - wordsIn(local.key) <= 1 && local.key.length * 2 >= parsed.name.length));
    if (strongLocal) { results.push(localResolved(parsed, local)); continue; }

    const cached = cacheGet(parsed.name);
    if (cached) {
      const sf = scaleFactor(parsed, cached);
      results.push({ status: "resolved", source: "cache", parsed, entry: applyFactor(cached, parsed.raw.slice(0, 50), sf.factor, sf.rough) });
      continue;
    }

    results.push(null);
    pending.push({ parsed, local, idx: results.length - 1 });
  }

  /* Everything resolved by tiers the user controls (custom foods, the
     built-in table, past lookups)? Done — free, instant, offline. */
  if (!pending.length) return { segments: results };

  /* AI tier: anything those tiers couldn't fully cover sends the WHOLE
     original text to Claude — it re-splits and re-portions better than the
     regex parser, so a suspect split is thrown away rather than patched.
     Custom foods still win by name: the user's own label scans are truth. */
  if (aiUrl) {
    const items = await aiEstimate(aiUrl, desc);
    if (items && items.length) {
      return {
        segments: items.map((item) => {
          const norm = normalizeFood(String(item.name));
          const raw = item.amount ? `${item.name} — ${item.amount}` : String(item.name);
          const local = localMatch(norm);
          if (local && local.custom) {
            const qm = String(item.amount || "").match(/^(\d*\.\d+|\d+(?:\.\d+)?)/);
            const qty = qm ? parseFloat(qm[1]) : 1;
            return { status: "resolved", source: "custom", parsed: { raw, name: norm }, entry: applyFactor(local.entry, String(item.name).slice(0, 50), qty > 0 ? qty : 1, false) };
          }
          return {
            status: "resolved", source: "ai", parsed: { raw, name: norm },
            entry: { name: String(item.name).slice(0, 50), cal: Math.round(item.cal), p: Math.round(item.protein || 0), f: Math.round(item.fiber || 0), rough: false },
          };
        }),
      };
    }
    /* AI unreachable or empty — fall through to the USDA/OFF chain below */
  }

  /* Tier 4: USDA (needs key), Tier 5: Open Food Facts (keyless) as fallback */
  for (const { parsed, local, idx } of pending) {
    let hit = null, err = null;
    if (USDA_KEY) {
      try {
        const r = await usdaResolve(parsed);
        if (r.status !== "none") hit = Object.assign({ source: "usda", parsed }, r);
      } catch (e) { err = e.message; }
    }
    if (!hit) {
      try {
        const o = await offResolve(parsed);
        if (o.status !== "none") hit = Object.assign({ source: "off", parsed }, o);
      } catch (e) { err = err || e.message; }
    }
    if (!hit && local) { const r = localResolved(parsed, local); r.entry.rough = true; results[idx] = r; continue; }
    results[idx] = hit || { status: "none", source: err ? "error" : "noresult", parsed, error: err };
  }
  return { segments: results };
}

/* ---------- image compression ---------- */
const compressImage = (file, maxDim = 900, quality = 0.72) =>
  new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

/* ---------- nutrition label OCR (tesseract.js, loaded on first use) ---------- */
let tessPromise = null;
function loadTesseract() {
  if (window.Tesseract) return Promise.resolve(window.Tesseract);
  if (!tessPromise) {
    tessPromise = new Promise((res, rej) => {
      const s = document.createElement("script");
      s.src = "https://unpkg.com/tesseract.js@5.1.1/dist/tesseract.min.js";
      s.onload = () => (window.Tesseract ? res(window.Tesseract) : rej(new Error("OCR library unavailable — are you offline?")));
      s.onerror = () => rej(new Error("couldn't load OCR library — are you offline?"));
      document.head.appendChild(s);
    });
    tessPromise.catch(() => { tessPromise = null; }); /* allow retry once back online */
  }
  return tessPromise;
}

async function ocrImage(dataUrl) {
  const T = await loadTesseract();
  const worker = await T.createWorker("eng");
  try {
    const { data } = await worker.recognize(dataUrl);
    return data.text || "";
  } finally {
    await worker.terminate();
  }
}

/* Pull serving size, calories, protein, and fiber out of raw OCR text.
   Any field it can't find comes back null and the user fills it in. */
function parseNutritionLabel(text) {
  const t = text.toLowerCase().replace(/,/g, "");
  const grab = (re) => { const m = t.match(re); return m ? parseFloat(m[1]) : null; };
  const cal = grab(/calories[^0-9]{0,24}(\d{1,4})\b/);
  const p = grab(/protein[^0-9]{0,12}(\d{1,3}(?:\.\d+)?)\s*g/);
  const f = grab(/(?:dietary\s*)?fib(?:er|re)[^0-9]{0,12}(\d{1,3}(?:\.\d+)?)\s*g/);
  /* "Serving size 2/3 cup (55g)" — prefer the parenthesized weight */
  let sv = t.match(/\(\s*(\d{1,4}(?:\.\d+)?)\s*(g|ml)\s*\)/);
  if (!sv) sv = t.match(/serving\s*size[^0-9]{0,30}(\d{1,4}(?:\.\d+)?)\s*(g|ml)\b/);
  return {
    cal, p, f,
    g: sv ? parseFloat(sv[1]) : null,
    liquid: !!(sv && sv[2] === "ml"),
  };
}

/* ---------- week in review: shown Sunday night and Monday morning ---------- */
/* A "light day" logged something but came in under the threshold — usually a
   day the user forgot to finish logging, which drags averages down. Detection
   is opt-in (settings.flagPartial); excluding them from the data is a second
   opt-in (settings.excludePartial). today is never light (still in progress). */
const partialThreshOf = (settings) => Math.max(1, settings.partialThreshold || 1000);
const isLightDay = (ds, rec, settings, todayStr) =>
  !!settings.flagPartial && ds !== todayStr && !!rec && (rec.e || 0) > 0 && (rec.c || 0) > 0 && rec.c < partialThreshOf(settings);
const droppedFromData = (ds, rec, settings, todayStr) =>
  !!settings.excludePartial && isLightDay(ds, rec, settings, todayStr);

function buildWeekReview(mon, history, weights, settings) {
  let logged = 0, cal = 0, steps = 0, onPlanDays = 0, stepDays = 0, protDays = 0, fibDays = 0, light = 0;
  for (let i = 0; i < 7; i++) {
    const ds = shiftDate(mon, i);
    const rec = history[ds];
    if (isLightDay(ds, rec, settings, null)) light++;
    if (droppedFromData(ds, rec, settings, null)) continue; /* light day excluded from the week's stats */
    if (rec && rec.e > 0) {
      logged++; cal += rec.c;
      if (onPlanCal(ds, history, settings, null, null)) onPlanDays++;
    }
    if (rec) steps += rec.s || 0;
    if (rec && (rec.s || 0) >= settings.stepGoal) stepDays++;
    if (rec && (rec.p || 0) >= settings.proteinGoal) protDays++;
    if (rec && (rec.f || 0) >= settings.fiberGoal) fibDays++;
  }
  const sun = shiftDate(mon, 6);
  const wk = weights.filter((w) => w.d >= mon && w.d <= sun).sort((a, b) => (a.d < b.d ? -1 : 1));
  const wDelta = wk.length >= 2 ? Math.round((wk[wk.length - 1].w - wk[0].w) * 10) / 10 : null;
  const verdict =
    logged === 0 ? "A quiet week on the record. This one starts fresh — the first entry wins." :
    onPlanDays >= 5 ? "That was a prosecution-grade week. Same goals, or raise the stakes?" :
    onPlanDays >= 3 ? "A solid week with room in the margins. Keep the goals or tune them below." :
    "The data came in bumpy — which is still data. Fit the goals to real life, then win the week.";
  return { mon, sun, logged, avgCal: logged ? Math.round(cal / logged) : 0, steps, onPlanDays, stepDays, protDays, fibDays, wDelta, verdict, light };
}

/* Entry ids must be unique — two adds in the same millisecond would share a
   Date.now() id, making edit/delete hit both. Strictly monotonic instead. */
/* monotonic per device, with sub-ms jitter so two SYNCED devices logging in
   the same millisecond don't mint the same id (ids drive the entry union) */
let lastEntryId = 0;
const nextEntryId = () => {
  lastEntryId = Math.max(lastEntryId + 1, Date.now() * 1000 + Math.floor(Math.random() * 1000));
  return lastEntryId;
};

/* ---------- morning briefing: yesterday's verdict, today's motivation ----------
   Same house rules as all humor: react to the data and the habit, never
   the person. Off days get wit and a plan, never a lecture. */
function buildBriefing(yds, history, settings) {
  const rec = history[yds];
  const pick = (arr, salt) => arr[hashStr(salt + yds) % arr.length];
  const facts = [];
  let headline, tone;

  if (rec && rec.shield) {
    headline = "Yesterday was shielded."
    const shieldLine = pickLine("dataReactive:shieldUsed");
    tone = shieldLine ? shieldLine.text : "A banked perfect-day token covered it automatically. That's not luck — that's savings.";
  } else if (!rec || (!rec.e && !rec.s)) {
    headline = pick(["Yesterday went unrecorded.", "The docket shows a blank page."], "h");
    tone = pick([
      "Officially, it never happened. Unofficially, today gets the documentation it deserves.",
      "No data, no judgment — but also no credit. Today, we take the credit.",
      "The court can't rule on an empty page. Today's page won't be empty.",
    ], "t");
  } else {
    const onPlan = rec.c > 0 && onPlanCal(yds, history, settings, null, null);
    const stepsHit = rec.s >= settings.stepGoal;
    if (rec.e > 0) facts.push(`${rec.e} item${rec.e === 1 ? "" : "s"} logged · ${rec.c.toLocaleString()} cal${onPlan ? " — on plan" : ""}`);
    if (rec.s > 0) facts.push(`${rec.s.toLocaleString()} steps${stepsHit ? " — goal hit" : ` of ${settings.stepGoal.toLocaleString()}`}`);
    if ((rec.p || 0) >= settings.proteinGoal) facts.push(`protein goal cleared (${rec.p}g)`);
    if ((rec.f || 0) >= settings.fiberGoal) facts.push(`fiber goal cleared (${rec.f}g)`);

    if (onPlan && stepsHit) {
      headline = pick(["Yesterday: flawless execution.", "The verdict is in: chef's kiss.", "Yesterday ran like a courtroom drama where you win."], "h");
      tone = pick([
        "Calories on plan, steps delivered. The jury didn't even deliberate.",
        "That's what a perfect day looks like on paper. Frame it — then do it again today.",
        "Airtight case. Opposing counsel (the couch) has requested a recess.",
      ], "t");
    } else if (onPlan) {
      headline = pick(["Yesterday: strong case, short walk.", "Calories: nailed. Steps: negotiable."], "h");
      tone = pick([
        "The food ledger was airtight. Today the shoes want in on the action.",
        "Half the battle decisively won. The sidewalk requests a rematch.",
      ], "t");
    } else if (stepsHit) {
      headline = pick(["Yesterday: boots delivered.", "The steps showed up in force."], "h");
      tone = pick([
        "Mileage: excellent. The menu freelanced a little. Today they work as a team.",
        "You out-walked the plan; the plate went rogue. Now sync them up.",
      ], "t");
    } else {
      headline = pick(["Yesterday testified. It was colorful.", "Yesterday: a spirited exhibit."], "h");
      tone = pick([
        "The numbers wandered, but they're on record — which beats perfect and imaginary. Data first, streaks follow.",
        "Not the tidiest page in the ledger, but it's a page. Champions keep the book open.",
      ], "t");
    }
  }

  const mission = pick([
    "Today's mission: log the first bite before it's a memory.",
    "Today's mission: three entries and a walk. The rest is garnish.",
    "Today's mission: make tonight's reveal boring — in the best way.",
    "Today's mission: protein early, steps often.",
    "Today's mission: be the person the streak already believes you are.",
    "Today's mission: one honest log at a time. That's the whole trick.",
  ], "m");

  /* a streak that ended yesterday (without a shield) gets its own line */
  const qual = (ds) => { const r = history[ds]; return !!r && (r.shield || ((r.c || 0) > 0 && (r.s || 0) >= settings.stepGoal && onPlanCal(ds, history, settings, null, null))); };
  let extra = null;
  if (!(rec && rec.shield) && !qual(yds) && qual(shiftDate(yds, -1))) {
    const l = pickLine("dataReactive:streakBrokenNoShield");
    if (l) extra = l.text;
  }

  return { yds, headline, facts, tone, mission, extra };
}

const MEAL_GROUPS = [
  { id: "morning", label: "Morning", test: (e) => slotOf(e) === "morning" },
  { id: "midday", label: "Midday", test: (e) => slotOf(e) === "midday" },
  { id: "evening", label: "Evening", test: (e) => slotOf(e) === "evening" },
];
const SLOT_LABEL = { morning: "Morning", midday: "Midday", evening: "Evening" };

function BurritoMeter({ eaten, max }) {
  const pct = Math.max(0, Math.min(100, (eaten / Math.max(1, max)) * 100));
  const over = eaten > max;
  const left = Math.max(0, max - eaten);
  const gone = over || left === 0;
  const lastBites = !gone && pct >= 88;

  /* Sticker-illustration style (matches the app's design system: ink
     outlines, hard offset shadow, candy colors). The burrito IS the
     remaining weekend pool: it starts whole, and every calorie eaten
     takes bites off the left end — scalloped bite marks, a cross-section
     of filling on the bitten face, crumbs where burrito used to be.
     Pool gone = empty crumpled wrapper. */
  const t = pct / 100;
  const bitten = t > 0.02;
  const INK = "#1E1A1C";
  /* left edge of what remains: first bite jumps to 100, last bite ends near the foil */
  const biteX = 100 + t * 160;
  const TOP = 52, BOT = 144, MID = (TOP + BOT) / 2;
  /* the foil sleeve: covers the far end when whole, and unrolls rightward
     as the bites approach — always keeping a stretch of tortilla exposed */
  const foilX = Math.min(298, Math.max(226, biteX + 54));
  const flapCount = 2 + (t > 0.3 ? 1 : 0) + (t > 0.65 ? 1 : 0);

  /* scalloped bite boundary, top to bottom at x = biteX — near-semicircle
     arcs (sweep 1) carve INTO the burrito like teeth marks */
  const scallop = (x) =>
    `M ${x} ${TOP} a 16 16 0 0 1 3 31 a 17 17 0 0 1 -1 33 a 14 14 0 0 1 -2 28`;
  /* silhouette of the remaining piece: bitten face (or closed left cap) + body + rounded right end */
  const remainPath = bitten
    ? `${scallop(biteX)} L 318 ${BOT} A 47 47 0 0 0 318 ${TOP} Z`
    : `M 100 ${TOP} A 47 47 0 0 0 100 ${BOT} L 318 ${BOT} A 47 47 0 0 0 318 ${TOP} Z`;
  /* crinkle-edged foil sleeve, slightly fatter than the tortilla */
  const cuff = (x) =>
    `M ${x + 2} ${TOP - 7} L ${x + 7} ${TOP + 9} L ${x - 3} ${TOP + 27} L ${x + 6} ${MID - 3} L ${x - 3} ${MID + 19} L ${x + 6} ${BOT - 13} L ${x + 2} ${BOT + 7}`;
  const foilPath = `${cuff(foilX)} L 320 ${BOT + 7} A 50 53 0 0 0 320 ${TOP - 7} Z`;

  /* crumbs appear where the burrito used to be — more of them as it shrinks */
  const crumbs = [
    { dx: -24, y: 138, r: 4, rot: 14 }, { dx: -44, y: 148, r: 3, rot: -20 },
    { dx: -33, y: 155, r: 2.5, rot: 40 }, { dx: -58, y: 141, r: 3.5, rot: -8 },
    { dx: -70, y: 152, r: 2.5, rot: 24 }, { dx: -49, y: 133, r: 2, rot: 0 },
  ].slice(0, bitten ? 2 + Math.floor(t * 4) : 0);

  return (
    <div style={{ marginTop: 12 }}>
      <svg viewBox="0 0 380 200" style={{ width: 270, maxWidth: "82%", height: "auto", display: "block", margin: "0 auto" }} role="img"
        aria-label={`Weekend pool: ${eaten.toLocaleString()} of ${max.toLocaleString()} calories eaten`}>
        {!gone ? (
          <g transform="rotate(-4 190 98)">
            <defs>
              <clipPath id="mm-remain"><path d={remainPath} /></clipPath>
            </defs>

            {/* hard offset sticker shadow (tortilla + foil together) */}
            <path d={remainPath} transform="translate(5 6)" fill={INK} opacity=".9" />
            <path d={foilPath} transform="translate(5 6)" fill={INK} opacity=".9" />

            {/* tortilla body */}
            <path d={remainPath} fill="#F2D8A0" stroke={INK} strokeWidth="3.5" strokeLinejoin="round" />

            {/* tortilla texture + bite face, clipped to what's left */}
            <g clipPath="url(#mm-remain)">
              {/* diagonal wrap seams */}
              <path d={`M 140 ${TOP + 2} C 166 ${MID - 14} 166 ${MID + 14} 140 ${BOT - 2}`} fill="none" stroke="#D9B878" strokeWidth="3.5" strokeLinecap="round" />
              <path d={`M 186 ${TOP + 2} C 212 ${MID - 14} 212 ${MID + 14} 186 ${BOT - 2}`} fill="none" stroke="#D9B878" strokeWidth="3.5" strokeLinecap="round" />
              <path d={`M 232 ${TOP + 2} C 258 ${MID - 14} 258 ${MID + 14} 232 ${BOT - 2}`} fill="none" stroke="#D9B878" strokeWidth="3" strokeLinecap="round" />
              <path d={`M 276 ${TOP + 2} C 302 ${MID - 14} 302 ${MID + 14} 276 ${BOT - 2}`} fill="none" stroke="#D9B878" strokeWidth="3" strokeLinecap="round" />
              {/* toasty griddle spots */}
              <ellipse cx="156" cy="74" rx="9" ry="5" fill="#E0B87E" transform="rotate(-14 156 74)" />
              <ellipse cx="204" cy="120" rx="8" ry="4.5" fill="#E0B87E" transform="rotate(10 204 120)" />
              <ellipse cx="244" cy="72" rx="6.5" ry="3.5" fill="#E0B87E" transform="rotate(-8 244 72)" />
              <ellipse cx="128" cy="116" rx="7" ry="4" fill="#E0B87E" transform="rotate(6 128 116)" />
              <ellipse cx="178" cy="98" rx="5" ry="3" fill="#E8C48C" transform="rotate(-4 178 98)" />
              <ellipse cx="282" cy="112" rx="7" ry="4" fill="#E0B87E" transform="rotate(8 282 112)" />
              <ellipse cx="262" cy="90" rx="4.5" ry="2.8" fill="#E8C48C" transform="rotate(-6 262 90)" />
              {/* flour speckles */}
              {[[134, 66], [162, 112], [192, 70], [212, 100], [150, 130], [248, 112], [224, 84], [126, 90], [268, 70], [288, 96]].map(([x, y], i) => (
                <circle key={i} cx={x} cy={y} r="1.7" fill="#D9B878" />
              ))}
              {/* bottom shading + top sheen */}
              <path d={`M ${biteX + 14} ${BOT - 7} C 190 ${BOT - 1} 250 ${BOT - 1} 306 ${BOT - 8}`} fill="none" stroke="#E0C08A" strokeWidth="7" strokeLinecap="round" opacity=".8" />
              <path d={`M 124 ${TOP + 9} C 180 ${TOP + 1} 240 ${TOP + 1} 306 ${TOP + 9}`} fill="none" stroke="#FBEBC8" strokeWidth="5" strokeLinecap="round" opacity=".85" />

              {/* bitten face: tortilla ring, dark interior, chunky legible filling */}
              {bitten && (
                <g>
                  <path d={scallop(biteX)} fill="none" stroke="#FBEBC8" strokeWidth="17" strokeLinejoin="round" />
                  <rect x={biteX - 1} y={MID - 39} width="21" height="78" rx="10" fill="#6E4A28" stroke={INK} strokeWidth="2.5" />
                  {/* guac */}
                  <ellipse cx={biteX + 9} cy={MID - 28} rx="11" ry="8.5" fill="#7ED957" stroke={INK} strokeWidth="2.2" />
                  <circle cx={biteX + 4} cy={MID - 31} r="2" fill="#5CB93C" />
                  {/* tomato */}
                  <rect x={biteX + 1} y={MID - 17} width="13" height="13" rx="3.5" fill="#FF6B6B" stroke={INK} strokeWidth="2.2" transform={`rotate(-12 ${biteX + 7} ${MID - 10})`} />
                  {/* beans */}
                  <ellipse cx={biteX + 12} cy={MID - 1} rx="6.5" ry="5" fill="#8B5A3C" stroke={INK} strokeWidth="2.2" />
                  <ellipse cx={biteX + 3} cy={MID + 6} rx="6" ry="4.5" fill="#7A4C30" stroke={INK} strokeWidth="2.2" />
                  {/* cheese shreds */}
                  <path d={`M ${biteX + 1} ${MID + 16} q 5 -4 9 0 q 5 4 9 0`} fill="none" stroke="#FFC93C" strokeWidth="4" strokeLinecap="round" />
                  <path d={`M ${biteX + 3} ${MID + 22} q 4 -3 8 0`} fill="none" stroke="#FFC93C" strokeWidth="3.4" strokeLinecap="round" />
                  {/* rice */}
                  {[[4, 30], [11, 34], [16, 27], [7, 36]].map(([dx, dy], i) => (
                    <ellipse key={i} cx={biteX + dx} cy={MID + dy} rx="3.4" ry="2.2" fill="#FFF7E6" stroke={INK} strokeWidth="1.6" transform={`rotate(${i * 40 - 30} ${biteX + dx} ${MID + dy})`} />
                  ))}
                </g>
              )}
            </g>

            {/* re-ink the bitten edge on top so the bite marks read crisply */}
            {bitten && <path d={scallop(biteX)} fill="none" stroke={INK} strokeWidth="3.5" strokeLinecap="round" />}

            {/* pristine left cap: wrap tuck lines */}
            {!bitten && (
              <g>
                <path d={`M 92 ${TOP + 12} C 104 ${MID - 12} 104 ${MID + 12} 92 ${BOT - 12}`} fill="none" stroke="#D9B878" strokeWidth="3" strokeLinecap="round" />
                <path d={`M 76 ${TOP + 22} C 86 ${MID - 8} 86 ${MID + 8} 76 ${BOT - 22}`} fill="none" stroke="#D9B878" strokeWidth="3" strokeLinecap="round" />
              </g>
            )}

            {/* ---- foil sleeve: wraps the far end, unrolls as the bites advance ---- */}
            <g>
              <path d={foilPath} fill="#C9CFD9" stroke={INK} strokeWidth="3.5" strokeLinejoin="round" />
              {/* crinkle facets */}
              <path d={`M ${foilX + 10} ${TOP - 2} L ${foilX + 26} ${TOP + 16} L ${foilX + 14} ${TOP + 34}`} fill="none" stroke="#AEB5C2" strokeWidth="2.6" strokeLinejoin="round" />
              <path d={`M ${foilX + 20} ${BOT + 2} L ${foilX + 34} ${BOT - 18} L ${foilX + 24} ${BOT - 36}`} fill="none" stroke="#AEB5C2" strokeWidth="2.6" strokeLinejoin="round" />
              <path d={`M ${foilX + 40} ${TOP + 4} L ${foilX + 52} ${MID - 8} L ${foilX + 42} ${MID + 16}`} fill="none" stroke="#B8BFCB" strokeWidth="2.4" strokeLinejoin="round" />
              {/* shine streaks */}
              <path d={`M ${foilX + 12} ${TOP + 8} L ${foilX + 6} ${MID + 6}`} stroke="#F4F6F9" strokeWidth="5" strokeLinecap="round" />
              <path d={`M ${foilX + 30} ${MID - 20} L ${foilX + 24} ${MID + 24}`} stroke="#EDF0F4" strokeWidth="4" strokeLinecap="round" />
              {/* rolled-back cuff highlight along the unrolled edge */}
              <path d={cuff(foilX)} fill="none" stroke="#EDF0F4" strokeWidth="5" strokeLinejoin="round" />
              <path d={cuff(foilX)} fill="none" stroke={INK} strokeWidth="3" strokeLinejoin="round" opacity=".95" />
              {/* peeled-open flaps — more of them the further it's unrolled */}
              {[
                { pts: `${foilX - 2},${TOP - 4} ${foilX - 20},${TOP - 16} ${foilX + 8},${TOP - 9}`, fill: "#EDF0F4" },
                { pts: `${foilX - 1},${BOT + 4} ${foilX - 18},${BOT + 15} ${foilX + 9},${BOT + 9}`, fill: "#DDE2E9" },
                { pts: `${foilX + 2},${TOP + 2} ${foilX - 13},${TOP + 12} ${foilX + 5},${TOP + 16}`, fill: "#C0C6D1" },
                { pts: `${foilX + 1},${BOT - 4} ${foilX - 12},${BOT - 12} ${foilX + 4},${BOT - 16}`, fill: "#C0C6D1" },
              ].slice(0, flapCount).map((f, i) => (
                <polygon key={i} points={f.pts} fill={f.fill} stroke={INK} strokeWidth="2.4" strokeLinejoin="round" />
              ))}
            </g>

            {/* crumbs where the eaten part was */}
            {crumbs.map((c, i) => (
              <rect key={i} x={biteX + c.dx} y={c.y} width={c.r * 2} height={c.r * 2} rx={c.r * 0.6}
                fill="#E9C688" stroke={INK} strokeWidth="1.6" transform={`rotate(${c.rot} ${biteX + c.dx} ${c.y})`} />
            ))}

            {/* a little sparkle, because it's a great burrito */}
            <path d="M 344 38 l 3.5 8 8 3.5 -8 3.5 -3.5 8 -3.5 -8 -8 -3.5 8 -3.5 Z" fill="#FFC93C" stroke={INK} strokeWidth="2" strokeLinejoin="round" />
            {lastBites && (
              <path d="M 60 130 l 2.8 6.4 6.4 2.8 -6.4 2.8 -2.8 6.4 -2.8 -6.4 -6.4 -2.8 6.4 -2.8 Z" fill="#FF5FA2" stroke={INK} strokeWidth="1.8" strokeLinejoin="round" />
            )}
          </g>
        ) : (
          /* pool gone: empty crumpled wrapper + crumb field */
          <g transform="translate(20 0) rotate(-3 170 105)">
            <path d="M 128 78 L 158 64 L 186 76 L 212 62 L 232 84 L 224 112 L 236 134 L 206 148 L 172 142 L 142 150 L 120 128 L 130 104 Z"
              transform="translate(5 6)" fill={INK} opacity=".9" />
            <path d="M 128 78 L 158 64 L 186 76 L 212 62 L 232 84 L 224 112 L 236 134 L 206 148 L 172 142 L 142 150 L 120 128 L 130 104 Z"
              fill="#D5DAE2" stroke={INK} strokeWidth="3.5" strokeLinejoin="round" />
            <path d="M 158 64 L 166 96 L 142 150" fill="none" stroke="#AEB5C2" strokeWidth="2.5" strokeLinejoin="round" />
            <path d="M 212 62 L 196 102 L 206 148" fill="none" stroke="#AEB5C2" strokeWidth="2.5" strokeLinejoin="round" />
            <path d="M 130 104 L 166 96 L 196 102 L 224 112" fill="none" stroke="#EDF0F4" strokeWidth="3" strokeLinecap="round" />
            {[[92, 158, 4, 12], [110, 168, 3, -18], [246, 160, 3.5, 30], [262, 150, 2.5, 0], [130, 172, 2.5, 45], [226, 170, 3, -30]].map(([x, y, r, rot], i) => (
              <rect key={i} x={x} y={y} width={r * 2} height={r * 2} rx={r * 0.6} fill="#E9C688" stroke={INK} strokeWidth="1.6" transform={`rotate(${rot} ${x} ${y})`} />
            ))}
            <path d="M 76 120 l 3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 Z" fill="#FFC93C" stroke={INK} strokeWidth="2" strokeLinejoin="round" />
          </g>
        )}
      </svg>
      <div className="sub num" style={{ textAlign: "center", marginTop: 4, color: over ? "#FF5FA2" : undefined }}>
        {over
          ? `wrapper's empty — ${(eaten - max).toLocaleString()} cal past the pool. Noted, never judged`
          : gone
          ? "polished off — the pool is exactly spent. Chef's kiss"
          : lastBites
          ? `down to the last bites — ${left.toLocaleString()} cal still in the wrap`
          : bitten
          ? `${Math.round(100 - pct)}% of the burrito left · ${left.toLocaleString()} cal in the wrap`
          : `the whole burrito awaits · ${left.toLocaleString()} cal pool`}
      </div>
    </div>
  );
}
