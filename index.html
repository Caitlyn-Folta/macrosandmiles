/* ============ IndexedDB storage shim ============
   Same API shape as the Claude artifact's window.storage,
   so the component code below is unchanged where it calls it.
   IndexedDB has no meaningful size cap, which matters for photos. */
(function () {
  let dbp = null;
  function open() {
    if (dbp) return dbp;
    dbp = new Promise((res, rej) => {
      const r = indexedDB.open("macros-miles", 1);
      r.onupgradeneeded = () => r.result.createObjectStore("kv");
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
    return dbp;
  }
  async function tx(mode, fn) {
    const db = await open();
    return new Promise((res, rej) => {
      const t = db.transaction("kv", mode);
      const req = fn(t.objectStore("kv"));
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  }
  window.storage = {
    async get(key) {
      const v = await tx("readonly", (s) => s.get(key));
      return v === undefined ? null : { key, value: v };
    },
    async set(key, value) {
      await tx("readwrite", (s) => s.put(value, key));
      return { key, value };
    },
    async delete(key) {
      await tx("readwrite", (s) => s.delete(key));
      return { key, deleted: true };
    },
    async list(prefix) {
      const keys = await tx("readonly", (s) => s.getAllKeys());
      return { keys: prefix ? keys.filter((k) => String(k).startsWith(prefix)) : keys };
    },
  };
})();

/* Ask the browser to protect IndexedDB from eviction (best effort) */
if (navigator.storage && navigator.storage.persist) navigator.storage.persist();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
}
</script>

/* ---------- weekly banking math ---------- */
const calFor = (ds, history, liveDate, liveCal) => (ds === liveDate ? liveCal : history[ds]?.c ?? null);

const bankEarned = (anyDateInWeek, history, settings, liveDate, liveCal) => {
  const mon = weekMonday(anyDateInWeek);
  let bank = 0;
  for (let i = 0; i < 4; i++) {
    const ds = shiftDate(mon, i);
    const c = calFor(ds, history, liveDate, liveCal);
    if (c !== null && c > 0) bank += Math.max(0, settings.calTarget - c);
  }
  return bank;
};

const poolSpentThrough = (ds, history, liveDate, liveCal) => {
  const mon = weekMonday(ds);
  let spent = 0;
  for (let i = 4; i < 7; i++) {
    const d2 = shiftDate(mon, i);
    if (d2 > ds) break;
    const c = calFor(d2, history, liveDate, liveCal);
    if (c) spent += c;
  }
  return spent;
};

const onPlanCal = (ds, history, settings, liveDate, liveCal) => {
  const c = calFor(ds, history, liveDate, liveCal);
  if (c === null || c === 0) return false;
  if (!isPoolDay(ds)) return c <= settings.calTarget;
  const pool = 3 * settings.calTarget + bankEarned(ds, history, settings, liveDate, liveCal);
  return poolSpentThrough(ds, history, liveDate, liveCal) <= pool;
};

const dayScore = (ds, history, settings, liveDate, live) => {
  const rec = ds === liveDate ? { c: totalCal(live), s: live.steps, e: live.entries.length } : history[ds];
  if (!rec) return history[ds]?.shield ? 100 : 0;
  if (rec.shield) return 100;
  let score = 0;
  if (rec.e > 0) score += 30;
  if (onPlanCal(ds, history, settings, liveDate, ds === liveDate ? totalCal(live) : rec.c)) score += 40;
  score += Math.min(30, Math.round((rec.s / settings.stepGoal) * 30));
  return score;
};

const questsForDate = (dateStr) => {
  const pool = (isPoolDay(dateStr) ? [...WEEKEND_QUESTS, ...SHARED_QUESTS] : [...WEEKDAY_QUESTS, ...SHARED_QUESTS]);
  const idx = [...pool.keys()];
  let seed = hashStr(dateStr);
  for (let i = idx.length - 1; i > 0; i--) {
    seed = (seed * 9301 + 49297) % 233280;
    const j = seed % (i + 1);
    [idx[i], idx[j]] = [idx[j], idx[i]];
  }
  return idx.slice(0, 3).map((i) => pool[i]);
};

function takeNumber(s) {
  let m = s.match(/^(\d+)\s+(\d+)\s*\/\s*(\d+)\b\s*(.*)$/);
  if (m) return { qty: Number(m[1]) + Number(m[2]) / Number(m[3]), rest: m[4] };
  m = s.match(/^(\d+)\s*\/\s*(\d+)\b\s*(.*)$/);
  if (m) return { qty: Number(m[1]) / Number(m[2]), rest: m[3] };
  m = s.match(/^(\d+(?:\.\d+)?)\s*[-–]\s*(\d+(?:\.\d+)?)\b\s*(.*)$/);
  if (m) return { qty: (Number(m[1]) + Number(m[2])) / 2, rest: m[3] };
  m = s.match(/^(\d+(?:\.\d+)?)\s*(.*)$/);
  if (m) return { qty: Number(m[1]), rest: m[2] };
  m = s.match(/^([a-z]+)\s+(.*)$/);
  if (m && WORD_NUM[m[1]] != null) {
    let rest = m[2];
    const and = rest.match(/^and\s+(?:a\s+)?half\s+(.*)$/);
    if (and) return { qty: WORD_NUM[m[1]] + 0.5, rest: and[1] };
    return { qty: WORD_NUM[m[1]], rest };
  }
  return null;
}

function takeUnit(s) {
  const two = s.match(/^([a-z]+\s[a-z]+)\.?\b\s*(.*)$/);
  if (two && VOLUME_UNITS[two[1]] != null)
    return { type: "volume", ml: VOLUME_UNITS[two[1]], rest: two[2] };
  const one = s.match(/^([a-z]+)\.?\b\s*(.*)$/);
  if (!one) return null;
  const u = one[1], rest = one[2];
  if (WEIGHT_UNITS[u] != null) return { type: "weight", grams: WEIGHT_UNITS[u], rest };
  if (VOLUME_UNITS[u] != null) return { type: "volume", ml: VOLUME_UNITS[u], rest };
  if (COLLOQUIAL_UNITS[u] != null) return { type: "weight", grams: COLLOQUIAL_UNITS[u], rough: true, rest };
  if (COUNT_UNITS.has(u)) return { type: "count", countNoun: u, rest };
  return null;
}

function parseSegment(raw) {
  let s = normalizeFood(raw);
  if (!s) return null;
  let qty = null, unit = null;

  const num = takeNumber(s);
  if (num) { qty = num.qty; s = num.rest; }

  const u = takeUnit(s);
  if (u) { unit = u; s = u.rest; }
  s = s.replace(/^of\s+/, "");

  if (qty === null) {
    const trail = s.match(/^(.*?)[\s,]+(\d+(?:\.\d+)?)\s*([a-z]+)\.?\s*$/);
    if (trail) {
      const tu = takeUnit(trail[3] + " ");
      if (tu) { qty = Number(trail[2]); unit = tu; s = trail[1]; }
    }
  }

  const name = s.trim();
  if (!name && !unit) return null;
  return {
    qty: qty !== null ? qty : 1,
    unit: unit ? { type: unit.type, grams: unit.grams, ml: unit.ml, rough: !!unit.rough, countNoun: unit.countNoun } : { type: "count" },
    name: name || raw.trim(),
    raw: raw.trim(),
  };
}

const splitSegments = (desc) =>
  desc.split(/\+|,|&|\band\b|\bwith\b|\bw\/\b|\bplus\b/i).map((x) => x.trim()).filter(Boolean);

function scaleFactor(parsed, entry) {
  const { qty, unit } = parsed;
  if (unit.type === "count") return { factor: qty, rough: false };
  if (unit.type === "weight" && entry.liquid && entry.ml)
    return { factor: (qty * unit.grams) / entry.ml, rough: unit.rough }; /* grams ≈ ml for drinks */
  if (unit.type === "weight") {
    if (entry.g) return { factor: (qty * unit.grams) / entry.g, rough: unit.rough };
    return { factor: (qty * unit.grams) / 150, rough: true };
  }
  if (entry.ml) return { factor: (qty * unit.ml) / entry.ml, rough: false };
  if (entry.g) return { factor: (qty * unit.ml * 0.85) / entry.g, rough: true };
  return { factor: qty, rough: true };
}

const applyFactor = (entry, name, factor, rough) => ({
  name,
  cal: Math.round(entry.c * factor),
  p: Math.round((entry.p || 0) * factor),
  f: Math.round((entry.f || 0) * factor),
  rough,
});

/* ---------- custom foods (user-created via nutrition label scan or manual entry) ----------
   Same shape as FOOD_DB entries: { k: [name], c, p, f, g?, ml?, liquid? }. */
const CUSTOM_KEY = "mm:customfoods:v1";
function customLoad() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_KEY) || "[]"); } catch { return []; }
}
function customStore(list) {
  try { localStorage.setItem(CUSTOM_KEY, JSON.stringify(list)); } catch {}
}

function localMatch(name) {
  const scan = (list) => {
    let best = null;
    for (const item of list)
      for (const kk of item.k)
        if (name.includes(kk) && (!best || kk.length > best.kl)) best = { entry: item, kl: kk.length, key: kk };
    return best;
  };
  /* user-created foods win over the built-in table */
  const custom = scan(customLoad());
  if (custom) return Object.assign(custom, { custom: true });
  return scan(FOOD_DB);
}

function cacheGet(name) {
  try {
    const c = JSON.parse(localStorage.getItem(CACHE_KEY) || "{}");
    return c[name] || null;
  } catch { return null; }
}
function cachePut(name, entry) {
  try {
    const c = JSON.parse(localStorage.getItem(CACHE_KEY) || "{}");
    c[name] = entry;
    localStorage.setItem(CACHE_KEY, JSON.stringify(c));
  } catch {}
}

const NUTRIENT_IDS = { cal: [1008, 2047, 2048], p: [1003], f: [1079] };

function extractNutrients(foodNutrients) {
  const grab = (ids) => {
    for (const id of ids) {
      const n = foodNutrients.find((x) => (x.nutrientId != null ? x.nutrientId : x.nutrient && x.nutrient.id) === id);
      if (n) {
        const v = n.value != null ? n.value : n.amount;
        if (typeof v === "number") return v;
      }
    }
    return 0;
  };
  return { cal: grab(NUTRIENT_IDS.cal), p: grab(NUTRIENT_IDS.p), f: grab(NUTRIENT_IDS.f) };
}

async function usdaSearch(name) {
  const url = `${USDA_SEARCH}?api_key=${USDA_KEY}&query=${encodeURIComponent(name)}` +
    `&dataType=${encodeURIComponent("Survey (FNDDS)")},${encodeURIComponent("SR Legacy")},Branded&pageSize=5`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`USDA HTTP ${res.status}`);
  const data = await res.json();
  return data.foods || [];
}

async function usdaPortions(fdcId) {
  try {
    const res = await fetch(`${USDA_DETAIL}${fdcId}?api_key=${USDA_KEY}`);
    if (!res.ok) return [];
    const data = await res.json();
    return data.foodPortions || [];
  } catch { return []; }
}

function portionGrams(portions, parsed) {
  if (!portions.length) return null;
  const want = parsed.unit.countNoun || parsed.name.split(/\s+/).pop();
  const text = (p) => `${p.portionDescription || ""} ${p.modifier || ""} ${(p.measureUnit && p.measureUnit.name) || ""}`.toLowerCase();
  if (parsed.unit.type === "volume") {
    const volName = parsed.unit.ml >= 240 ? "cup" : parsed.unit.ml >= 15 ? "tablespoon" : "teaspoon";
    const hit = portions.find((p) => text(p).includes(volName));
    if (hit && hit.gramWeight) return hit.gramWeight * (parsed.unit.ml / (volName === "cup" ? 240 : volName === "tablespoon" ? 15 : 5));
  }
  const hit =
    portions.find((p) => want && text(p).includes(want.replace(/s$/, ""))) ||
    portions.find((p) => /each|1 (item|unit|piece)|small|medium/.test(text(p)));
  if (hit && hit.gramWeight) return hit.gramWeight;
  const sorted = portions.filter((p) => p.gramWeight).sort((a, b) => a.gramWeight - b.gramWeight);
  return sorted.length ? sorted[Math.floor(sorted.length / 2)].gramWeight : null;
}

async function usdaResolve(parsed) {
  const foods = await usdaSearch(parsed.name);
  if (!foods.length) return { status: "none" };

  const build = async (food, needPortion) => {
    const per100 = extractNutrients(food.foodNutrients || []);
    let grams;
    let rough = false;

    if (parsed.unit.type === "weight") {
      grams = parsed.qty * parsed.unit.grams;
      rough = parsed.unit.rough;
    } else {
      let pg = null;
      if (food.servingSize && /g/i.test(food.servingSizeUnit || "")) pg = food.servingSize;
      if (!pg && needPortion) pg = portionGrams(await usdaPortions(food.fdcId), parsed);
      if (!pg) { pg = parsed.unit.type === "volume" ? parsed.unit.ml * 0.85 : 100; rough = true; }
      grams = pg * parsed.qty;
    }

    const factor = grams / 100;
    const perServing = grams / Math.max(parsed.qty, 0.001);
    cachePut(parsed.name, {
      c: Math.round(per100.cal * (perServing / 100)),
      p: Math.round(per100.p * (perServing / 100)),
      f: Math.round(per100.f * (perServing / 100)),
      g: Math.round(perServing),
    });
    return {
      name: `${parsed.qty !== 1 ? parsed.qty + "× " : ""}${(food.description || parsed.name).toLowerCase().slice(0, 50)}`,
      cal: Math.round(per100.cal * factor),
      p: Math.round(per100.p * factor),
      f: Math.round(per100.f * factor),
      rough,
    };
  };

  const top = foods[0];
  const second = foods[1];
  const dominant = !second || (top.score && second.score && top.score > second.score * 1.6);

  if (dominant) return { status: "resolved", entry: await build(top, true) };
  const candidates = [];
  for (const fd of foods.slice(0, 3)) candidates.push(await build(fd, fd === top));
  return { status: "candidates", candidates };
}

async function lookupFood(desc) {
  const results = [];
  for (const seg of splitSegments(desc)) {
    const parsed = parseSegment(seg);
    if (!parsed) continue;

    const local = localMatch(parsed.name);
    if (local) {
      const sf = scaleFactor(parsed, local.entry);
      const label = parsed.qty !== 1 || parsed.unit.type !== "count" ? parsed.raw.slice(0, 50) : local.key;
      results.push({ status: "resolved", source: local.custom ? "custom" : "local", parsed, entry: applyFactor(local.entry, label, sf.factor, sf.rough) });
      continue;
    }

    const cached = cacheGet(parsed.name);
    if (cached) {
      const sf = scaleFactor(parsed, cached);
      results.push({ status: "resolved", source: "cache", parsed, entry: applyFactor(cached, parsed.raw.slice(0, 50), sf.factor, sf.rough) });
      continue;
    }

    if (!USDA_KEY) { results.push({ status: "none", source: "nokey", parsed }); continue; }
    try {
      const r = await usdaResolve(parsed);
      results.push(Object.assign({ source: "usda", parsed }, r));
    } catch (e) {
      results.push({ status: "none", source: "error", parsed, error: e.message });
    }
  }
  return { segments: results };
}

/* ---------- image compression ---------- */
const compressImage = (file, maxDim = 900, quality = 0.72) =>
  new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

/* ---------- nutrition label OCR (tesseract.js, loaded on first use) ---------- */
let tessPromise = null;
function loadTesseract() {
  if (window.Tesseract) return Promise.resolve(window.Tesseract);
  if (!tessPromise) {
    tessPromise = new Promise((res, rej) => {
      const s = document.createElement("script");
      s.src = "https://unpkg.com/tesseract.js@5.1.1/dist/tesseract.min.js";
      s.onload = () => (window.Tesseract ? res(window.Tesseract) : rej(new Error("OCR library unavailable — are you offline?")));
      s.onerror = () => rej(new Error("couldn't load OCR library — are you offline?"));
      document.head.appendChild(s);
    });
    tessPromise.catch(() => { tessPromise = null; }); /* allow retry once back online */
  }
  return tessPromise;
}

async function ocrImage(dataUrl) {
  const T = await loadTesseract();
  const worker = await T.createWorker("eng");
  try {
    const { data } = await worker.recognize(dataUrl);
    return data.text || "";
  } finally {
    await worker.terminate();
  }
}

/* Pull serving size, calories, protein, and fiber out of raw OCR text.
   Any field it can't find comes back null and the user fills it in. */
function parseNutritionLabel(text) {
  const t = text.toLowerCase().replace(/,/g, "");
  const grab = (re) => { const m = t.match(re); return m ? parseFloat(m[1]) : null; };
  const cal = grab(/calories[^0-9]{0,24}(\d{1,4})\b/);
  const p = grab(/protein[^0-9]{0,12}(\d{1,3}(?:\.\d+)?)\s*g/);
  const f = grab(/(?:dietary\s*)?fib(?:er|re)[^0-9]{0,12}(\d{1,3}(?:\.\d+)?)\s*g/);
  /* "Serving size 2/3 cup (55g)" — prefer the parenthesized weight */
  let sv = t.match(/\(\s*(\d{1,4}(?:\.\d+)?)\s*(g|ml)\s*\)/);
  if (!sv) sv = t.match(/serving\s*size[^0-9]{0,30}(\d{1,4}(?:\.\d+)?)\s*(g|ml)\b/);
  return {
    cal, p, f,
    g: sv ? parseFloat(sv[1]) : null,
    liquid: !!(sv && sv[2] === "ml"),
  };
}

    const [y2, m2, d2] = last.d.split("-").map(Number);
    const days = Math.max(1, (new Date(y2, m2 - 1, d2) - new Date(y1, m1 - 1, d1)) / 86400000);
    const perWeek = ((last.w - first.w) / days) * 7;
    const in30 = last.w + (perWeek / 7) * 30;
    return { perWeek, in30 };
  }, [weightSorted]);

  const overlayChart = useMemo(() => {
    const wmap = Object.fromEntries(weights.map((w) => [w.d, w.w]));
    const out = [];
    for (let i = 27; i >= 0; i--) {
      const ds = shiftDate(today, -i);
      const rec = ds === today ? { c: total } : history[ds];
      out.push({ d: shortDate(ds), cal: (rec && rec.c) || null, w: wmap[ds] != null ? wmap[ds] : null });
    }
    return out;
  }, [history, weights, today, total]);

  /* ---------- actions ---------- */
  const awardXp = async (amount) => {
    const before = levelFromXp(profile.xp);
    const next = Object.assign({}, profile, { xp: profile.xp + amount });
    await commitProfile(next);
    const after = levelFromXp(next.xp);
    if (after > before) flash(`LEVEL ${after} — new analytics unlocked in Trends`);
    return after > before;
  };

  const addEntries = async (items) => {
    const hour = new Date().getHours();
    const base = Date.now();
    const es = items.map((it, i) => ({
      id: base + i,
      name: (it.name || "").trim() || "Food",
      cal: Math.max(0, Math.round(it.cal)),
      p: Math.max(0, Math.round(it.p || 0)),
      f: Math.max(0, Math.round(it.f || 0)),
      hour,
    }));
    await commitDay(Object.assign({}, day, { entries: [...day.entries, ...es], xp: day.xp + 5 * es.length }));
    await awardXp(5 * es.length);
    setDesc(""); setCalInput(""); setProtInput(""); setFibInput(""); setEstimateNote(""); setEstimateItems(null);
  };
  const addEntry = (name, cal, p = 0, f = 0) => addEntries([{ name, cal, p, f }]);
  const removeEntry = async (id) => commitDay(Object.assign({}, day, { entries: day.entries.filter((e) => e.id !== id) }));
  const saveEditEntry = async () => {
    const cal = parseInt(editEntry.cal, 10);
    if (!editEntry.name.trim() || isNaN(cal)) return;
    const fields = {
      name: editEntry.name.trim(),
      cal: Math.max(0, cal),
      p: Math.max(0, parseInt(editEntry.p, 10) || 0),
      f: Math.max(0, parseInt(editEntry.f, 10) || 0),
    };
    await commitDay(Object.assign({}, day, { entries: day.entries.map((e) => (e.id === editEntry.id ? Object.assign({}, e, fields) : e)) }));
    setEditEntry(null);
  };
  const saveSteps = async (val) => {
    const n = parseInt(val != null ? val : stepInput, 10);
    if (!isNaN(n) && n >= 0) { await commitDay(Object.assign({}, day, { steps: n })); setStepInput(""); return true; }
    return false;
  };
  const savePreset = async (name, cal, p = 0, f = 0) => {
    if (presets.some((x) => x.name === name)) return;
    const next = [...presets, { name, cal, p, f }];
    setPresets(next); await sset(K.presets, next);
    flash("Saved as preset");
  };
  const deletePreset = async (name) => {
    const next = presets.filter((p) => p.name !== name);
    setPresets(next); await sset(K.presets, next);
  };
  const saveWeight = async (val) => {
    const w = parseFloat(val != null ? val : weightInput);
    if (isNaN(w) || w <= 0) return false;
    const next = [...weights.filter((x) => x.d !== today), { d: today, w }];
    setWeights(next); await sset(K.weight, next); setWeightInput("");
    return true;
  };
  const toggleManualQuest = async (qid) => {
    if (day.closed) return;
    const mq = Object.assign({}, day.mq);
    mq[qid] = !mq[qid];
    await commitDay(Object.assign({}, day, { mq }));
  };

  /* ---------- food estimate: local table -> custom foods -> cache -> USDA ----------
     Every parsed input gets its own line with the tool's estimate, editable before adding. */
  const SOURCE_LABEL = { local: "built-in table", custom: "your food database", cache: "seen before", usda: "USDA lookup" };
  const estimate = async () => {
    if (!desc.trim()) return;
    setEstimating(true); setEstimateNote(""); setEstimateItems(null);
    try {
      const { segments } = await lookupFood(desc);
      if (!segments.length) {
        setEstimateNote("Couldn't read that. Try something like '2 street tacos and a modelo'.");
        setEstimating(false);
        return;
      }
      const items = segments.map((s, i) => {
        const e = s.status === "resolved" ? s.entry : s.status === "candidates" ? s.candidates[0] : null;
        const notes = [];
        if (!e) {
          notes.push(s.source === "nokey"
            ? "no match, and no USDA key set — enter the numbers"
            : s.source === "error" ? `lookup failed (${s.error}) — enter the numbers` : "no match found — enter the numbers");
        } else {
          notes.push(SOURCE_LABEL[s.source] || s.source);
          if (s.status === "candidates") notes.push("closest USDA match — edit if it looks off");
          if (e.rough) notes.push("portion estimated");
        }
        return {
          id: i,
          raw: s.parsed.raw,
          name: e ? e.name : s.parsed.raw.slice(0, 50),
          cal: e ? String(e.cal) : "",
          p: e ? String(e.p || 0) : "",
          f: e ? String(e.f || 0) : "",
          note: notes.join(" · "),
        };
      });
      setEstimateItems(items);
      setEstimateNote(items.every((x) => x.cal === "")
        ? "No matches. Fill in the calories on each line, then add — it's cached for next time."
        : "Check each line and tweak anything that looks off, then add.");
    } catch (e) {
      setEstimateNote(`Lookup failed (${e.message}). Enter values manually.`);
    }
    setEstimating(false);
  };

  const setEstimateItem = (id, field, value) =>
    setEstimateItems((prev) => prev.map((it) => (it.id === id ? Object.assign({}, it, { [field]: value }) : it)));
  const removeEstimateItem = (id) =>
    setEstimateItems((prev) => { const next = prev.filter((it) => it.id !== id); return next.length ? next : null; });
  const readyEstimateItems = (estimateItems || []).filter((it) => it.name.trim() && !isNaN(parseInt(it.cal, 10)));
  const addEstimateItems = async () => {
    if (!readyEstimateItems.length) return;
    await addEntries(readyEstimateItems.map((it) => ({
      name: it.name, cal: parseInt(it.cal, 10), p: parseInt(it.p, 10) || 0, f: parseInt(it.f, 10) || 0,
    })));
  };

  const submitFood = () => {
    const cal = parseInt(calInput, 10);
    if (desc.trim() && !isNaN(cal)) addEntry(desc, cal, parseInt(protInput, 10) || 0, parseInt(fibInput, 10) || 0);
    else if (desc.trim() && !calInput) estimate();
  };

  /* ---------- custom foods: nutrition label scan + manual entry ---------- */
  const scanLabel = async (file) => {
    if (!file) return;
    setLabelBusy(true); setLabelNote("");
    try {
      const dataUrl = await compressImage(file, 1400, 0.9);
      const r = parseNutritionLabel(await ocrImage(dataUrl));
      setLabelForm({
        name: "",
        cal: r.cal != null ? String(r.cal) : "",
        p: r.p != null ? String(r.p) : "",
        f: r.f != null ? String(r.f) : "",
        g: r.g != null ? String(r.g) : "",
        liquid: r.liquid,
      });
      const found = ["cal", "p", "f", "g"].filter((k) => r[k] != null).length;
      setLabelNote(found
        ? `Read ${found}/4 fields off the label. Name it, check the numbers, save.`
        : "Couldn't read numbers off that photo. Try a straighter, closer shot — or type them in below.");
    } catch (e) {
      setLabelForm({ name: "", cal: "", p: "", f: "", g: "", liquid: false });
      setLabelNote(`Scan failed (${e.message}). Type the label values in below.`);
    }
    setLabelBusy(false);
  };

  const saveCustomFood = async (alsoLog) => {
    const name = labelForm.name.trim().toLowerCase();
    const cal = parseFloat(labelForm.cal);
    if (!name || isNaN(cal)) { setLabelNote("Needs at least a name and calories per serving."); return; }
    const entry = {
      k: [name],
      c: Math.max(0, Math.round(cal)),
      p: Math.max(0, Math.round(parseFloat(labelForm.p) || 0)),
      f: Math.max(0, Math.round(parseFloat(labelForm.f) || 0)),
    };
    const g = parseFloat(labelForm.g);
    if (!isNaN(g) && g > 0) {
      if (labelForm.liquid) { entry.ml = g; entry.liquid = true; } else entry.g = g;
    }
    const next = [...customFoods.filter((x) => x.k[0] !== name), entry];
    setCustomFoods(next); customStore(next);
    setLabelForm(null); setLabelNote("");
    flash(`"${name}" added to your food database`);
    if (alsoLog) await addEntry(name, entry.c, entry.p, entry.f);
  };

  const deleteCustomFood = (name) => {
    const next = customFoods.filter((x) => x.k[0] !== name);
    setCustomFoods(next); customStore(next);
  };

  const saveSettings = async () => {
    const ct = parseInt(calDraft, 10), sg = parseInt(stepDraft, 10), pg = parseInt(protDraft, 10), fg = parseInt(fibDraft, 10);
    const next = {
      calTarget: !isNaN(ct) && ct > 0 ? ct : settings.calTarget,
      stepGoal: !isNaN(sg) && sg > 0 ? sg : settings.stepGoal,
      proteinGoal: !isNaN(pg) && pg > 0 ? pg : settings.proteinGoal,
      fiberGoal: !isNaN(fg) && fg > 0 ? fg : settings.fiberGoal,
    };
    setSettings(next); await sset(K.settings, next);
    setShowSettings(false); setCalDraft(""); setStepDraft("");
  };

  /* ---------- Close the Day ritual ---------- */
  const startClose = () => setCloseFlow({ step: 1, steps: day.steps ? String(day.steps) : "", weight: "" });

  const finishClose = async () => {
    let d = day;
    const n = parseInt(closeFlow.steps, 10);
    if (!isNaN(n) && n >= 0 && n !== day.steps) { d = Object.assign({}, d, { steps: n }); }
    let wLogged = weights.some((w) => w.d === today);
    if (closeFlow.weight) { const ok = await saveWeight(closeFlow.weight); if (ok) wLogged = true; }

    const liveOnPlan = onPlanCal(today, history, settings, today, totalCal(d));
    const stepsHit = d.steps >= settings.stepGoal;
    const w = windowsFilled(d);
    const windowCount = [w.morning, w.midday, w.evening].filter(Boolean).length;
    const qDone = quests.map((q) => (q.manual ? !!d.mq[q.id] : q.test({ day: d, settings, weights, onPlanNow: liveOnPlan }))).filter(Boolean).length;

    const yesterday = shiftDate(today, -1);
    const yRec = history[yesterday];
    const yQualified = (yRec && yRec.shield) || (yRec && yRec.c > 0 && yRec.s >= settings.stepGoal && onPlanCal(yesterday, history, settings, null, null));
    const comeback = !yQualified && d.entries.length > 0;

    let xp = 20;
    const lines = [{ t: "Closed the day", v: 20 }];
    if (liveOnPlan) { xp += 30; lines.push({ t: "On plan", v: 30 }); }
    if (stepsHit) { xp += 25; lines.push({ t: "Step goal", v: 25 }); }
    if (qDone > 0) { xp += qDone * 15; lines.push({ t: `Quests ×${qDone}`, v: qDone * 15 }); }
    if (qDone === 3) { xp += 25; lines.push({ t: "Full quest board", v: 25 }); }
    if (wLogged) { xp += 10; lines.push({ t: "Weigh-in", v: 10 }); }
    const pHit = totalProt(d) >= settings.proteinGoal;
    const fHit = totalFib(d) >= settings.fiberGoal;
    if (pHit) { xp += 15; lines.push({ t: "💪 Protein goal", v: 15 }); }
    if (fHit) { xp += 15; lines.push({ t: "🥦 Fiber goal", v: 15 }); }
    if (pHit && fHit) { xp += 10; lines.push({ t: "Macro Sweep", v: 10 }); }
    if (comeback) { xp += 40; lines.push({ t: "COMEBACK", v: 40 }); }

    const score = (liveOnPlan ? 40 : 0) + Math.min(30, Math.round((d.steps / settings.stepGoal) * 30)) + Math.round((windowCount / 3) * 20) + Math.round((qDone / 3) * 10);

    let prof = Object.assign({}, profile, { xp: profile.xp + xp });
    let tokenEarned = false;
    if (liveOnPlan && stepsHit) {
      prof.perfect = (prof.perfect || 0) + 1;
      if (prof.perfect % 7 === 0 && (prof.tokens || 0) < 3) { prof.tokens = (prof.tokens || 0) + 1; tokenEarned = true; }
    }
    const newStreak = (liveOnPlan && stepsHit && d.entries.length > 0 ? 1 : 0) + (() => { let c = 0, cur = yesterday; while (dayQual(cur)) { c++; cur = shiftDate(cur, -1); } return c; })();
    if (newStreak > (prof.bestStreak || 0)) prof.bestStreak = newStreak;

    const beforeLevel = levelFromXp(profile.xp);
    const afterLevel = levelFromXp(prof.xp);

    d = Object.assign({}, d, { closed: true, xp: d.xp + xp });
    await commitDay(d);
    await commitProfile(prof);

    let onPlan14 = 0;
    for (let i = 1; i <= 13; i++) if (dayQual(shiftDate(today, -i))) onPlan14++;
    if (liveOnPlan && stepsHit) onPlan14++;
    let weekSteps = 0;
    const mon = weekMonday(today);
    for (let i = 0; i < 7; i++) { const ds = shiftDate(mon, i); if (ds > today) break; weekSteps += ds === today ? d.steps : (history[ds] && history[ds].s) || 0; }
    const wd = weightSorted.length >= 2 ? weightSorted[weightSorted.length - 1].w - weightSorted[0].w : null;
    let protein7 = pHit ? 1 : 0;
    for (let i = 1; i < 7; i++) { const ds = shiftDate(today, -i); if (((history[ds] && history[ds].p) || 0) >= settings.proteinGoal) protein7++; }

    setCloseFlow({
      step: 4,
      reveal: {
        score, xp, lines, tokenEarned,
        levelUp: afterLevel > beforeLevel ? afterLevel : null,
        evidence: evidenceLine({ date: today, comeback, onPlan14, streak: newStreak, bestStreak: prof.bestStreak, weekSteps, stepGoal: settings.stepGoal, weightDelta: wd, protein7 }),
      },
    });
  };

  /* ---------- photos ---------- */
  const addPhoto = async (file) => {
    if (!file) return;
    setPhotoBusy(true); setPhotoNote("");
    try {
      const dataUrl = await compressImage(file);
      const ok = await sset(K.photo(today), dataUrl);
      if (!ok) { setPhotoNote("Couldn't save. Storage may be full."); setPhotoBusy(false); return; }
      setPhotos((prev) => Object.assign({}, prev, { [today]: dataUrl }));
      if (!photoIndex.includes(today)) {
        const next = [...photoIndex, today].sort();
        setPhotoIndex(next); await sset(K.photoIndex, next);
      }
      setPhotoNote("Saved. One photo per day; a new upload replaces it.");
    } catch { setPhotoNote("Couldn't process that image."); }
    setPhotoBusy(false);
  };
  const deletePhoto = async (ds) => {
    try { await window.storage.delete(K.photo(ds)); } catch {}
    const next = photoIndex.filter((x) => x !== ds);
    setPhotoIndex(next); await sset(K.photoIndex, next);
    setPhotos((prev) => { const n = Object.assign({}, prev); delete n[ds]; return n; });
    setViewPhoto(null);
  };

  const exportData = async () => {
    try {
      const bundle = { exported: new Date().toISOString(), settings, presets, history, weights, photoIndex, profile, days: {} };
      for (const ds of Object.keys(history)) { const d = await sget(K.day(ds)); if (d) bundle.days[ds] = d; }
      const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `macros-and-miles-backup-${todayStr()}.json`; a.click();
      URL.revokeObjectURL(url);
    } catch (e) { console.error(e); }
  };

  const firstPhoto = photoIndex[0];
  const lastPhoto = photoIndex[photoIndex.length - 1];
  const weightFor = (ds) => { const hit = weights.find((w) => w.d === ds); return hit ? hit.w : undefined; };
  const pct = Math.min(100, Math.round((total / Math.max(1, budgetShown)) * 100));
  const stepPct = Math.min(100, Math.round((day.steps / settings.stepGoal) * 100));
  const latestW = weightChart.length ? weightChart[weightChart.length - 1].w : null;
  const firstW = weightChart.length ? weightChart[0].w : null;

  if (!loaded) return <div style={{ fontFamily: "system-ui", padding: 40, color: "#2B1B3D" }}>Loading…</div>;

  return (
    <div className="sh-root">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Titan+One&family=Nunito:wght@600;700;800;900&display=swap');
        .sh-root { min-height:100vh; background:#F6EFFF; background-image:radial-gradient(#EBDDFF 1.5px, transparent 1.5px); background-size:22px 22px; color:#2B1B3D; font-family:'Nunito',system-ui,sans-serif; padding:20px 16px 64px; max-width:520px; margin:0 auto; }
        .sh-root * { box-sizing:border-box; }
        .num { font-variant-numeric: tabular-nums; }
        .hdr { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
        .brand { font-family:'Titan One',cursive; font-weight:400; font-size:26px; letter-spacing:.5px; line-height:1; color:#7A2FF2; transform:rotate(-1.5deg); text-shadow:2px 2px 0 #FFC53D; }
        .brand span { color:#FF3E8A; }
        .datebar { font-size:11px; color:#7A6B8E; margin-top:6px; font-weight:800; text-transform:uppercase; letter-spacing:1px; display:flex; align-items:center; gap:4px; }
        .hdr-right { display:flex; gap:14px; align-items:flex-start; }
        .stat { display:flex; flex-direction:column; align-items:flex-end; }
        .stat .n { font-weight:900; font-size:26px; line-height:1; }
        .stat .l { font-size:9px; font-weight:800; letter-spacing:1.2px; text-transform:uppercase; color:#7A6B8E; margin-top:2px; }
        .lvlbar { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
        .lvlpill { font-size:11px; font-weight:900; background:#7A2FF2; color:#fff; border-radius:999px; padding:4px 12px; letter-spacing:1px; white-space:nowrap; box-shadow:2px 2px 0 #2B1B3D; }
        .lvltrack { flex:1; height:10px; background:#fff; border:2px solid #2B1B3D; border-radius:6px; overflow:hidden; }
        .lvltrack > div { height:100%; background:linear-gradient(90deg,#FF3E8A,#7A2FF2); transition:width .3s ease; }
        .lvlxp { font-size:11px; font-weight:800; color:#7A6B8E; white-space:nowrap; }
        .tokens { font-size:12px; }
        .tabs { display:flex; gap:6px; margin-bottom:14px; }
        .tabbtn { flex:1; padding:9px 0; font-weight:900; font-size:12px; letter-spacing:1px; text-transform:uppercase; border:2px solid #2B1B3D; border-radius:999px; background:#fff; cursor:pointer; color:#2B1B3D; }
        .tabbtn.on { background:#FF3E8A; color:#fff; box-shadow:2px 2px 0 #2B1B3D; }
        .peptalk { background:#FFC53D; border:2px dashed #2B1B3D; border-radius:14px; padding:14px 16px; margin-bottom:14px; transform:rotate(-.8deg); box-shadow:4px 4px 0 #FF3E8A; }
        .peptalk .pt-label { font-size:10px; font-weight:900; letter-spacing:2px; text-transform:uppercase; color:#7A2FF2; }
        .peptalk .pt-line { font-size:15px; font-weight:900; margin-top:4px; line-height:1.35; }
        .chain { display:flex; gap:0; align-items:center; margin:0 0 16px; }
        .link { flex:1; height:13px; border-radius:7px; background:#fff; border:2px solid #E3D5F5; margin-right:3px; }
        .link.ok { background:#FF3E8A; border-color:#2B1B3D; }
        .link.shield { background:#00B3A4; border-color:#2B1B3D; }
        .link.logged:not(.ok):not(.shield) { background:#E3D5F5; border-color:#CBB8E8; }
        .link.today { outline:2.5px solid #7A2FF2; outline-offset:2px; }
        .card { background:#fff; border:2px solid #2B1B3D; border-radius:18px; padding:16px; margin-bottom:16px; box-shadow:5px 5px 0 #00B3A4; }
        .card:nth-of-type(even) { box-shadow:5px 5px 0 #FF3E8A; }
        .card h2 { font-size:11px; font-weight:900; letter-spacing:1.5px; text-transform:uppercase; margin:0 0 10px; color:#7A2FF2; display:flex; justify-content:space-between; align-items:center; }
        .bignum { font-family:'Titan One',cursive; font-weight:400; font-size:42px; line-height:1; }
        .sub { font-size:13px; color:#7A6B8E; font-weight:700; margin-top:2px; }
        .bar { height:12px; background:#F6EFFF; border:2px solid #2B1B3D; border-radius:7px; margin-top:12px; overflow:hidden; }
        .bar > div { height:100%; transition:width .3s ease; }
        .row { display:flex; gap:8px; margin-top:12px; }
        input, select { font-family:inherit; font-size:15px; padding:10px 12px; border:2px solid #2B1B3D; border-radius:12px; background:#F6EFFF; width:100%; font-weight:700; color:#2B1B3D; }
        input::placeholder { color:#A894C4; }
        input:focus { outline:3px solid #FFC53D; outline-offset:1px; }
        button { font-family:inherit; font-weight:900; font-size:14px; border:2px solid #2B1B3D; border-radius:999px; padding:10px 16px; cursor:pointer; background:#fff; color:#2B1B3D; }
        button:focus-visible { outline:3px solid #FFC53D; outline-offset:2px; }
        button.pri { background:#7A2FF2; color:#fff; box-shadow:2px 2px 0 #2B1B3D; }
        button.ember { background:#FF3E8A; color:#fff; box-shadow:2px 2px 0 #2B1B3D; }
        button.ink { background:#2B1B3D; color:#FFC53D; }
        button:disabled { opacity:.45; cursor:default; box-shadow:none; }
        .chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
        .chip { background:#F6EFFF; border:2px solid #2B1B3D; border-radius:999px; padding:6px 12px; font-size:13px; font-weight:800; cursor:pointer; display:flex; align-items:center; gap:6px; }
        .chip .x { color:#FF3E8A; font-weight:900; }
        .quest { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:2px dotted #E3D5F5; }
        .quest:last-child { border-bottom:none; }
        .qbox { width:26px; height:26px; border:2px solid #2B1B3D; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:900; flex-shrink:0; background:#fff; margin-top:1px; }
        .qbox.done { background:#00B3A4; border-color:#2B1B3D; color:#fff; transform:rotate(-4deg); }
        .qbox.tap { cursor:pointer; border-style:dashed; background:#FFF6DE; }
        .qname { font-size:14px; font-weight:900; }
        .qname.done { text-decoration:line-through; color:#7A6B8E; }
        .qdesc { font-size:12px; color:#7A6B8E; font-weight:700; }
        .qtag { font-size:9px; font-weight:900; letter-spacing:1px; color:#FF3E8A; text-transform:uppercase; margin-left:6px; }
        .entry { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:2px dotted #E3D5F5; }
        .entry:last-child { border-bottom:none; }
        .entry .nm { font-weight:700; font-size:14px; }
        .entry .actions { display:flex; gap:10px; align-items:center; }

        .compare .side { flex:1; }

        .modal { position:fixed; inset:0; background:rgba(43,27,61,.88); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; z-index:50; }

        .modal .mrow { display:flex; gap:10px; margin-top:14px; }
        .modal button { background:#fff; }
        .sheet { position:fixed; inset:0; background:rgba(43,27,61,.65); display:flex; align-items:flex-end; justify-content:center; z-index:60; }
        .sheet-inner { background:#F6EFFF; width:100%; max-width:520px; border-radius:24px 24px 0 0; border:2px solid #2B1B3D; border-bottom:none; padding:20px 18px 36px; max-height:85vh; overflow-y:auto; }
        .sheet h3 { font-weight:900; font-size:18px; margin:0 0 4px; }
        .sheet .stepno { font-size:10px; font-weight:900; letter-spacing:1.5px; text-transform:uppercase; color:#7A2FF2; }
        .reveal-score { font-family:'Titan One',cursive; font-weight:400; font-size:76px; line-height:1; text-align:center; margin:14px 0 4px; text-shadow:3px 3px 0 #FFC53D; }
        .reveal-label { text-align:center; font-size:11px; font-weight:900; letter-spacing:2px; text-transform:uppercase; color:#7A6B8E; }
        .reveal-quip { text-align:center; font-size:14px; font-weight:900; margin-top:6px; color:#7A2FF2; }
        .xpline { display:flex; justify-content:space-between; font-size:13px; font-weight:800; padding:6px 0; border-bottom:2px dotted #E3D5F5; }
        .xpline .v { color:#7A2FF2; }
        .evidence { background:#2B1B3D; color:#FFC53D; border-radius:14px; padding:14px; font-size:14px; font-weight:800; margin-top:14px; text-align:center; transform:rotate(-.5deg); }
        .toast { position:fixed; top:16px; left:50%; transform:translateX(-50%); background:#FF3E8A; color:#fff; font-weight:900; font-size:13px; padding:10px 18px; border-radius:999px; z-index:70; box-shadow:3px 3px 0 #2B1B3D; }
        .lock { font-size:13px; color:#7A6B8E; font-weight:800; padding:8px 0; }
        @media (prefers-reduced-motion: reduce) { .bar > div, .lvltrack > div { transition:none; } }
      `}</style>

      {toast && <div className="toast">{toast}</div>}

      <div className="hdr">
        <div>
          <div className="brand">MACROS <span>&</span> MILES</div>

            <button className="gear" aria-label="Settings" onClick={() => { setShowSettings(!showSettings); setCalDraft(String(settings.calTarget)); setStepDraft(String(settings.stepGoal)); setProtDraft(String(settings.proteinGoal)); setFibDraft(String(settings.fiberGoal)); }}>⚙︎</button>
          </div>
        </div>
        <div className="hdr-right">
          <div className="stat">
            <div className="n num" style={{ color: adherence >= 70 ? "#00B3A4" : adherence >= 40 ? "#F0A500" : "#7A6B8E" }}>{adherence}</div>
            <div className="l">7-day score</div>
          </div>
          <div className="stat">
            <div className="n num" style={{ color: streak > 0 ? "#FF3E8A" : "#C9B8DE" }}>{streak > 0 ? `🔥${streak}` : "0"}</div>
            <div className="l">streak · best {profile.bestStreak || 0}</div>
          </div>
        </div>
      </div>

      <div className="lvlbar">
        <div className="lvlpill">LVL {level}</div>
        <div className="lvltrack"><div style={{ width: `${levelPct}%` }} /></div>
        <div className="lvlxp num">{profile.xp}/{nextXp} XP</div>
        <div className="tokens" title="Rest Day tokens auto-shield a missed day">{"🛡".repeat(profile.tokens || 0)}</div>
      </div>

      {showSettings && (
        <div className="card">
          <h2>Settings</h2>
          <div className="row"><input inputMode="numeric" value={calDraft} onChange={(e) => setCalDraft(e.target.value)} placeholder="Daily calorie target" aria-label="Calorie target" /></div>
          <div className="row"><input inputMode="numeric" value={stepDraft} onChange={(e) => setStepDraft(e.target.value)} placeholder="Step goal" aria-label="Step goal" /></div>
          <div className="row">
            <input inputMode="numeric" value={protDraft} onChange={(e) => setProtDraft(e.target.value)} placeholder="💪 Protein goal (g)" aria-label="Protein goal in grams" />
            <input inputMode="numeric" value={fibDraft} onChange={(e) => setFibDraft(e.target.value)} placeholder="🥦 Fiber goal (g)" aria-label="Fiber goal in grams" />
          </div>
          <div className="row"><button className="pri" onClick={saveSettings}>Save settings</button><button onClick={() => setShowSettings(false)}>Cancel</button></div>
          <div className="row"><button onClick={exportData}>Export backup (JSON)</button></div>
          <div className="sub" style={{ marginTop: 10 }}>Weekly budget = daily target × 7. Mon–Thu surplus banks into the Fri–Sun pool. Every 7 perfect days earns a 🛡 Rest Day token (max 3) that auto-shields a miss.</div>
        </div>
      )}

      <div className="tabs" role="tablist">
        {["today", "trends", "photos"].map((t) => (
          <button key={t} role="tab" aria-selected={tab === t} className={`tabbtn ${tab === t ? "on" : ""}`} onClick={() => setTab(t)}>{t}</button>
        ))}
      </div>

      {tab === "today" && (
        <React.Fragment>
          <div className="peptalk">
            <div className="pt-label">Today's pep talk</div>
            <div className="pt-line">{pepTalk}</div>
          </div>
          {nudge && (
            <div className="nudge">
              <span>⏰ {nudge.msg}</span>
              <button onClick={() => (nudge.action === "Close the Day" ? startClose() : foodInputRef.current && foodInputRef.current.focus())}>{nudge.action}</button>
            </div>
          )}
          <div className="chain" aria-label="Last 14 days">
            {chain.map((d) => (
              <div key={d.ds} className={`link ${d.shield ? "shield" : d.ok ? "ok" : ""} ${d.logged ? "logged" : ""} ${d.isToday ? "today" : ""}`} title={d.ds + (d.shield ? " (shielded)" : "")} />
            ))}
          </div>

          <div className="card">
            <h2>{poolDay ? <React.Fragment>Weekend pool <span style={{ color: "#7A2FF2" }}>FRI–SUN</span></React.Fragment> : "Today's budget"}</h2>
            <div className="bignum num" style={{ color: remaining < 0 ? "#FF3E8A" : "#2B1B3D" }}>
              {remaining < 0 ? `+${Math.abs(remaining)}` : remaining.toLocaleString()}
            </div>
            <div className="sub num">
              {remaining < 0 ? "over" : "remaining"} · {poolDay ? `${poolSpent.toLocaleString()} / ${pool.toLocaleString()} pool · today so far: ${total.toLocaleString()}` : `${total} / ${settings.calTarget} today`}
            </div>
            {poolDay && remaining > 0 && (
              <div className="sub num" style={{ color: "#7A2FF2" }}>Pace guide: ~{suggestedToday.toLocaleString()} today keeps the pool intact through Sunday.</div>
            )}
            {!poolDay && remaining < 0 && (
              <div className="sub" style={{ color: "#FF3E8A" }}>Over budget. Log it anyway — data doesn't judge, it just testifies later. The 7-day score barely felt that.</div>
            )}
            <div className="bar"><div style={{ width: `${poolDay ? Math.min(100, Math.round((poolSpent / pool) * 100)) : pct}%`, background: remaining < 0 ? "#FF3E8A" : "#7A2FF2" }} /></div>

            {!poolDay && (
              <div className="bank num">🏦 Banked for the weekend: {bank.toLocaleString()} cal{total > 0 && total < settings.calTarget ? ` (includes ${settings.calTarget - total} pending today)` : ""}</div>
            )}
            {poolDay && bank > 0 && (
              <div className="bank num">🏦 Your Mon–Thu banking added {bankEarned(today, history, settings, null, null).toLocaleString()} cal to this pool. Date night is pre-funded.</div>
            )}

            <div className="pips" aria-label="Meal windows — filled means you logged in that window; tap to log">
              <div role="button" tabIndex={0} className={`pip ${wins.morning ? "filled" : ""}`} onClick={() => foodInputRef.current && foodInputRef.current.focus()}>morning</div>
              <div role="button" tabIndex={0} className={`pip ${wins.midday ? "filled" : ""}`} onClick={() => foodInputRef.current && foodInputRef.current.focus()}>midday</div>
              <div role="button" tabIndex={0} className={`pip ${wins.evening ? "filled" : ""}`} onClick={() => foodInputRef.current && foodInputRef.current.focus()}>evening</div>
            </div>

            <div className="row">
              <input ref={foodInputRef} value={desc} onChange={(e) => setDesc(e.target.value)} placeholder={foodPh} aria-label="Food description" onKeyDown={(e) => e.key === "Enter" && submitFood()} />
            </div>
            <div className="row">
              <input inputMode="numeric" value={calInput} onChange={(e) => setCalInput(e.target.value)} placeholder="cal" aria-label="Calories" />
              <input inputMode="numeric" value={protInput} onChange={(e) => setProtInput(e.target.value)} placeholder="💪g" aria-label="Protein grams" />
              <input inputMode="numeric" value={fibInput} onChange={(e) => setFibInput(e.target.value)} placeholder="🥦g" aria-label="Fiber grams" />
            </div>
            <div className="row">
              <button className="ember" style={{ flex: 1 }} onClick={estimate} disabled={estimating || !desc.trim()}>{estimating ? "consulting the snack actuary…" : "Estimate"}</button>
              <button className="pri" style={{ flex: 1 }} onClick={submitFood} disabled={!desc.trim() || !calInput}>Add</button>
            </div>
            {estimateNote && <div className="note">{estimateNote}</div>}

            {estimateItems && (
              <div>
                {estimateItems.map((it) => (
                  <div className="estitem" key={it.id}>
                    <div className="row" style={{ marginTop: 0 }}>
                      <input value={it.name} onChange={(e) => setEstimateItem(it.id, "name", e.target.value)} aria-label={`Name for ${it.raw}`} />
                      <button className="tinybtn" title="Remove item" aria-label={`Remove ${it.raw}`} onClick={() => removeEstimateItem(it.id)}>✕</button>
                    </div>
                    <div className="row" style={{ marginTop: 6 }}>
                      <input inputMode="numeric" value={it.cal} onChange={(e) => setEstimateItem(it.id, "cal", e.target.value)} placeholder="cal" aria-label={`Calories for ${it.raw}`} />
                      <input inputMode="numeric" value={it.p} onChange={(e) => setEstimateItem(it.id, "p", e.target.value)} placeholder="💪g" aria-label={`Protein for ${it.raw}`} />
                      <input inputMode="numeric" value={it.f} onChange={(e) => setEstimateItem(it.id, "f", e.target.value)} placeholder="🥦g" aria-label={`Fiber for ${it.raw}`} />
                    </div>
                    <div className="estnote">"{it.raw}" · {it.note}</div>
                  </div>
                ))}
                <div className="row">
                  <button className="pri" style={{ flex: 1 }} onClick={addEstimateItems} disabled={!readyEstimateItems.length}>
                    Add {readyEstimateItems.length} item{readyEstimateItems.length === 1 ? "" : "s"} · {readyEstimateItems.reduce((a, it) => a + parseInt(it.cal, 10), 0)} cal
                  </button>
                  <button onClick={() => { setEstimateItems(null); setEstimateNote(""); }}>Cancel</button>
                </div>
              </div>
            )}

            {presets.length > 0 && (
              <div className="chips">
                {presets.map((p) => (
                  <div key={p.name} className="chip" onClick={() => (managePresets ? deletePreset(p.name) : addEntry(p.name, p.cal, p.p || 0, p.f || 0))}>
                    {p.name} <span className="num" style={{ color: "#7A6B8E" }}>{p.cal}</span>
                    {managePresets && <span className="x">×</span>}
                  </div>
                ))}
                <div className="chip" style={{ background: "#fff" }} onClick={() => setManagePresets(!managePresets)}>{managePresets ? "done" : "edit"}</div>
              </div>
            )}

            <div style={{ marginTop: 14 }}>
              {day.entries.length === 0 && <div className="empty">{emptyLine}</div>}
              {day.entries.map((e) =>
                editEntry && editEntry.id === e.id ? (
                  <div className="estitem" key={e.id}>
                    <div className="row" style={{ marginTop: 0 }}>
                      <input value={editEntry.name} onChange={(ev) => setEditEntry(Object.assign({}, editEntry, { name: ev.target.value }))} aria-label="Edit food name" />
                    </div>
                    <div className="row" style={{ marginTop: 6 }}>
                      <input inputMode="numeric" value={editEntry.cal} onChange={(ev) => setEditEntry(Object.assign({}, editEntry, { cal: ev.target.value }))} placeholder="cal" aria-label="Edit calories" />
                      <input inputMode="numeric" value={editEntry.p} onChange={(ev) => setEditEntry(Object.assign({}, editEntry, { p: ev.target.value }))} placeholder="💪g" aria-label="Edit protein" />
                      <input inputMode="numeric" value={editEntry.f} onChange={(ev) => setEditEntry(Object.assign({}, editEntry, { f: ev.target.value }))} placeholder="🥦g" aria-label="Edit fiber" />
                    </div>
                    <div className="row" style={{ marginTop: 6 }}>
                      <button className="pri" style={{ flex: 1 }} onClick={saveEditEntry} disabled={!editEntry.name.trim() || isNaN(parseInt(editEntry.cal, 10))}>Save</button>
                      <button onClick={() => setEditEntry(null)}>Cancel</button>
                    </div>
                  </div>
                ) : (
                  <div className="entry" key={e.id}>
                    <span className="nm">
                      {e.name}
                      {(e.p || e.f) ? <span className="entrymacros num">💪{e.p || 0} 🥦{e.f || 0}</span> : null}
                    </span>
                    <span className="actions">
                      <span className="cal num">{e.cal}</span>
                      <button className="tinybtn" title="Edit" aria-label={`Edit ${e.name}`} onClick={() => setEditEntry({ id: e.id, name: e.name, cal: String(e.cal), p: String(e.p || 0), f: String(e.f || 0) })}>✎</button>
                      <button className="tinybtn" title="Save as preset" aria-label={`Save ${e.name} as preset`} onClick={() => savePreset(e.name, e.cal, e.p || 0, e.f || 0)}>☆</button>
                      <button className="tinybtn" title="Delete" aria-label={`Delete ${e.name}`} onClick={() => removeEntry(e.id)}>✕</button>
                    </span>
                  </div>
                )
              )}
            </div>
          </div>

          <div className="card">
            <h2>Power-ups</h2>
            <div className="macrorow">
              <span className="micons" aria-hidden="true">
                {Array.from({ length: 5 }).map((_, i) => (
                  <span key={i} style={{ opacity: totP >= ((i + 1) / 5) * settings.proteinGoal ? 1 : 0.22 }}>💪</span>
                ))}
              </span>
              <div>
                <div className="mgoal num">{totP}g / {settings.proteinGoal}g protein</div>
                {totP >= settings.proteinGoal ? <div className="mhit">GOAL HIT · +15 XP at close</div> : <div className="qdesc num">{settings.proteinGoal - totP}g to go</div>}
              </div>
            </div>
            <div className="macrorow">
              <span className="micons" aria-hidden="true">
                {Array.from({ length: 5 }).map((_, i) => (
                  <span key={i} style={{ opacity: totF >= ((i + 1) / 5) * settings.fiberGoal ? 1 : 0.22 }}>🥦</span>
                ))}
              </span>
              <div>
                <div className="mgoal num">{totF}g / {settings.fiberGoal}g fiber</div>
                {totF >= settings.fiberGoal ? <div className="mhit">GOAL HIT · +15 XP at close</div> : <div className="qdesc num">{settings.fiberGoal - totF}g to go</div>}
              </div>
            </div>
            <div className="sub">Hit both for the Macro Sweep bonus. Grams fill in via Estimate or manually.</div>
          </div>

          <div className="card">

              <button onClick={() => { setLabelForm({ name: "", cal: "", p: "", f: "", g: "", liquid: false }); setLabelNote(""); }}>Type it in</button>
              <input ref={labelRef} type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => { scanLabel(e.target.files && e.target.files[0]); e.target.value = ""; }} />
            </div>
            {labelNote && <div className="note">{labelNote}</div>}
            {labelForm && (
              <div className="estitem">
                <div className="row" style={{ marginTop: 0 }}>
                  <input value={labelForm.name} onChange={(e) => setLabelForm(Object.assign({}, labelForm, { name: e.target.value }))} placeholder="Name (how you'll type it when logging)" aria-label="New food name" />
                </div>
                <div className="row" style={{ marginTop: 6 }}>
                  <input inputMode="numeric" value={labelForm.cal} onChange={(e) => setLabelForm(Object.assign({}, labelForm, { cal: e.target.value }))} placeholder="cal / serving" aria-label="Calories per serving" />
                  <input inputMode="decimal" value={labelForm.p} onChange={(e) => setLabelForm(Object.assign({}, labelForm, { p: e.target.value }))} placeholder="💪g" aria-label="Protein grams per serving" />
                  <input inputMode="decimal" value={labelForm.f} onChange={(e) => setLabelForm(Object.assign({}, labelForm, { f: e.target.value }))} placeholder="🥦g" aria-label="Fiber grams per serving" />
                </div>
                <div className="row" style={{ marginTop: 6 }}>
                  <input inputMode="decimal" value={labelForm.g} onChange={(e) => setLabelForm(Object.assign({}, labelForm, { g: e.target.value }))} placeholder="serving size (g or ml, optional)" aria-label="Serving size in grams or milliliters" />

                  <button className="pri" style={{ flex: 1 }} onClick={() => saveCustomFood(false)}>Save food</button>

                </div>

              <div className="chips">

                  <div key={cf.k[0]} className="chip" onClick={() => addEntry(cf.k[0], cf.c, cf.p || 0, cf.f || 0)} title="Tap to log one serving">
                    {cf.k[0]} <span className="num" style={{ color: "#7A6B8E" }}>{cf.c}</span>
                    <span className="x" role="button" aria-label={`Delete ${cf.k[0]} from food database`} onClick={(ev) => { ev.stopPropagation(); deleteCustomFood(cf.k[0]); }}>×</span>

          </div>

            <h2>Steps</h2>
            <div className="bignum num">{day.steps.toLocaleString()}</div>
            <div className="sub num">of {settings.stepGoal.toLocaleString()} · {stepPct}%</div>
            <div className="bar"><div style={{ width: `${stepPct}%`, background: stepPct >= 100 ? "#00B3A4" : "#7A2FF2" }} /></div>
            <div className="row">
              <input inputMode="numeric" value={stepInput} onChange={(e) => setStepInput(e.target.value)} placeholder="Count from your watch" aria-label="Step count" onKeyDown={(e) => e.key === "Enter" && saveSteps()} />

          <div className="card">

            {quests.map((q, i) => (
              <div className="quest" key={q.id}>
                <div
                  className={`qbox ${questStatus[i] ? "done" : ""} ${q.manual && !day.closed ? "tap" : ""}`}

                  aria-checked={q.manual ? questStatus[i] : undefined}
                  onClick={() => q.manual && toggleManualQuest(q.id)}
                >{questStatus[i] ? "✓" : ""}</div>
                <div>
                  <div className={`qname ${questStatus[i] ? "done" : ""}`}>{q.label}{q.manual && <span className="qtag">tap to claim</span>}</div>
                  <div className="qdesc">{q.desc}</div>
                </div>
              </div>
            ))}
            <div className="sub" style={{ marginTop: 8 }}>+15 XP each · +25 bonus for the full board, awarded at day close.</div>
          </div>

          <div className="card">
            <h2>{day.closed ? "Day closed" : "Close the Day"}</h2>
            {day.closed ? (
              <div className="sub">Done for today. +{day.xp} XP banked. See you at lunch tomorrow.</div>
            ) : (
              <React.Fragment>
                <div className="sub">The 60-second ritual: confirm food, enter steps, optional weigh-in, then the numbers reveal.</div>
                <div className="row"><button className="ink" style={{ width: "100%" }} onClick={startClose}>Close the Day →</button></div>
              </React.Fragment>
            )}
          </div>
        </React.Fragment>
      )}

      {tab === "trends" && (
        <React.Fragment>
          <div className="card">
            <h2>Weight {latestW !== null && firstW !== null && weightChart.length > 1 && (
              <span className="num" style={{ color: latestW <= firstW ? "#00B3A4" : "#FF3E8A", fontSize: 12 }}>
                {latestW <= firstW ? "▼" : "▲"} {Math.abs(latestW - firstW).toFixed(1)} total
              </span>
            )}</h2>
            {latestW !== null && <div className="bignum num">{latestW}</div>}
            <div className="row">
              <input inputMode="decimal" value={weightInput} onChange={(e) => setWeightInput(e.target.value)} placeholder="Today's weight" aria-label="Weight" onKeyDown={(e) => e.key === "Enter" && saveWeight()} />
              <button className="pri" onClick={() => saveWeight()} disabled={!weightInput}>Log</button>
            </div>
            {weightChart.length > 1 ? (
              <div style={{ height: 180, marginTop: 14 }}>
                <ResponsiveContainer width="100%" height="100%">
                  <LineChart data={weightChart} margin={{ top: 8, right: 8, bottom: 0, left: -18 }}>
                    <CartesianGrid stroke="#EFE5FB" />
                    <XAxis dataKey="d" tick={{ fontSize: 11, fontWeight: 600 }} />
                    <YAxis domain={["dataMin - 2", "dataMax + 2"]} tick={{ fontSize: 11, fontWeight: 600 }} />
                    <Tooltip />
                    <Line type="monotone" dataKey="w" stroke="#7A2FF2" strokeWidth={2.5} dot={{ r: 3, fill: "#7A2FF2" }} />
                  </LineChart>
                </ResponsiveContainer>
              </div>
            ) : (
              <div className="empty" style={{ marginTop: 10 }}>Two or more weigh-ins and the trend line appears. Weekly is plenty — daily noise is mostly water.</div>
            )}
          </div>

          <div className="card">
            <h2>Weekly report card {level < 2 && "🔒"}</h2>
            {level >= 2 ? (
              <React.Fragment>
                <div className="xpline"><span>Avg daily calories</span><span className="num">{weekReport.thisWeek.cal} <span style={{ color: "#7A6B8E" }}>(last wk {weekReport.lastWeek.cal})</span></span></div>
                <div className="xpline"><span>Total steps</span><span className="num">{weekReport.thisWeek.steps.toLocaleString()} <span style={{ color: "#7A6B8E" }}>(last wk {weekReport.lastWeek.steps.toLocaleString()})</span></span></div>
                <div className="xpline"><span>Perfect days</span><span className="num">{weekReport.thisWeek.onPlanDays} <span style={{ color: "#7A6B8E" }}>(last wk {weekReport.lastWeek.onPlanDays})</span></span></div>
                <div className="xpline"><span>Days logged</span><span className="num">{weekReport.thisWeek.loggedDays} <span style={{ color: "#7A6B8E" }}>(last wk {weekReport.lastWeek.loggedDays})</span></span></div>
              </React.Fragment>
            ) : (
              <div className="lock">Unlocks at Level 2 ({xpForLevel(2)} XP). This week vs last: avg calories, steps, perfect days.</div>
            )}
          </div>

          <div className="card">
            <h2>Pace projection {level < 3 && "🔒"}</h2>
            {level >= 3 ? (
              pace ? (
                <React.Fragment>
                  <div className="bignum num" style={{ fontSize: 32, color: pace.perWeek <= 0 ? "#00B3A4" : "#FF3E8A" }}>
                    {pace.perWeek <= 0 ? "" : "+"}{pace.perWeek.toFixed(1)}/week
                  </div>
                  <div className="sub num">At this rate: {pace.in30.toFixed(1)} in 30 days. Trend, not prophecy — the trend responds to inputs.</div>
                </React.Fragment>
              ) : (
                <div className="empty">Needs two or more weigh-ins to compute a rate.</div>
              )
            ) : (
              <div className="lock">Unlocks at Level 3 ({xpForLevel(3)} XP). Your weekly rate of change and 30-day projection.</div>
            )}
          </div>

          <div className="card">
            <h2>Calories vs weight · 28 days {level < 4 && "🔒"}</h2>
            {level >= 4 ? (
              <div style={{ height: 200 }}>
                <ResponsiveContainer width="100%" height="100%">
                  <LineChart data={overlayChart} margin={{ top: 8, right: 8, bottom: 0, left: -18 }}>
                    <CartesianGrid stroke="#EFE5FB" />
                    <XAxis dataKey="d" tick={{ fontSize: 10, fontWeight: 600 }} interval={5} />
                    <YAxis yAxisId="c" tick={{ fontSize: 10, fontWeight: 600 }} />
                    <YAxis yAxisId="w" orientation="right" domain={["dataMin - 2", "dataMax + 2"]} tick={{ fontSize: 10, fontWeight: 600 }} />
                    <Tooltip />
                    <Legend wrapperStyle={{ fontSize: 11, fontWeight: 700 }} />
                    <Line yAxisId="c" type="monotone" dataKey="cal" name="calories" stroke="#FF3E8A" strokeWidth={2} dot={false} connectNulls />
                    <Line yAxisId="w" type="monotone" dataKey="w" name="weight" stroke="#7A2FF2" strokeWidth={2.5} dot={{ r: 3 }} connectNulls />
                  </LineChart>
                </ResponsiveContainer>
              </div>
            ) : (
              <div className="lock">Unlocks at Level 4 ({xpForLevel(4)} XP). Intake and weight on one chart — where cause meets effect.</div>
            )}
          </div>

          <div className="card">
            <h2>Calories · last 14 days</h2>
            <div style={{ height: 160 }}>
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={calChart} margin={{ top: 8, right: 8, bottom: 0, left: -18 }}>
                  <XAxis dataKey="d" tick={{ fontSize: 10, fontWeight: 600 }} interval={2} />
                  <YAxis tick={{ fontSize: 10, fontWeight: 600 }} />
                  <Tooltip />
                  <ReferenceLine y={settings.calTarget} stroke="#FF3E8A" strokeDasharray="4 4" strokeWidth={2} />
                  <Bar dataKey="cal" fill="#7A2FF2" radius={[4, 4, 0, 0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
            <div className="sub">Dashed line is the daily target. Weekend bars can run over it and still be on plan — the pool math knows.</div>
          </div>

          <div className="card">
            <h2>Steps · last 14 days</h2>
            <div style={{ height: 160 }}>
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={stepChart} margin={{ top: 8, right: 8, bottom: 0, left: -18 }}>
                  <XAxis dataKey="d" tick={{ fontSize: 10, fontWeight: 600 }} interval={2} />
                  <YAxis tick={{ fontSize: 10, fontWeight: 600 }} />
                  <Tooltip />
                  <ReferenceLine y={settings.stepGoal} stroke="#00B3A4" strokeDasharray="4 4" strokeWidth={2} />
                  <Bar dataKey="steps" fill="#FF3E8A" radius={[4, 4, 0, 0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        </React.Fragment>
      )}

      {tab === "photos" && (
        <React.Fragment>
          <div className="card">
            <h2>Progress photos</h2>
            <div className="row">
              <button className="pri" style={{ width: "100%" }} disabled={photoBusy} onClick={() => fileRef.current && fileRef.current.click()}>
                {photoBusy ? "Compressing…" : photoIndex.includes(today) ? "Replace today's photo" : "Add today's photo"}
              </button>
              <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => { addPhoto(e.target.files && e.target.files[0]); e.target.value = ""; }} />
            </div>
            {photoNote && <div className="note">{photoNote}</div>}
            <div className="sub" style={{ marginTop: 8 }}>Same pose, same lighting, same spot — that's what makes the comparison honest.</div>
          </div>

          {firstPhoto && lastPhoto && firstPhoto !== lastPhoto && photos[firstPhoto] && photos[lastPhoto] && (
            <div className="card">
              <h2>Then vs now</h2>
              <div className="compare">
                <div className="side">
                  <div className="cl">{shortDate(firstPhoto)}{weightFor(firstPhoto) ? ` · ${weightFor(firstPhoto)}` : ""}</div>
                  <img src={photos[firstPhoto]} alt={`Progress photo ${firstPhoto}`} />
                </div>
                <div className="side">
                  <div className="cl">{shortDate(lastPhoto)}{weightFor(lastPhoto) ? ` · ${weightFor(lastPhoto)}` : ""}</div>
                  <img src={photos[lastPhoto]} alt={`Progress photo ${lastPhoto}`} />
                </div>
              </div>
            </div>
          )}

          {photoIndex.length > 0 && (
            <div className="card">
              <h2>All photos</h2>
              <div className="pgrid">
                {[...photoIndex].reverse().map((ds) => (
                  <div className="pcell" key={ds} onClick={() => setViewPhoto(ds)}>
                    {photos[ds] ? <img src={photos[ds]} alt={`Progress photo ${ds}`} /> : null}
                    <div className="pd">{shortDate(ds)}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {photoIndex.length === 0 && <div className="empty" style={{ padding: "0 4px" }}>No photos yet. Day one is the one you'll be most glad you took.</div>}

          {viewPhoto && photos[viewPhoto] && (
            <div className="modal" onClick={() => setViewPhoto(null)}>
              <img src={photos[viewPhoto]} alt={`Progress photo ${viewPhoto}`} />
              <div className="mrow" onClick={(e) => e.stopPropagation()}>
                <button onClick={() => setViewPhoto(null)}>Close</button>
                <button style={{ color: "#FF3E8A" }} onClick={() => deletePhoto(viewPhoto)}>Delete</button>
              </div>
            </div>
          )}
        </React.Fragment>
      )}

      {/* ---------- Close the Day sheet ---------- */}
      {closeFlow && (
        <div className="sheet" onClick={() => closeFlow.step !== 4 && setCloseFlow(null)}>
          <div className="sheet-inner" onClick={(e) => e.stopPropagation()}>
            {closeFlow.step === 1 && (
              <React.Fragment>
                <div className="stepno">Close the day · 1 of 3</div>
                <h3>Anything missing from the food log?</h3>
                <div style={{ marginTop: 8 }}>
                  {day.entries.length === 0 && <div className="empty">Nothing logged yet — add at least one item to close.</div>}
                  {day.entries.map((e) => (
                    <div className="entry" key={e.id}><span className="nm">{e.name}</span><span className="cal num">{e.cal}</span></div>
                  ))}
                </div>
                <div className="row">
                  <input value={desc} onChange={(e) => setDesc(e.target.value)} placeholder="Quick add: late-night snack…" />
                  <input inputMode="numeric" style={{ maxWidth: 90 }} value={calInput} onChange={(e) => setCalInput(e.target.value)} placeholder="cal" />
                </div>
                <div className="row">
                  <button onClick={() => { const c = parseInt(calInput, 10); if (desc.trim() && !isNaN(c)) addEntry(desc, c); }} disabled={!desc.trim() || !calInput}>Add item</button>
                  <button className="pri" style={{ flex: 1 }} disabled={day.entries.length === 0} onClick={() => setCloseFlow(Object.assign({}, closeFlow, { step: 2 }))}>Food's complete →</button>
                </div>
              </React.Fragment>
            )}
            {closeFlow.step === 2 && (
              <React.Fragment>
                <div className="stepno">Close the day · 2 of 3</div>
                <h3>Final step count</h3>
                <div className="sub">Glance at the watch. What's the number?</div>
                <div className="row">
                  <input inputMode="numeric" value={closeFlow.steps} onChange={(e) => setCloseFlow(Object.assign({}, closeFlow, { steps: e.target.value }))} placeholder="Steps" />
                </div>
                <div className="row">
                  <button onClick={() => setCloseFlow(Object.assign({}, closeFlow, { step: 1 }))}>← Back</button>
                  <button className="pri" style={{ flex: 1 }} onClick={() => setCloseFlow(Object.assign({}, closeFlow, { step: 3 }))}>Next →</button>
                </div>
              </React.Fragment>
            )}
            {closeFlow.step === 3 && (
              <React.Fragment>
                <div className="stepno">Close the day · 3 of 3</div>
                <h3>Weigh-in? (optional, +10 XP)</h3>
                <div className="row">
                  <input inputMode="decimal" value={closeFlow.weight} onChange={(e) => setCloseFlow(Object.assign({}, closeFlow, { weight: e.target.value }))} placeholder="Skip or enter weight" />
                </div>
                <div className="row">
                  <button onClick={() => setCloseFlow(Object.assign({}, closeFlow, { step: 2 }))}>← Back</button>
                  <button className="ink" style={{ flex: 1 }} onClick={finishClose}>Reveal my numbers</button>
                </div>
              </React.Fragment>
            )}
            {closeFlow.step === 4 && closeFlow.reveal && (
              <React.Fragment>
                <div className="stepno">Day closed</div>
                <div className="reveal-score num" style={{ color: closeFlow.reveal.score >= 70 ? "#00B3A4" : closeFlow.reveal.score >= 40 ? "#F0A500" : "#FF3E8A" }}>{closeFlow.reveal.score}</div>
                <div className="reveal-label">Day score</div>
                <div className="reveal-quip">{scoreQuip(closeFlow.reveal.score)}</div>
                <div style={{ marginTop: 14 }}>
                  {closeFlow.reveal.lines.map((l, i) => (
                    <div className="xpline" key={i}><span>{l.t}</span><span className="v num">+{l.v} XP</span></div>
                  ))}
                  <div className="xpline" style={{ borderBottom: "none" }}><span style={{ fontWeight: 900 }}>Total</span><span className="v num" style={{ fontWeight: 900 }}>+{closeFlow.reveal.xp} XP</span></div>
                </div>
                {closeFlow.reveal.tokenEarned && <div className="note" style={{ color: "#00B3A4" }}>🛡 Rest Day token earned — 7 perfect days banked one automatic shield.</div>}
                {closeFlow.reveal.levelUp && <div className="note" style={{ color: "#7A2FF2" }}>LEVEL {closeFlow.reveal.levelUp} — new analytics unlocked in Trends.</div>}
                <div className="evidence">{closeFlow.reveal.evidence}</div>
                <div className="row"><button className="pri" style={{ width: "100%" }} onClick={() => setCloseFlow(null)}>Done</button></div>
              </React.Fragment>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Streakhouse />);
</script>
</body>
</html>
