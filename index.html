                      if (p.cx == null || p.cy == null) return null;
                      const isPd = periodSet.has(p.payload.ds);
                      return <circle key={p.payload.ds} cx={p.cx} cy={p.cy} r={isPd ? 4.5 : 3} fill={isPd ? "#FF5FA2" : "#7C48D8"} stroke={isPd ? "#1E1A1C" : "none"} strokeWidth={isPd ? 1.5 : 0} />;
                    }} />
                  </LineChart>
                </ResponsiveContainer>
              </div>
            ) : (
              <div className="empty" style={{ marginTop: 10 }}>Two or more weigh-ins and the trend line appears. Weekly is plenty — daily noise is mostly water.</div>

            {weightChart.some((w) => periodSet.has(w.ds)) && (
              <div className="sub" style={{ marginTop: 6 }}>🔴 Pink dots are period-day weigh-ins — expected to run high; the pace math skips them.</div>

          <div className="card">
            <h2>Weekly report card {level < 2 && "🔒"}</h2>

              <React.Fragment>
                <div className="xpline"><span>Avg daily calories</span><span className="num">{weekReport.thisWeek.cal} <span style={{ color: "#5C5254" }}>(last wk {weekReport.lastWeek.cal})</span></span></div>
                <div className="xpline"><span>Total steps</span><span className="num">{weekReport.thisWeek.steps.toLocaleString()} <span style={{ color: "#5C5254" }}>(last wk {weekReport.lastWeek.steps.toLocaleString()})</span></span></div>
                <div className="xpline"><span>Perfect days</span><span className="num">{weekReport.thisWeek.onPlanDays} <span style={{ color: "#5C5254" }}>(last wk {weekReport.lastWeek.onPlanDays})</span></span></div>
                <div className="xpline"><span>Days logged</span><span className="num">{weekReport.thisWeek.loggedDays} <span style={{ color: "#5C5254" }}>(last wk {weekReport.lastWeek.loggedDays})</span></span></div>
              </React.Fragment>
            ) : (
              <div className="lock">Unlocks at Level 2 ({xpForLevel(2)} XP). This week vs last: avg calories, steps, perfect days.</div>
            )}
          </div>

          <div className="card">
            <h2>Pace projection {level < 3 && "🔒"}</h2>
            {level >= 3 ? (
              pace ? (
                <React.Fragment>

                    {pace.perWeek <= 0 ? "" : "+"}{pace.perWeek.toFixed(1)}/week
                  </div>
                  <div className="sub num">At this rate: {pace.in30.toFixed(1)} in 30 days. Trend, not prophecy — the trend responds to inputs.{pace.excluded > 0 ? ` (${pace.excluded} period-day weigh-in${pace.excluded === 1 ? "" : "s"} excluded — that's water, not trend.)` : ""}</div>

              ) : (
                <div className="empty">Needs two or more weigh-ins to compute a rate.</div>
              )
            ) : (
              <div className="lock">Unlocks at Level 3 ({xpForLevel(3)} XP). Your weekly rate of change and 30-day projection.</div>

          </div>

          <div className="card">
            <h2>Calories vs weight · 28 days {level < 4 && "🔒"}</h2>
            {level >= 4 ? (
              <div style={{ height: 200 }}>
                <ResponsiveContainer width="100%" height="100%">
                  <LineChart data={overlayChart} margin={{ top: 8, right: 8, bottom: 0, left: -18 }}>
                    <CartesianGrid stroke="#EDE2CC" />
                    <XAxis dataKey="d" tick={{ fontSize: 10, fontWeight: 600 }} interval={5} />
                    <YAxis yAxisId="c" tick={{ fontSize: 10, fontWeight: 600 }} />
                    <YAxis yAxisId="w" orientation="right" domain={["dataMin - 2", "dataMax + 2"]} tick={{ fontSize: 10, fontWeight: 600 }} />
                    <Tooltip />
                    <Legend wrapperStyle={{ fontSize: 11, fontWeight: 700 }} />
                    <Line yAxisId="c" type="monotone" dataKey="cal" name="calories" stroke="#FF5FA2" strokeWidth={2} dot={false} connectNulls />
                    <Line yAxisId="w" type="monotone" dataKey="w" name="weight" stroke="#7C48D8" strokeWidth={2.5} dot={{ r: 3 }} connectNulls />
                  </LineChart>
                </ResponsiveContainer>
              </div>

              <div className="lock">Unlocks at Level 4 ({xpForLevel(4)} XP). Intake and weight on one chart — where cause meets effect.</div>
            )}
          </div>

          <div className="card">
            <h2>Calories · last 14 days</h2>
            <div style={{ height: 160 }}>
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={calChart} margin={{ top: 8, right: 8, bottom: 0, left: -18 }}>
                  <XAxis dataKey="d" tick={{ fontSize: 10, fontWeight: 600 }} interval={2} />
                  <YAxis tick={{ fontSize: 10, fontWeight: 600 }} />
                  <Tooltip />
                  <ReferenceLine y={weekdayTarget(settings)} stroke="#FF5FA2" strokeDasharray="4 4" strokeWidth={2} />
                  <Bar dataKey="cal" fill="#7C48D8" radius={[4, 4, 0, 0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
            <div className="sub">Dashed line is the daily target. Weekend bars can run over it and still be on plan — the pool math knows.</div>
          </div>

          <div className="card">
            <h2>Steps · last 14 days</h2>
            <div style={{ height: 160 }}>
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={stepChart} margin={{ top: 8, right: 8, bottom: 0, left: -18 }}>

                  <YAxis tick={{ fontSize: 10, fontWeight: 600 }} />
                  <Tooltip />
                  <ReferenceLine y={settings.stepGoal} stroke="#52B52E" strokeDasharray="4 4" strokeWidth={2} />
                  <Bar dataKey="steps" fill="#7ED957" radius={[4, 4, 0, 0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        </React.Fragment>
  );

  const photosContent = (
    <React.Fragment>
          <div className="card">
            <h2>Progress photos</h2>
            <div className="row">
              <button className="pri" style={{ width: "100%" }} disabled={photoBusy} onClick={() => fileRef.current && fileRef.current.click()}>

              </button>
              <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => { addPhoto(e.target.files && e.target.files[0]); e.target.value = ""; }} />
            </div>
            {photoNote && <div className="note">{photoNote}</div>}
            <div className="sub" style={{ marginTop: 8 }}>Same pose, same lighting, same spot — that's what makes the comparison honest.</div>
          </div>

          {firstPhoto && lastPhoto && firstPhoto !== lastPhoto && photos[firstPhoto] && photos[lastPhoto] && (
            <div className="card">
              <h2>Then vs now</h2>
              <div className="compare">

                  <div className="cl">{shortDate(firstPhoto)}{weightFor(firstPhoto) ? ` · ${weightFor(firstPhoto)}` : ""}</div>

                <div className="side">
                  <div className="cl">{shortDate(lastPhoto)}{weightFor(lastPhoto) ? ` · ${weightFor(lastPhoto)}` : ""}</div>
                  <img src={photos[lastPhoto]} alt={`Progress photo ${lastPhoto}`} />
                </div>
              </div>
            </div>

          {photoIndex.length > 0 && (
            <div className="card">
              <h2>All photos</h2>

                  </div>

              </div>
            </div>

              <img src={photos[viewPhoto]} alt={`Progress photo ${viewPhoto}`} />

                <button onClick={() => setViewPhoto(null)}>Close</button>
                <button style={{ color: "#FF5FA2" }} onClick={() => deletePhoto(viewPhoto)}>Delete</button>
              </div>
            </div>
          )}

  );

  const planContent = (
    <React.Fragment>

              <code>cloudflare-worker.js</code> in the repo (instructions are at the top of that file), then paste its URL here.

            <div className="row" style={{ marginTop: 6 }}>
              <input value={aiDraft} onChange={(e) => setAiDraft(e.target.value)} placeholder="https://your-worker.workers.dev" aria-label="AI lookup Worker URL" inputMode="url" autoCapitalize="none" autoCorrect="off" />
            </div>
            <div className="row">

            {(aiNote || settings.aiUrl) && (

            )}

          <div className="card">
            <h2>🔄 Sync</h2>
            {!syncInfo ? (
              <React.Fragment>

                <div className="qdesc" style={{ marginTop: 12 }}>Already turned it on elsewhere? Enter that device's code:</div>
                <div className="row" style={{ marginTop: 4 }}>
                  <input value={syncCodeDraft} onChange={(e) => setSyncCodeDraft(e.target.value)} placeholder="ABCDE-FGHJK-MNPQR-STVWX" aria-label="Sync code" autoCapitalize="characters" autoCorrect="off" />

                )}
                <div className="row" style={{ marginTop: 10 }}>
                  <button className="pri" style={{ flex: 1 }} onClick={syncNowClick}>Sync now</button>
                  <button onClick={stopSync}>Turn off</button>
                </div>

            )}
            {syncNote && <div className="note">{syncNote}</div>}
          </div>

          <div className="card">
            <h2>Backup</h2>
            <div className="sub">All data lives on this phone only. Export occasionally and keep the file somewhere safe.</div>
            <div className="row"><button style={{ width: "100%" }} onClick={exportData}>Export backup (JSON)</button></div>
          </div>
        </React.Fragment>

        .qdesc { font-size:12px; color:#5C5254; font-weight:700; }
        .qtag { font-size:9px; font-weight:800; letter-spacing:1px; color:#FF5FA2; text-transform:uppercase; margin-left:6px; }
        .entry { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:2px dotted #EBDFC9; }
        .entry:last-child { border-bottom:none; }
        .entry .nm { font-weight:700; font-size:14px; }
        .entry .actions { display:flex; gap:10px; align-items:center; }
        .entry .cal { font-weight:800; font-size:14px; }
        .tinybtn { border:none; background:none; padding:2px 4px; font-size:15px; cursor:pointer; }
        .note { font-size:12px; color:#7C48D8; font-weight:800; margin-top:8px; }
        .quip { background:#FFD6E8; border:2px solid #7C48D8; border-radius:14px; padding:10px 14px; margin-top:12px; transform:rotate(-.4deg); }
        .quip .ql { font-size:9px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:#7C48D8; }
        .quip .qt { font-size:13px; font-weight:800; margin-top:2px; line-height:1.35; }
        .chatlog { max-height:360px; overflow-y:auto; display:flex; flex-direction:column; gap:9px; padding:6px 2px 2px; }
        .bubble { max-width:86%; padding:8px 12px; border:2.5px solid #1E1A1C; border-radius:16px; font-size:14px; line-height:1.35; white-space:pre-wrap; overflow-wrap:break-word; }
        .bubble.user { align-self:flex-end; background:#FF5FA2; color:#1E1A1C; border-bottom-right-radius:5px; box-shadow:2px 2px 0 #1E1A1C; }
        .bubble.asst { align-self:flex-start; background:#FFFDF8; border-bottom-left-radius:5px; box-shadow:2px 2px 0 #1E1A1C; }
        .bubble.typing { color:#5C5254; letter-spacing:2px; }
        .chatact { align-self:flex-start; font-size:11px; font-weight:800; background:#7ED957; color:#1E1A1C; border:2px solid #1E1A1C; border-radius:999px; padding:3px 11px; box-shadow:2px 2px 0 #1E1A1C; }
        button.cathdr { width:100%; display:flex; justify-content:space-between; align-items:center; background:#FFFDF8; border:2.5px solid #1E1A1C; border-radius:12px; padding:8px 12px; margin-top:10px; font-weight:800; font-size:12px; letter-spacing:.6px; text-transform:uppercase; color:#1E1A1C; cursor:pointer; box-shadow:2px 2px 0 #1E1A1C; font-family:inherit; }
        button.cathdr.on { background:#FFC93C; }
        button.cathdr:active { transform:translate(2px,2px); box-shadow:0 0 0 #1E1A1C; }
        .pours { display:grid; grid-template-columns:repeat(3,1fr); gap:12px 10px; margin-top:12px; }
        button.pourbtn { position:relative; background:#fff; border:2.5px solid #1E1A1C; border-radius:14px; box-shadow:3px 3px 0 #1E1A1C; padding:7px 2px 5px; display:flex; flex-direction:column; align-items:center; gap:1px; cursor:pointer; font-family:inherit; }
        button.pourbtn:hover { transform:translate(-1px,-1px); box-shadow:4px 4px 0 #1E1A1C; }
        button.pourbtn:active { transform:translate(3px,3px); box-shadow:0 0 0 #1E1A1C; }
        button.pourbtn:disabled { opacity:.45; }
        .pourbtn .pl { font-size:10px; font-weight:800; letter-spacing:.2px; color:#1E1A1C; line-height:1.1; }
        .pourbtn .pc { font-size:9px; color:#5C5254; }
        .pourbadge { position:absolute; top:-9px; right:-9px; background:#FF5FA2; color:#1E1A1C; border:2px solid #1E1A1C; border-radius:999px; min-width:21px; height:21px; padding:0 4px; font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; box-shadow:2px 2px 0 #1E1A1C; }
        .estitem { background:#FAF3E7; border:2.5px dashed #1E1A1C; border-radius:14px; padding:10px; margin-top:10px; }
        .estitem input { background:#fff; }
        .estnote { font-size:11px; color:#5C5254; font-weight:800; margin-top:6px; }
        .entrymacros { font-size:11px; color:#5C5254; font-weight:800; margin-left:6px; }
        .gear { border:none; background:none; font-size:16px; cursor:pointer; padding:2px 4px; }
        .empty { font-size:13px; color:#5C5254; font-weight:700; padding:6px 0; font-style:italic; }
        .nudge { background:#FFEFC2; border:2px solid #FFC93C; border-radius:14px; padding:12px 14px; font-size:13px; font-weight:800; margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; gap:10px; transform:rotate(.5deg); }
        .nudge button { padding:6px 12px; font-size:12px; white-space:nowrap; }
        .pips { display:flex; gap:6px; margin-top:10px; }
        .pip { flex:1; text-align:center; font-size:11px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; padding:7px 0; border:2.5px solid #1E1A1C; border-radius:999px; background:#fff; color:#5C5254; cursor:pointer; }
        .pip.filled { background:#7ED957; color:#1E1A1C; }
        .pip.heavy { background:#FF5FA2; color:#1E1A1C; }
        .bank { background:#DFF6D2; border:2px solid #52B52E; border-radius:14px; padding:10px 14px; font-size:13px; font-weight:800; margin-top:12px; }
        .macrorow { display:flex; align-items:center; gap:14px; padding:9px 0; border-bottom:2px dotted #EBDFC9; }
        .macrorow:last-of-type { border-bottom:none; }
        .micons { font-size:20px; letter-spacing:3px; white-space:nowrap; }
        .mgoal { font-size:14px; font-weight:800; }
        .mhit { font-size:10px; font-weight:800; letter-spacing:1px; color:#52B52E; }
        .pgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
        .pcell { position:relative; border:2.5px solid #1E1A1C; border-radius:12px; overflow:hidden; aspect-ratio:3/4; background:#FAF3E7; cursor:pointer; }
        .pcell img { width:100%; height:100%; object-fit:cover; display:block; }
        .pcell .pd { position:absolute; bottom:0; left:0; right:0; background:rgba(30,26,28,.85); color:#fff; font-size:10px; font-weight:800; text-align:center; padding:3px 0; }
        .compare { display:flex; gap:8px; margin-top:12px; }
        .compare .side { flex:1; }
        .compare img { width:100%; border:2.5px solid #1E1A1C; border-radius:12px; display:block; }
        .compare .cl { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:#5C5254; margin-bottom:4px; text-align:center; }
        .modal { position:fixed; inset:0; background:rgba(30,26,28,.88); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; z-index:50; }
        .modal img { max-width:100%; max-height:75vh; border-radius:14px; }
        .modal .mrow { display:flex; gap:10px; margin-top:14px; }
        .modal button { background:#fff; }
        .sheet { position:fixed; inset:0; background:rgba(30,26,28,.65); display:flex; align-items:flex-end; justify-content:center; z-index:60; }
        .sheet-inner { background:#FAF3E7; width:100%; max-width:520px; border-radius:24px 24px 0 0; border:2.5px solid #1E1A1C; border-bottom:none; padding:20px 18px 36px; max-height:85vh; overflow-y:auto; }
        .sheet h3 { font-weight:800; font-size:18px; margin:0 0 4px; }
        .sheet .stepno { font-size:10px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:#7C48D8; }
        .reveal-score { font-family:'Titan One',cursive; font-weight:400; font-size:76px; line-height:1; text-align:center; margin:14px 0 4px; text-shadow:3px 3px 0 #FFC93C; }
        .reveal-label { text-align:center; font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#5C5254; }
        .reveal-quip { text-align:center; font-size:14px; font-weight:800; margin-top:6px; color:#7C48D8; }
        .xpline { display:flex; justify-content:space-between; font-size:13px; font-weight:800; padding:6px 0; border-bottom:2px dotted #EBDFC9; }
        .xpline .v { color:#7C48D8; }
        .evidence { background:#1E1A1C; color:#FFC93C; border-radius:14px; padding:14px; font-size:14px; font-weight:800; margin-top:14px; text-align:center; transform:rotate(-.5deg); }
        .toast { position:fixed; top:16px; left:50%; transform:translateX(-50%); background:#FF5FA2; color:#1E1A1C; font-weight:800; font-size:13px; padding:10px 18px; border-radius:999px; z-index:70; box-shadow:3px 3px 0 #1E1A1C; }
        .lock { font-size:13px; color:#5C5254; font-weight:800; padding:8px 0; }
        @media (prefers-reduced-motion: reduce) { .bar > div, .lvltrack > div { transition:none; } }
        /* ---------- wide screens: the dashboard ---------- */
        @media (min-width: 1000px) {
          .sh-root { max-width:1480px; padding:28px 36px 64px; }
          .brand { font-size:34px; }
          .dash { display:flex; gap:24px; align-items:flex-start; }
          .dashcol { flex:1; min-width:0; }
          .peptalk { margin-bottom:16px; }
          .sheet-inner { border-radius:24px; border-bottom:2.5px solid #1E1A1C; margin-bottom:6vh; }
          .sheet { align-items:center; }
        }
      `}</style>

      {toast && <div className="toast">{toast}</div>}

      <div className="hdr">
        <div>
          <div className="brand">MACROS <span>&</span> MILES</div>
          <div className="datebar">
            {new Date().toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" })}
            <button className="gear" aria-label="Settings" onClick={() => { setTab("plan"); prefillGoalDrafts(); }}>⚙︎</button>
          </div>
        </div>
        <div className="hdr-right">
          <div className="stat">
            <div className="n num" style={{ color: adherence >= 70 ? "#52B52E" : adherence >= 40 ? "#F0A800" : "#5C5254" }}>{adherence}</div>
            <div className="l">7-day score</div>
          </div>
          <div className="stat">
            <div className="n num" style={{ color: streak > 0 ? "#FF5FA2" : "#CDBFA6" }}>{streak > 0 ? `🔥${streak}` : "0"}</div>
            <div className="l">streak · best {profile.bestStreak || 0}</div>
          </div>
        </div>
      </div>

      <div className="lvlbar">
        <div className="lvlpill">LVL {level}</div>
        <div className="lvltrack"><div style={{ width: `${levelPct}%` }} /></div>
        <div className="lvlxp num">{profile.xp}/{nextXp} XP</div>
        <div className="tokens" title="Rest Day tokens auto-shield a missed day">{"🛡".repeat(profile.tokens || 0)}</div>
      </div>

      {!wide && (
        <div className="tabs" role="tablist">
          {["eats", "vitals", "trends", "photos", "plan"].map((t) => (
            <button key={t} role="tab" aria-selected={tab === t} className={`tabbtn ${tab === t ? "on" : ""}`} onClick={() => { setTab(t); if (t === "plan") prefillGoalDrafts(); }}>{t}</button>
          ))}
        </div>
      )}

      {wide ? (
        <div className="dash">
          <div className="dashcol">{eatsContent}</div>
          <div className="dashcol">{vitalsContent}{trendsContent}</div>
          <div className="dashcol">{planContent}{photosContent}</div>
        </div>
      ) : (
        <React.Fragment>
          {tab === "eats" && eatsContent}
          {tab === "vitals" && vitalsContent}
          {tab === "trends" && trendsContent}
          {tab === "photos" && photosContent}
          {tab === "plan" && planContent}
        </React.Fragment>
      )}

      {/* ---------- Week in review: Sunday night & Monday morning ---------- */}
      {weeklyReview && (
        <div className="sheet" onClick={() => closeWeekReview(false)}>
          <div className="sheet-inner" onClick={(e) => e.stopPropagation()}>
            <div className="stepno">Week in review · {shortDate(weeklyReview.mon)}–{shortDate(weeklyReview.sun)}</div>
            <h3>{weeklyReview.verdict}</h3>
            <div style={{ marginTop: 6 }}>
              <div className="xpline"><span>Days logged</span><span className="num">{weeklyReview.logged}/7</span></div>
              <div className="xpline"><span>Avg daily calories</span><span className="num">{weeklyReview.avgCal.toLocaleString()}</span></div>
              <div className="xpline"><span>Days on plan</span><span className="num">{weeklyReview.onPlanDays}</span></div>
              <div className="xpline"><span>Total steps</span><span className="num">{weeklyReview.steps.toLocaleString()} · goal hit {weeklyReview.stepDays}×</span></div>
              <div className="xpline"><span><ProteinIcon size={12} /> protein / <FiberIcon size={12} /> fiber days</span><span className="num">{weeklyReview.protDays} / {weeklyReview.fibDays}</span></div>
              {weeklyReview.wDelta !== null && (
                <div className="xpline"><span>Weight over the week</span><span className="num" style={{ color: weeklyReview.wDelta <= 0 ? "#52B52E" : "#5C5254" }}>{weeklyReview.wDelta > 0 ? "+" : ""}{weeklyReview.wDelta}</span></div>
              )}
            </div>
            <div className="qname" style={{ marginTop: 14 }}>Reconfirm this week's goals</div>
            <div className="row" style={{ marginTop: 6 }}>
              <input inputMode="numeric" value={calDraft} onChange={(e) => setCalDraft(e.target.value)} placeholder="cal/day" aria-label="Calorie target" />
              <input inputMode="numeric" value={stepDraft} onChange={(e) => setStepDraft(e.target.value)} placeholder="steps" aria-label="Step goal" />
            </div>
            <div className="row" style={{ marginTop: 6 }}>
              <input inputMode="numeric" value={protDraft} onChange={(e) => setProtDraft(e.target.value)} placeholder="prot g" aria-label="Protein goal in grams" />
              <input inputMode="numeric" value={fibDraft} onChange={(e) => setFibDraft(e.target.value)} placeholder="fiber g" aria-label="Fiber goal in grams" />
            </div>
            <div className="row" style={{ marginTop: 6 }}>
              <select value={boostDraft} onChange={(e) => setBoostDraft(e.target.value)} aria-label="Weekend boost">
                <option value="0">Even budget every day</option>
                <option value="100">Shift 100/day to the weekend</option>
                <option value="150">Shift 150/day to the weekend</option>
                <option value="200">Shift 200/day to the weekend</option>
                <option value="300">Shift 300/day to the weekend</option>
              </select>
            </div>
            <div className="row">
              <button className="pri" style={{ flex: 1 }} onClick={() => closeWeekReview(true)}>Lock in goals →</button>
              <button onClick={() => closeWeekReview(false)}>Keep as is</button>
            </div>
          </div>
        </div>
      )}

      {/* ---------- Morning briefing: yesterday's verdict ---------- */}
      {briefing && (
        <div className="sheet" onClick={() => setBriefing(null)}>
          <div className="sheet-inner" onClick={(e) => e.stopPropagation()}>
            <div className="stepno">Morning briefing · yesterday, {shortDate(briefing.yds)}</div>
            <h3>{briefing.headline}</h3>
            {briefing.facts.length > 0 && (
              <div style={{ marginTop: 6 }}>
                {briefing.facts.map((f, i) => (
                  <div className="xpline" key={i}><span className="num">{f}</span></div>
                ))}
              </div>
            )}
            <div className="sub" style={{ marginTop: 10 }}>{briefing.tone}</div>
            {briefing.extra && <div className="sub" style={{ marginTop: 6 }}>{briefing.extra}</div>}
            <div className="evidence">{briefing.mission}</div>
            <div className="row"><button className="pri" style={{ width: "100%" }} onClick={() => setBriefing(null)}>Court is in session →</button></div>
          </div>
        </div>
      )}

      {/* ---------- Close the Day sheet ---------- */}
      {closeFlow && (
        <div className="sheet" onClick={() => closeFlow.step !== 4 && setCloseFlow(null)}>
          <div className="sheet-inner" onClick={(e) => e.stopPropagation()}>
            {closeFlow.step === 1 && (
              <React.Fragment>
                <div className="stepno">Close the day · 1 of 3</div>
                <h3>Anything missing from the food log?</h3>
                <div style={{ marginTop: 8 }}>
                  {day.entries.length === 0 && <div className="empty">Nothing logged yet — add at least one item to close.</div>}
                  {day.entries.map((e) => (
                    <div className="entry" key={e.id}><span className="nm">{e.name}</span><span className="cal num">{e.cal}</span></div>
                  ))}
                </div>
                <div className="row">
                  <input value={desc} onChange={(e) => setDesc(e.target.value)} placeholder="Quick add: late-night snack…" />
                  <input inputMode="numeric" style={{ maxWidth: 90 }} value={calInput} onChange={(e) => setCalInput(e.target.value)} placeholder="cal" />
                </div>
                <div className="row">
                  <button onClick={() => { const c = parseInt(calInput, 10); if (desc.trim() && !isNaN(c)) addEntry(desc, c); }} disabled={!desc.trim() || !calInput}>Add item</button>
                  <button className="pri" style={{ flex: 1 }} disabled={day.entries.length === 0} onClick={() => setCloseFlow(Object.assign({}, closeFlow, { step: 2 }))}>Food's complete →</button>
                </div>
              </React.Fragment>
            )}
            {closeFlow.step === 2 && (
              <React.Fragment>
                <div className="stepno">Close the day · 2 of 3</div>
                <h3>Final step count</h3>
                <div className="sub">Glance at the watch. What's the number?</div>
                <div className="row">
                  <input inputMode="numeric" value={closeFlow.steps} onChange={(e) => setCloseFlow(Object.assign({}, closeFlow, { steps: e.target.value }))} placeholder="Steps" />
                </div>
                <div className="row">
                  <button onClick={() => setCloseFlow(Object.assign({}, closeFlow, { step: 1 }))}>← Back</button>
                  <button className="pri" style={{ flex: 1 }} onClick={() => setCloseFlow(Object.assign({}, closeFlow, { step: 3 }))}>Next →</button>
                </div>
              </React.Fragment>
            )}
            {closeFlow.step === 3 && (
              <React.Fragment>
                <div className="stepno">Close the day · 3 of 3</div>
                <h3>Weigh-in? (optional, +10 XP)</h3>
                <div className="row">
                  <input inputMode="decimal" value={closeFlow.weight} onChange={(e) => setCloseFlow(Object.assign({}, closeFlow, { weight: e.target.value }))} placeholder="Skip or enter weight" />
                </div>
                <div className="row">
                  <button onClick={() => setCloseFlow(Object.assign({}, closeFlow, { step: 2 }))}>← Back</button>
                  <button className="ink" style={{ flex: 1 }} onClick={finishClose}>Reveal my numbers</button>
                </div>
              </React.Fragment>
            )}
            {closeFlow.step === 4 && closeFlow.reveal && (
              <React.Fragment>
                <div className="stepno">Day closed</div>
                <div className="reveal-score num" style={{ color: closeFlow.reveal.score >= 70 ? "#52B52E" : closeFlow.reveal.score >= 40 ? "#F0A800" : "#FF5FA2" }}>{closeFlow.reveal.score}</div>
                <div className="reveal-label">Day score</div>
                <div className="reveal-quip">{scoreQuip(closeFlow.reveal.score)}</div>
                <div style={{ marginTop: 14 }}>
                  {closeFlow.reveal.lines.map((l, i) => (
                    <div className="xpline" key={i}><span>{l.t}</span><span className="v num">+{l.v} XP</span></div>
                  ))}
                  <div className="xpline" style={{ borderBottom: "none" }}><span style={{ fontWeight: 800 }}>Total</span><span className="v num" style={{ fontWeight: 800 }}>+{closeFlow.reveal.xp} XP</span></div>
                </div>
                {closeFlow.reveal.tokenEarned && <div className="note" style={{ color: "#52B52E" }}>🛡 Rest Day token earned — 7 perfect days banked one automatic shield.</div>}
                {closeFlow.reveal.levelUp && <div className="note" style={{ color: "#7C48D8" }}>LEVEL {closeFlow.reveal.levelUp} — new analytics unlocked in Trends.</div>}
                <div className="evidence">{closeFlow.reveal.evidence}</div>
                {closeFlow.reveal.closer && <div className="sub" style={{ textAlign: "center", marginTop: 10 }}>{closeFlow.reveal.closer}</div>}
                <div className="row"><button className="pri" style={{ width: "100%" }} onClick={() => { setCloseFlow(null); if (dow(today) === 0) openSundayReview(); }}>Done</button></div>
              </React.Fragment>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Streakhouse />);
</script>
</body>
</html>
